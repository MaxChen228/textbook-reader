<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>pipeline dev В· textbook-reader</title>
  <script src="../assets/qbank-shared.js"></script>
  <link rel="stylesheet" href="../assets/qbank-shared.css">
  <style>
    /* dark tokens вҖ” иҲҮ reader еҗҢдёҖд»ҪпјҢйҷҗжң¬й Ғ scope */
    body { font-size: 14px; line-height: 1.6; transition: background .25s ease, color .25s ease; }
    body[data-theme="dark"] {
      --bg: #15140f; --surface: #1c1a14; --border: #2f2a22; --border-l: #25211a;
      --text: #ebe5d5; --sub: #8a8275; --ink: #f1ead9; --ink-light: #bdb39e; --accent: #d6cfb8;
    }
    .dev-wrap { max-width: 1280px; margin: 0 auto; padding: 18px 16px 96px; }
    @media (max-width: 640px) { .dev-wrap { padding: 12px 10px 72px; } }

    .dev-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; margin-bottom: 14px;
    }
    .dev-panel > h2 {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--sub);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .dev-label { font-family: var(--mono); font-size: 11px; color: var(--sub); letter-spacing: .04em; }

    /* в”Җв”Җ еҒҘеә·жўқпјҲзІҫз°Ўпјү в”Җв”Җ */
    .hbar { display: flex; flex-wrap: wrap; gap: 10px 22px; align-items: baseline; }
    .hbar .kv { display: flex; align-items: baseline; gap: 7px; }
    .hbar .k { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--sub); }
    .hbar .v { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 600; }
    .dev-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; vertical-align: middle; }
    .dot-ok { background: var(--status-known); } .dot-bad { background: var(--status-danger); }
    .dot-warn { background: var(--status-unknown); } .dot-idle { background: var(--status-skip); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.62} }
    .live { animation: pulse 2.2s ease-in-out infinite; }

    /* в”Җв”Җ з”ўз·ҡ в”Җв”Җ */
    .line { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; align-items: stretch; }
    .station {
      flex: 1 1 0; min-width: 150px; display: flex; flex-direction: column;
      background: var(--bg); border: 1px solid var(--border-l); border-radius: 10px; overflow: hidden;
    }
    .st-head {
      display: flex; align-items: center; gap: 7px; padding: 9px 11px;
      border-bottom: 1px solid var(--border-l); position: sticky; top: 0; background: var(--surface); z-index: 2;
    }
    .st-ico { font-size: 15px; }
    .st-name { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .03em; color: var(--text); flex: 1; }
    .st-cnt { font-family: var(--mono); font-size: 11px; color: var(--sub);
      background: var(--border-l); border-radius: 10px; padding: 1px 8px; min-width: 22px; text-align: center; }
    .st-active .st-name { color: var(--accent); }
    .lane { display: flex; flex-direction: column; gap: 9px; padding: 11px 9px; overflow-y: auto;
      max-height: 560px; min-height: 60px; }
    .lane.done { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px,1fr)); gap: 7px; }

    /* жӣёеҚЎ */
    .book { position: relative; cursor: pointer; border-radius: 7px; transition: transform .55s cubic-bezier(.22,1,.36,1); }
    .book .cv { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border); background: var(--border-l); box-shadow: 0 1px 4px rgba(0,0,0,.18); }
    .book .cv img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .book .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-family: var(--serif, Georgia, serif); font-size: 20px; font-weight: 700; color: #fff; text-align: center; padding: 4px; }
    .crawl-ph { background: linear-gradient(135deg, #3a7bd5, #2b5876); font-size: 30px !important; }
    .math-ph { background: linear-gradient(135deg, #7b5cd6, #4a2b87) !important; }  /* ж•ёеӯё sweep agent */
    .cn-reason { padding: 2px 4px 6px; }  /* зҲ¬жӣёз«ҷж°ҙдҪҚ / ж•ёеӯё sweep ж®ҳйӨҳеҺҹеӣ иЎҢ */
    /* ж•ёеӯё sweep жҠҪеұңпјҡж®ҳйӨҳжңҖеӨҡжӣёжё…е–®пјҲеҸҜй»һйҖІи©Іжӣёпјү*/
    .math-row { cursor: pointer; }
    .math-row:hover .lbl { color: var(--accent); }
    /* ж•ёеӯё sweep е°ҫз«ҷеҸҜй»һпјҲй–Ӣ corpus жҠҪеұңпјүвҶ’ ж•ҙз«ҷ hover жҸҗзӨә */
    .station.st-clickable { cursor: pointer; }
    .station.st-clickable:hover .st-name { color: var(--accent); }
    /* е·ІдёҠз«ҷдҪҶ catalog/sol д»Қеҫ…зІҫдҝ®зҡ„жӣёпјҡdone еҚЎеҸідёҠи§’ рҹ”§пјҲдёҠз«ҷе®ҢжҲҗвү е…ЁйғЁе®ҢзҫҺпјү */
    .refine-badge { position: absolute; top: -5px; right: -5px; z-index: 3; font-size: 11px;
      line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
    /* qc/triage жӢ’гҖҒз„Ўжәҗ = е·Іж·ҳжұ°пјҡзҙ…и§’жЁҷ + еҚЎзүҮж·ЎеҢ–пјҢиҰ–иҰәеҚҖеҲҘж–јгҖҢеҫ…иҷ•зҗҶгҖҚ */
    .reject-badge { position: absolute; left: 4px; top: 4px; z-index: 3; font-family: var(--mono);
      font-size: 9px; background: rgba(176,42,42,.88); color: #fff; padding: 1px 5px; border-radius: 4px; }
    .book.rejected .cv { opacity: .5; filter: grayscale(.5); }
    .dm-word { font-family: var(--mono); font-size: 12px; color: var(--ink-light); font-weight: 600; margin-left: 2px; }
    .book .ttl { font-family: var(--mono); font-size: 10px; color: var(--ink-light); margin-top: 4px; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .book:hover { transform: translateY(-3px); }
    .book:hover .cv { border-color: var(--accent); }
    .lane.done .book .ttl { display: none; }
    .lane.done .book .cv { border-radius: 4px; }

    /* йЎҢ/и§Је°Ҹз«  */
    .ps-badge { position: absolute; left: 4px; bottom: 4px; font-family: var(--mono); font-size: 9px;
      background: rgba(0,0,0,.62); color: #f1ead9; padding: 0 5px; border-radius: 4px; backdrop-filter: blur(2px); }

    /* еҢ дәәпјҲworkerпјүз–ҠеңЁжӣёеҚЎ вҖ” з¶Ғ slug */
    .walker { position: absolute; top: -7px; right: -7px; z-index: 3; display: flex; align-items: center; gap: 4px;
      background: var(--accent); color: #1c1a14; border-radius: 12px; padding: 2px 7px 2px 4px;
      font-family: var(--mono); font-size: 9.5px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,.35);
      white-space: nowrap; animation: bob 2.2s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-3px) rotate(2deg)} }
    .walker .face { font-size: 12px; line-height: 1; }
    .book.working .cv { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), 0 2px 10px rgba(0,0,0,.3); }
    .work-ring { position: absolute; inset: -3px; border-radius: 8px; border: 2px solid var(--accent);
      opacity: 0; animation: ring 1.8s ease-out infinite; pointer-events: none; }
    @keyframes ring { 0%{opacity:.7; transform:scale(.97)} 100%{opacity:0; transform:scale(1.06)} }

    /* в”Җв”Җ е·ҘдәәжҠҪеұңпјҲе®Ңж•ҙ tool-use еҸҜж»ҫпјү в”Җв”Җ */
    .drawer-mask { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none;
      transition: opacity .25s ease; z-index: 40; }
    .drawer-mask.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; height: 100%; width: min(440px, 92vw);
      background: var(--surface); border-left: 1px solid var(--border); z-index: 41;
      transform: translateX(100%); transition: transform .3s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column; }
    .drawer.open { transform: translateX(0); }
    .dr-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
    .dr-cv { width: 52px; aspect-ratio: 3/4; border-radius: 4px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); background: var(--border-l); }
    .dr-cv img { width: 100%; height: 100%; object-fit: cover; }
    .dr-cv .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-family: var(--serif,serif); }
    .dr-tt { flex: 1; min-width: 0; }
    .dr-tt b { font-size: 15px; color: var(--text); display: block; line-height: 1.3; }
    .dr-tt .sub { font-family: var(--mono); font-size: 11px; color: var(--sub); margin-top: 3px; }
    .dr-close { background: none; border: 1px solid var(--border); color: var(--sub); border-radius: 6px;
      width: 28px; height: 28px; cursor: pointer; flex-shrink: 0; font-size: 15px; line-height: 1; }
    .dr-meta { padding: 10px 16px; border-bottom: 1px solid var(--border-l); font-family: var(--mono); font-size: 11px; color: var(--ink-light);
      display: flex; flex-wrap: wrap; gap: 6px 16px; }
    .dr-meta b { color: var(--accent); }
    .dr-status { flex-basis: 100%; font-size: 12.5px; font-weight: 600; padding: 5px 9px; border-radius: 6px;
      border: 1px solid var(--border); }
    .dr-st-work { color: var(--accent); border-color: var(--accent); }
    .dr-st-done { color: var(--status-ok, #4caf50); }
    .dr-st-wait { color: var(--status-warn, #d9a441); }
    .dr-st-ready { color: var(--sub); }
    .dr-evs { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .ev { display: flex; gap: 8px; align-items: baseline; font-family: var(--mono); font-size: 11.5px;
      color: var(--ink-light); padding: 4px 0; border-bottom: 1px solid var(--border-l); }
    .ev:last-child { border-bottom: none; }
    .ev .ico { flex-shrink: 0; } .ev .n { flex-shrink: 0; color: var(--sub); width: 26px; text-align: right; }
    .ev .lbl { flex: 1; white-space: pre-wrap; word-break: break-word; }
    .ev.text .lbl { color: var(--text); }
    .dr-tl { padding: 8px 16px 16px; border-top: 1px solid var(--border-l); }
    .dr-tl .h { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--sub); margin-bottom: 6px; letter-spacing: .05em; }
    .tlrow { display: flex; gap: 9px; align-items: baseline; font-family: var(--mono); font-size: 11px; color: var(--ink-light); padding: 2px 0; }
    .tlrow .stg { min-width: 120px; color: var(--text); }
    .tlrow .at { color: var(--sub); } .tlrow .du { color: var(--accent); }
    .dr-empty { color: var(--sub); font-family: var(--mono); font-size: 12px; padding: 16px; text-align: center; }
    .dr-back { font-size: 16px; line-height: 1; }

    /* в”Җв”Җ agent жӯ·зЁӢпјҲper-book жҠҪеұңеә• + corpus йқўжқҝе…ұз”Ё session rowпјү в”Җв”Җ */
    .dr-hist { padding: 8px 16px 16px; border-top: 1px solid var(--border-l); }
    .dr-hist .h { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--sub); margin-bottom: 6px; letter-spacing: .05em; }
    .sess { display: flex; gap: 9px; align-items: baseline; font-family: var(--mono); font-size: 11.5px;
      color: var(--ink-light); padding: 6px 8px; margin: 2px 0; border: 1px solid var(--border-l); border-radius: 6px;
      cursor: pointer; flex-wrap: wrap; }
    .sess:hover { border-color: var(--accent); background: var(--bg); }
    .sess .sv { color: var(--text); font-weight: 600; min-width: 92px; }
    .sess .sm { color: var(--sub); }
    .sess .st { color: var(--sub); margin-left: auto; }
    .sess .sd { color: var(--ink-light); }
    .sess .sk-ok { color: var(--status-ok, #4caf50); font-weight: 700; }
    .sess .sk-bad { color: var(--status-danger, #d9534f); font-weight: 700; }
    .sess .corp { color: var(--accent); }
    #corpus .sess { font-size: 12px; }

    /* в”Җв”Җ йЎҚеәҰжўқ / йҢҜиӘӨ / logпјҲж¬ЎиҰҒйқўжқҝпјҢжІҝз”ЁиҲҠжЁЈејҸпјү в”Җв”Җ */
    .dev-bar-row { display: flex; align-items: center; gap: 12px; margin: 7px 0; }
    .dev-bar-row .name { font-family: var(--mono); font-size: 12px; width: 180px; flex-shrink: 0; color: var(--text); }
    .dev-bar { flex: 1; height: 8px; background: var(--border-l); border-radius: 4px; overflow: hidden; }
    .dev-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
    .dev-bar-row .num { font-family: var(--mono); font-size: 11px; color: var(--sub); width: 96px; text-align: right; flex-shrink: 0; }
    .dev-err { border-left: 3px solid var(--status-danger); padding: 6px 10px; margin: 6px 0; font-family: var(--mono);
      font-size: 12px; color: var(--text); background: var(--bg); border-radius: 0 4px 4px 0; word-break: break-word; }
    .dev-err .src { color: var(--sub); margin-right: 8px; }
    .dev-ok-msg { color: var(--status-known); font-family: var(--mono); font-size: 13px; }
    .dev-log { font-family: var(--mono); font-size: 11px; line-height: 1.5; color: var(--ink-light); background: var(--bg);
      border: 1px solid var(--border-l); border-radius: 6px; padding: 10px 12px; max-height: 300px; overflow: auto;
      white-space: pre-wrap; word-break: break-word; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 760px) { .cols { grid-template-columns: 1fr; } }
    .dev-foot { font-family: var(--mono); font-size: 11px; color: var(--sub); text-align: center; margin-top: 8px; }
    .spin { display: inline-block; animation: sp 1s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="topbar" class="qbk-topbar">
    <div class="system-tabs">
      <a href="../">Library</a>
      <span class="system-tabs-divider"></span>
      <a class="active" href="#">Dev</a>
    </div>
    <div class="topbar-spacer"></div>
    <span class="meta qbk-result-count" id="updated"></span>
    <button class="qbk-control-btn compact" id="btn-refresh" type="button" title="з«ӢеҚіеҲ·ж–°">вҶ» refresh</button>
    <div class="qbk-segmented" id="seg-theme" style="margin-left:4px">
      <button data-theme="auto">Auto</button>
      <button data-theme="light">Light</button>
      <button data-theme="dark">Dark</button>
    </div>
  </div>

  <div class="dev-wrap">
    <!-- з”ўз·ҡпјҲheroпјүпјҡdaemon зӢҖж…ӢжҠҳйҖІжЁҷйЎҢпјҢеҺ»йҷӨдёҠж–№еҶ—йӨҳ health жўқ -->
    <div class="dev-panel">
      <h2>иЈҪжӣёз”ўз·ҡ <span class="dev-dot" id="dm-dot"></span><span class="dm-word" id="dm-word"></span>
        <span class="dev-label" id="line-sub"></span></h2>
      <div class="line" id="line"></div>
    </div>

    <!-- ж¬ЎиҰҒпјҡйЎҚеәҰ / йҢҜиӘӨ -->
    <div class="cols">
      <div class="dev-panel">
        <h2>MinerU д»Ҡж—ҘйҖҒй Ғ <span class="dev-label" id="budget-date"></span></h2>
        <div id="budget"></div>
        <h2 style="margin-top:14px">zlib еёіиҷҹйЎҚеәҰ <span class="dev-label" id="zlib-total"></span></h2>
        <div id="zlib"></div>
      </div>
      <div class="dev-panel" id="p-err">
        <h2 id="err-head">йҢҜиӘӨ</h2>
        <div id="errors"></div>
      </div>
    </div>

    <!-- corpus дҪңжҘӯпјҲйқһе–®жӣё agentпјҡcrawl_plan / math_sweepпјү-->
    <div class="dev-panel" id="p-corpus" hidden>
      <h2>Corpus дҪңжҘӯ <span class="dev-label">йқһе–®жӣё agentпјҲcrawl_plan / math_sweepпјүВ· й»һй–ӢзңӢе®Ңж•ҙжӯ·зЁӢ</span></h2>
      <div id="corpus"></div>
    </div>

    <!-- log -->
    <div class="dev-panel">
      <h2>daemon.log е°ҫж®ө <span class="dev-label">(UTC)</span></h2>
      <div class="dev-log" id="log"></div>
    </div>

    <div class="dev-foot" id="foot"></div>
  </div>

  <!-- е·ҘдәәжҠҪеұң -->
  <div class="drawer-mask" id="dr-mask"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="dr-head">
      <button class="dr-close" id="dr-back" title="иҝ”еӣһ" hidden>вҶҗ</button>
      <div class="dr-cv" id="dr-cv"></div>
      <div class="dr-tt"><b id="dr-title">вҖ”</b><span class="sub" id="dr-sub"></span></div>
      <button class="dr-close" id="dr-close" title="й—ңй–ү">вң•</button>
    </div>
    <div class="dr-meta" id="dr-meta"></div>
    <div class="dr-evs" id="dr-evs"></div>
    <div class="dr-tl" id="dr-tl"></div>
    <div class="dr-hist" id="dr-hist"></div>
  </aside>

  <script>
  const { fetchJson, relTime, escapeHtml } = QBankShared
  const REFRESH_MS = 8000, CLOCK_MS = 1000, WORKERS_MS = 2000
  let timer = null, clockTimer = null, workersTimer = null
  let last = null, lastWorkers = []
  let openSlug = null   // жҠҪеұңз•¶еүҚз¶Ғе®ҡзҡ„жӣё
  let openWkey = null   // жҠҪеұңз¶Ғе®ҡзҡ„ workerпјҲзҲ¬жӣё / ж•ёеӯё sweep agentпјҢз„Ўжӣёжң¬еҜҰй«”жҷӮз”Ёпјү
  let openMath = false  // жҠҪеұңйЎҜзӨә corpus ж•ёеӯёж®ҳйӨҳзёҪиҰҪпјҲй»һж•ёеӯё sweep е°ҫз«ҷпјү
  let openSession = null, openSessionFrom = null  // жӯ·еҸІ session йҮҚж’ӯ + иҝ”еӣһдҫҶжәҗжӣё
  const sessEventCache = new Map()  // session id вҶ’ е®Ңж•ҙдәӢд»¶пјҲжҮ¶ијүдёҖж¬ЎпјӣеҸӘеҝ«еҸ–жҲҗеҠҹзөҗжһңпјү
  const sessById = new Map()        // session id вҶ’ ж‘ҳиҰҒпјҲrender жҷӮе»әжӘ”пјӣй»һж“Ҡи§ЈжһҗдёҚдҫқиіҙ live last churnпјү

  // в”Җв”Җ дё»йЎҢпјҲиҲҮ reader е…ұз”Ёпјү в”Җв”Җ
  const SETTINGS_KEY = 'textbook.settings.v1'
  const darkMQ = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null
  function readTheme() { try { return (JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}').theme) || 'auto' } catch { return 'auto' } }
  function writeTheme(t) { let s={}; try{s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}catch{} s.theme=t; localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)) }
  function applyTheme() {
    const t = readTheme(), dark = t === 'dark' || (t === 'auto' && darkMQ && darkMQ.matches)
    document.body.setAttribute('data-theme', dark ? 'dark' : 'light')
    document.querySelectorAll('#seg-theme button').forEach(b => b.classList.toggle('active', b.dataset.theme === t))
  }
  document.querySelectorAll('#seg-theme button').forEach(b => b.addEventListener('click', () => { writeTheme(b.dataset.theme); applyTheme() }))
  if (darkMQ) darkMQ.addEventListener('change', applyTheme)
  applyTheme()

  // в”Җв”Җ з”ўз·ҡз«ҷеҸ°е®ҡзҫ©пјҲдҫқ stage еүҚе°Һзўј + deployed жҳ е°„пјү в”Җв”Җ
  const STATIONS = [
    { ico: 'рҹ“Ҙ', name: 'зҲ¬жӣё crawl', crawl: true },
    { ico: 'рҹ“Ё', name: 'еҫ… OCR' },
    { ico: 'рҹӣ°пёҸ', name: 'OCR йӣІз«Ҝ' },
    { ico: 'рҹ”Қ', name: 'зЁҪж ё audit' },
    { ico: 'рҹ§©', name: 'и§Јжһҗ parse' },
    { ico: 'рҹ“ҡ', name: 'з·Ёзӣ® catalog' },
    { ico: 'вң…', name: 'дёҠз«ҷе®ҢжҲҗ' },
    { ico: 'рҹ§®', name: 'ж•ёеӯё sweep', math: true },  // йҡҠе°ҫ corpus ж”¶е°ҫ agentпјҲе°ҚзЁұйҡҠй ӯ crawlпјүпјӣдёҚж”ҫжӣёгҖҒж”ҫи·Ёжӣё agent + ж®ҳйӨҳ
  ]
  const DONE_ST = 6
  const MATH_ST = 7
  function stationOf(b) {  // жӣёжң¬дёҖеҫӢиҗҪеңЁ 1..6пјӣз«ҷеҸ° 0пјҲзҲ¬жӣёпјүеҸӘж”ҫ crawl agentпјҢдёҚж”ҫжӣё
    if (b.deployed) return DONE_ST
    const c = (b.stage || '').trim().split(' ')[0]
    if (c === '4') return DONE_ST
    if (c === '3') return 5
    if (c === '2') return 4
    if (c === '1') return 3
    if (c === '0.5') return 2
    return 1  // X / 0 еҫ… ingest
  }
  // crawl agentпјҡslug=nullгҖҒverb=crawl_plan вҶ’ йҒҺеҺ» applyWalkers з–ҠдёҚеҲ°д»»дҪ•жӣёеҚЎиҖҢе®Ңе…ЁйҡұеҪўгҖӮ
  // ж”№еңЁгҖҢзҲ¬жӣёгҖҚз«ҷеҸ°зӣҙжҺҘд»Ҙ worker жёІжҹ“пјҢеӣһзӯ”гҖҢзҸҫеңЁжңүжІ’жңү agent еңЁзҲ¬жӣёгҖҚгҖӮ
  function crawlWorkers() { return liveWorkers().filter(w => w.verb === 'crawl_plan' || w.verb === 'crawl') }
  // дёҖеҸҘи©ұи¬ӣжё…жҘҡгҖҢйҖҷжң¬жӣёжӯӨеҲ»еҲ°еә•еңЁе№№еҳӣ / еҚЎдёҚеҚЎгҖҚвҖ”вҖ”з”ўз·ҡжңҖеёёиў«е•Ҹзҡ„е•ҸйЎҢ
  function statusText(b, w) {
    if (w) return { cls: 'work', txt: `рҹ”§ е·Ҙдәәиҷ•зҗҶдёӯ В· ${w.verb || ''}` }
    if (b.deployed) return { cls: 'done', txt: 'вң… е·ІдёҠз«ҷе®ҢжҲҗ' }
    const mand = (b.todo || '').trim().split(/\s+/)
      .filter(t => t && t !== 'вҖ”' && !t.endsWith('(еҸҜйҒё)'))
    if (mand.length) return { cls: 'wait', txt: `вҸі еҫ… ${mand[0].split('(')[0]}пјҲжҡ«з„Ўе·ҘдәәпјҢдёӢеҖӢ cycle жҙҫпјү` }
    return { cls: 'ready', txt: 'вҳ‘ е·Іе®Ңе·ҘпјҢеҫ…йғЁзҪІ / еҸҜйҒёзҝ»иӯҜпјҲйқһеҚЎй—ңпјү' }
  }
  // йЎҢ/и§ЈеҫҪз« пјҡжңүи§Јзӯ”жң¬жүҚйЎҜзӨәгҖҢи§Ј/йЎҢгҖҚжҜ”пјӣеҗҰеүҮеҸӘе ұйЎҢж•ёпјҢйҒҝе…ҚгҖҢ0/371гҖҚиӘӨи®ҖжҲҗеҚЎдҪҸ
  function probBadge(b) {
    if (!b.prob) return ''
    return `<span class="ps-badge">${b.sol_book ? (b.sol || 0) + '/' + b.prob : b.prob + ' йЎҢ'}</span>`
  }
  // slug вҶ’ з©©е®ҡиүІпјҲе°ҒйқўдҪ”дҪҚз”Ёпјү
  function hue(s) { let h = 0; for (const ch of s) h = (h * 31 + ch.charCodeAt(0)) % 360; return h }
  function coverHtml(b, big) {
    if (b.cover) return `<img src="${escapeHtml(b.cover)}" loading="lazy" alt="">`
    const init = (b.title || b.slug).replace(/[^A-Za-z0-9 ]/g, '').split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase()
    const h = hue(b.slug)
    return `<div class="ph" style="background:linear-gradient(135deg,hsl(${h} 38% 42%),hsl(${(h+40)%360} 42% 30%))">${escapeHtml(init || '?')}</div>`
  }

  // в”Җв”Җ е·Ҙдәәпјҡslug вҶ’ workerпјҲlive workers.jsonпјү в”Җв”Җ
  function workerOf(slug) { return lastWorkers.find(w => w.slug === slug) }
  function liveWorkers() {
    return lastWorkers.filter(w => { const t = w.started ? Date.parse(w.started) : 0; return !t || (Date.now() - t) < 3600e3 })
  }

  // в”Җв”Җ з«ҷеҸ°йӘЁжһ¶пјҡдёҖж¬Ўе»әеҘҪгҖҒж°ёдёҚйҮҚз”ҹпјҲroot-cause 1 дҝ®пјҡеҒңжӯўжҜҸ 8s е…Ё innerHTML йҮҚе»әпјүв”Җв”Җ
  // д№ӢеҫҢеҸӘеӢ• lane е…§еҚЎзүҮ + st-cnt + st-activeгҖӮжӣё lane иө° 8s status cadenceгҖҒзҲ¬жӣё lane иө° 2s worker cadenceгҖӮ
  const stationEls = [], laneEls = [], cntEls = []
  let crawlReasonEl = null, mathReasonEl = null
  function buildScaffold() {
    const lineEl = document.getElementById('line')
    lineEl.innerHTML = ''
    STATIONS.forEach((st, i) => {
      const done = i === DONE_ST
      const station = document.createElement('div')
      station.className = 'station' + (st.math ? ' st-clickable' : '')  // е°ҫз«ҷй»һй–Ӣ corpus ж•ёеӯёжҠҪеұң
      station.innerHTML = `<div class="st-head"><span class="st-ico">${st.ico}</span>`
        + `<span class="st-name">${escapeHtml(st.name)}</span><span class="st-cnt">0</span></div>`
        + ((st.crawl || st.math) ? '<div class="cn-reason dev-label"></div>' : '')
        + `<div class="lane${done ? ' done' : ''}"></div>`
      lineEl.appendChild(station)
      stationEls[i] = station
      laneEls[i] = station.querySelector('.lane')
      cntEls[i] = station.querySelector('.st-cnt')
      if (st.crawl) crawlReasonEl = station.querySelector('.cn-reason')
      if (st.math) mathReasonEl = station.querySelector('.cn-reason')
    })
  }

  // в”Җв”Җ йҖҡз”Ё keyed reconcileпјҡDOM жңү desired з„ЎвҶ’з§»йҷӨпјӣdesired жңү DOM з„ЎвҶ’е»әз«ӢпјӣзҡҶжңүвҶ’е°ұең°жӣҙж–°гҖӮ
  // з¶ӯжҢҒ desired й ҶеәҸпјҲinsertBefore anchorпјүпјҢз„Ў FLIP йҮҸжё¬гҖҒз„Ўе…ЁзӣӨйҮҚе»әгҖӮз©әжҷӮж”ҫ placeholderгҖӮв”Җв”Җ
  function reconcileLane(laneEl, desired, keyOf, makeEl, updateEl, emptyHtml) {
    const ph0 = laneEl.querySelector('.lane-empty')
    if (ph0 && desired.length) ph0.remove()
    const existing = new Map()
    for (const el of [...laneEl.children]) if (el.__key !== undefined) existing.set(el.__key, el)
    const keySet = new Set(desired.map(keyOf))
    for (const [k, el] of existing) if (!keySet.has(k)) { el.remove(); existing.delete(k) }
    let anchor = laneEl.firstElementChild
    for (const item of desired) {
      const k = keyOf(item)
      let el = existing.get(k)
      if (el) updateEl(el, item)
      else { el = makeEl(item); el.__key = k }
      if (el === anchor) anchor = anchor.nextElementSibling
      else laneEl.insertBefore(el, anchor)
    }
    if (!desired.length && !laneEl.querySelector('.lane-empty'))
      laneEl.insertAdjacentHTML('beforeend', emptyHtml)
  }

  // в”Җв”Җ жӣёеҚЎ builder / updaterпјҲroot-cause Cпјҡimg strict === жүҚжҸӣ srcпјҢдёҚйҮҚи§ёзҷј lazy йҮҚијүпјүв”Җв”Җ
  function setCover(cvEl, b) {
    if (b.cover) {
      let img = cvEl.querySelector('img')
      if (!img) {
        cvEl.querySelector('.ph')?.remove()
        img = document.createElement('img'); img.loading = 'lazy'; img.alt = ''
        cvEl.insertBefore(img, cvEl.firstChild)
      }
      if (img.getAttribute('src') !== b.cover) img.setAttribute('src', b.cover)  // е®Ңе…ЁзӣёеҗҢпјҲеҗ« ?v=пјүзө•дёҚзў°
    } else if (!cvEl.querySelector('.ph')) {
      cvEl.querySelector('img')?.remove()
      const init = (b.title || b.slug).replace(/[^A-Za-z0-9 ]/g, '').split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase()
      const h = hue(b.slug)
      const ph = document.createElement('div'); ph.className = 'ph'
      ph.style.background = `linear-gradient(135deg,hsl(${h} 38% 42%),hsl(${(h+40)%360} 42% 30%))`
      ph.textContent = init || '?'
      cvEl.insertBefore(ph, cvEl.firstChild)
    }
  }
  function setBadge(cvEl, b) {
    let badge = cvEl.querySelector('.ps-badge')
    if (!b.prob) { badge?.remove(); return }
    const txt = b.sol_book ? (b.sol || 0) + '/' + b.prob : b.prob + ' йЎҢ'
    if (!badge) { badge = document.createElement('span'); badge.className = 'ps-badge'; cvEl.appendChild(badge) }
    if (badge.textContent !== txt) badge.textContent = txt
  }
  function updateBookEl(el, b, done) {
    const t = b.title || b.slug
    if (el.title !== t) el.title = t
    if (!done) {
      let ttl = el.querySelector('.ttl')
      if (!ttl) { ttl = document.createElement('div'); ttl.className = 'ttl'; el.appendChild(ttl) }
      if (ttl.textContent !== t) ttl.textContent = t
    }
    const cv = el.querySelector('.cv')
    setCover(cv, b); setBadge(cv, b)  // дёҚзў° .work-ring/.walkerпјҲapplyWalkers иҮӘз®Ўпјү
    setRefine(cv, b); setReject(cv, b)
    el.classList.toggle('rejected', !b.deployed && /^[RX]/.test((b.stage || '').trim()))
  }
  // qc/triage жӢ’пјҲRпјүжҲ–з„ЎжәҗпјҲXпјү= е·Іж·ҳжұ°гҖҒдёҚжңғиў«иҷ•зҗҶ вҶ’ и§’жЁҷжЁҷзӨәпјҢиҰ–иҰәдёҠеҚҖеҲҘж–јгҖҢеҫ…иҷ•зҗҶгҖҚ
  function setReject(cvEl, b) {
    const c = (b.stage || '').trim()[0]
    let r = cvEl.querySelector('.reject-badge')
    if ((c === 'R' || c === 'X') && !b.deployed) {
      const lbl = c === 'X' ? 'вң— з„Ўжәҗ' : 'вң— ' + ((b.stage || '').trim().split(/\s+/).slice(1).join('') || 'жӢ’')
      if (!r) { r = document.createElement('span'); r.className = 'reject-badge'; cvEl.appendChild(r) }
      if (r.textContent !== lbl) r.textContent = lbl
    } else if (r) { r.remove() }
  }
  // е·ІдёҠз«ҷдҪҶд»Қжңүеј·еҲ¶еҫ…иҫҰпјҲcatalog_audit/sol_extractпјүвҶ’ и§’жЁҷ рҹ”§пјҢжЁҷзӨәгҖҢжңҚеӢҷдёӯгҖҒе“ҒжӘўзІҫдҝ®дёӯгҖҚ
  function setRefine(cvEl, b) {
    let r = cvEl.querySelector('.refine-badge')
    if (b.deployed && hasMand(b)) {
      if (!r) { r = document.createElement('span'); r.className = 'refine-badge'; r.textContent = 'рҹ”§'; cvEl.appendChild(r) }
    } else if (r) r.remove()
  }
  function makeBookEl(b, done) {
    const el = document.createElement('div')
    el.className = 'book'; el.dataset.slug = b.slug
    el.appendChild(Object.assign(document.createElement('div'), { className: 'cv' }))
    updateBookEl(el, b, done)
    return el
  }

  // в”Җв”Җ зҲ¬жӣёеҚЎ builder / updaterпјҲstation 0пјҢиө° 2s worker cadenceпјүв”Җв”Җ
  function makeCrawlEl(w) {
    const el = document.createElement('div')
    el.className = 'book crawl-card working'; el.dataset.wkey = w.key; el.title = 'зҲ¬жӣё agent'
    el.innerHTML = '<div class="cv"><div class="ph crawl-ph">рҹӨ–</div><div class="work-ring"></div></div><div class="ttl"></div>'
    updateCrawlEl(el, w)
    return el
  }
  function updateCrawlEl(el, w) {
    const ttl = el.querySelector('.ttl'), txt = `иҰҸеҠғйҒёжӣё В·${w.total_calls || 0}`
    if (ttl.textContent !== txt) ttl.textContent = txt
  }

  // жӣё laneпјҲз«ҷ 1..6пјүе°ұең° reconcile вҖ”вҖ” 8s status cadence
  function reconcileBooks(d) {
    const buckets = STATIONS.map(() => [])
    d.books.forEach(b => buckets[stationOf(b)].push(b))
    for (let i = 0; i < STATIONS.length; i++) {
      if (STATIONS[i].crawl || STATIONS[i].math) continue  // з«ҷ 0 зҲ¬жӣё / з«ҷ 7 ж•ёеӯё sweep = agent з«ҷпјҢдёҚж”ҫжӣё
      const done = i === DONE_ST, bs = buckets[i]
      reconcileLane(laneEls[i], bs, b => b.slug,
        b => makeBookEl(b, done), (el, b) => updateBookEl(el, b, done),
        '<div class="dev-label lane-empty" style="padding:6px 2px">вҖ”</div>')
      if (cntEls[i].textContent !== String(bs.length)) cntEls[i].textContent = bs.length
      stationEls[i].classList.toggle('st-active', bs.length > 0)
    }
    applyWalkers()
  }

  // зҲ¬жӣё laneпјҲз«ҷ 0пјүе°ұең° reconcile вҖ”вҖ” 2s worker cadenceпјҲroot-cause EпјҡзҲ¬жӣёеҚЎжҳҜ live-worker иіҮж–ҷпјүгҖӮ
  // жңү agent еңЁзҲ¬ вҶ’ йЎҜзӨә agent еҚЎпјӣй–’зҪ® вҶ’ еҸӘйЎҜзӨәж°ҙдҪҚеҺҹеӣ иЎҢпјҲbacklog жӣёжң¬е°ұеңЁеҗ„иҮӘз«ҷеҸ°пјҢдёҚеңЁжӯӨйҮҚиӨҮеҲ—пјүгҖӮ
  function reconcileCrawl() {
    const cw = crawlWorkers()
    const reason = (last && last.crawl && last.crawl.reason) || 'й–’зҪ® В· з„Ў agent зҲ¬жӣё'
    if (crawlReasonEl && crawlReasonEl.textContent !== reason) crawlReasonEl.textContent = reason
    reconcileLane(laneEls[0], cw, w => w.key, makeCrawlEl, updateCrawlEl,
      '<div class="dev-label lane-empty" style="padding:6px 2px">вҖ”</div>')
    if (cntEls[0].textContent !== String(cw.length)) cntEls[0].textContent = cw.length
    stationEls[0].classList.toggle('st-active', cw.length > 0)
  }

  // в”Җв”Җ ж•ёеӯё sweep laneпјҲз«ҷ 7пјҢе°ҚзЁұ crawlпјүпјҡcorpus-level ж”¶е°ҫ agentпјҲslug=null вҶ’ дёҚз–ҠжӣёеҚЎпјҢ
  // еҗҢ crawl зҡ„йҡұеҪў worker е•ҸйЎҢпјҢйқ жң¬з«ҷзӣҙжҺҘжёІжҹ“гҖӮcount=еҫ…жё…жӣёж•ёгҖҒreason=ж®ҳйӨҳ/й–ҖжӘ»/дёҠж¬Ў sweepпјүв”Җв”Җ
  function mathWorkers() { return liveWorkers().filter(w => w.verb === 'math_sweep') }
  function makeMathEl(w) {
    const el = document.createElement('div')
    el.className = 'book crawl-card working'; el.dataset.wkey = w.key; el.title = 'ж•ёеӯё sweep agent'
    el.innerHTML = '<div class="cv"><div class="ph crawl-ph math-ph">рҹ§®</div><div class="work-ring"></div></div><div class="ttl"></div>'
    updateMathEl(el, w)
    return el
  }
  function updateMathEl(el, w) {
    const ttl = el.querySelector('.ttl'), txt = `и·Ёжӣёжё…ж®ҳ В·${w.total_calls || 0}`
    if (ttl.textContent !== txt) ttl.textContent = txt
  }
  function mathReason() {
    const m = last && last.math
    if (!m) return 'вҖ”'
    if (!m.node_available) return 'node зјә В· жңӘй©—иӯү'
    const sw = m.last_sweep ? ` В· дёҠж¬Ў ${relTime(m.last_sweep.at)} ж”№ ${(m.last_sweep.touched || []).length} жӣё`
                            : ' В· е°ҡжңӘ sweep'
    return `ж®ҳ ${m.corpus_bad_occ} occ В· ${m.due ? 'еҫ… sweep' : 'еҒҘеә·'}${sw}`
  }
  function reconcileMath() {
    const mw = mathWorkers(), m = last && last.math
    const reason = mathReason()
    if (mathReasonEl && mathReasonEl.textContent !== reason) mathReasonEl.textContent = reason
    reconcileLane(laneEls[MATH_ST], mw, w => w.key, makeMathEl, updateMathEl,
      '<div class="dev-label lane-empty" style="padding:6px 2px">вҖ”</div>')
    const cnt = m ? (m.books_with_residual || 0) : 0  // еҫ…жё…жӣёж•ёпјҲе·ІдёҠз«ҷгҖҒеғ…ж•ёеӯёж®ҳйӨҳпјү
    if (cntEls[MATH_ST].textContent !== String(cnt)) cntEls[MATH_ST].textContent = cnt
    stationEls[MATH_ST].classList.toggle('st-active', mw.length > 0 || !!(m && m.due))
  }

  // в”Җв”Җ жҠҠ live е·Ҙдәәз–ҠеҲ°е°ҚжҮү slug жӣёеҚЎпјҲroot-cause Dпјҡdiff-basedпјҢеҗҢе·ҘдәәдёҚ remove+йҮҚиІј вҶ’ bob дёҚйҮҚе•ҹпјүв”Җв”Җ
  const WFACE = { audit:'рҹ”Қ', catalog_audit:'рҹ“ҡ', qc:'рҹ‘ҒпёҸ', parse:'рҹ§©', sol_extract:'рҹ”—', crawl_plan:'рҹ“Ҙ' }
  function applyWalkers() {
    const bySlug = new Map(liveWorkers().map(w => [w.slug, w]))
    document.querySelectorAll('#line .book:not(.crawl-card)').forEach(el => {
      const w = bySlug.get(el.dataset.slug)
      let walker = el.querySelector('.walker')
      if (!w) {  // е·Ҙдәәйӣўй–Ӣ вҶ’ з§»йҷӨз–ҠеҠ пјҲеғ…еңЁ transition жҷӮж”№ DOMпјү
        if (walker) { walker.remove(); el.querySelector('.cv .work-ring')?.remove(); el.classList.remove('working') }
        return
      }
      el.classList.add('working')
      if (!el.querySelector('.cv .work-ring'))
        el.querySelector('.cv').insertAdjacentHTML('beforeend', '<div class="work-ring"></div>')
      if (!walker) {  // ж–°е·Ҙдәә вҶ’ е»әдёҖж¬Ў walkerпјӣд№ӢеҫҢеғ…жӣҙж–°ж–Үеӯ—гҖҒзҜҖй»һз•ҷеӯҳ вҶ’ bob еӢ•з•«дёҚдёӯж–·
        walker = document.createElement('div'); walker.className = 'walker'
        walker.innerHTML = '<span class="face"></span><span class="wt"></span>'
        el.appendChild(walker)
      }
      const face = WFACE[w.verb] || 'рҹӣ пёҸ', wt = `${w.verb || ''} В·${w.total_calls || 0}`
      const fEl = walker.querySelector('.face'), tEl = walker.querySelector('.wt')
      if (fEl.textContent !== face) fEl.textContent = face
      if (tEl.textContent !== wt) tEl.textContent = wt
    })
  }

  // в”Җв”Җ жҠҪеұңпјҡе®Ңж•ҙеҸҜж»ҫ tool-use в”Җв”Җ
  function _openDrawerEl() {
    document.getElementById('dr-mask').classList.add('open')
    document.getElementById('drawer').classList.add('open')
    document.getElementById('drawer').setAttribute('aria-hidden', 'false')
  }
  function openDrawer(slug) {
    openSlug = slug; openWkey = null; openMath = false; openSession = null; openSessionFrom = null
    document.getElementById('dr-back').hidden = true
    _openDrawerEl(); renderDrawer()  // жӣёжң¬еҲҶж”ҜжңғжёІ dr-histпјҲйҡЁ 2s/8s poll дҝқжҢҒ liveпјү
  }
  function openWorkerDrawer(wkey) {
    openWkey = wkey; openSlug = null; openMath = false; openSession = null
    document.getElementById('dr-back').hidden = true
    _openDrawerEl(); renderDrawer()
  }
  function openMathDrawer() {
    openMath = true; openSlug = null; openWkey = null; openSession = null
    document.getElementById('dr-back').hidden = true
    _openDrawerEl(); renderDrawer()
  }
  // жӯ·еҸІ session йҮҚж’ӯпјҡй–ӢжҠҪеұңе‘ҲзҸҫи©Іе ҙе®Ңж•ҙйҖҗдәӢд»¶пјҲfromSlug=еҫһжҹҗжӣёжӯ·зЁӢй»һйҖІдҫҶ вҶ’ йЎҜзӨәиҝ”еӣһйҲ•пјү
  function openSessionDrawer(summary, fromSlug) {

  // в”Җв”Җ жӯ·еҸІ agent sessionпјҲе®Ңж•ҙйҖҗдәӢд»¶пјҢжҮ¶ијү JSONLпјү в”Җв”Җ
  // еӣһдәӢд»¶йҷЈеҲ—пјҲ200пјҢеҗ«зңҹжӯЈз©әжӘ”еӣһ []пјүпјӣfetch еӨұж•— / 404пјҲе·Іиў« pruneпјүеӣһ null вҶ’ е‘јеҸ«з«ҜеҚҖеҲҶдё”дёҚеҝ«еҸ–
  async function fetchSessionEvents(id) {
    try {
      const res = await fetch('agent_history/sessions/' + encodeURIComponent(id) + '.jsonl?_=' + Date.now())
      if (!res.ok) return null
      const txt = await res.text()
      return txt.split('\n').filter(Boolean).map(l => { try { return JSON.parse(l) } catch (e) { return null } }).filter(Boolean)
    } catch (e) { return null }
  }
  function evRowsHtml(events) {
    if (!events || !events.length) return `<div class="dr-empty">пјҲжӯӨ session з„ЎдәӢд»¶пјү</div>`
    return events.map(r => {
      const ico = r.kind === 'tool' ? 'рҹ”§' : 'рҹ’¬'
      return `<div class="ev ${r.kind}"><span class="ico">${ico}</span><span class="n">${escapeHtml(r.t ? relTime(r.t) : '')}</span>`
        + `<span class="lbl">${escapeHtml(r.label || '')}</span></div>`
    }).join('')
  }
  function indexSessions(arr) { for (const s of (arr || [])) sessById.set(s.id, s) }
  function sessRowHtml(s) {
    const okCls = s.ok ? 'sk-ok' : 'sk-bad', okTxt = s.ok ? 'вң“' : `вң—rc${s.rc}`
    const corp = s.slug == null ? ` <span class="corp">corpus</span>` : ''
    // data-sid з”Ё encodeURIComponentпјҡid е…§еҗ« slugпјҲжӘ”еҗҚиЎҚз”ҹпјҢжңӘеҝ…зҙ” ASCII/з„Ўеј•иҷҹпјүвҶ’ йҳІеұ¬жҖ§жҲӘж–·
    return `<div class="sess" data-sid="${encodeURIComponent(s.id)}">`
      + `<span class="sv">${escapeHtml(s.verb || '')}${corp}</span>`
      + `<span class="sm">${escapeHtml(s.model || '')}(${escapeHtml(s.harness || '')})</span>`
      + `<span class="sd">${fmtDur(s.duration_s)} В· ${s.total_calls || 0}call</span>`
      + `<span class="st">${escapeHtml(s.started ? relTime(s.started) : '')}</span>`
      + `<span class="sk ${okCls}">${okTxt}</span></div>`
  }
  function renderDrawerHistory(b) {
    const ss = (b && b.sessions) || []
    indexSessions(ss)
    document.getElementById('dr-hist').innerHTML = ss.length
      ? `<div class="h">Agent жӯ·зЁӢ (${ss.length})</div>` + ss.map(sessRowHtml).join('')

  }
  // й»һж“Ҡи§Јжһҗпјҡз”Ё render з•¶дёӢе»әжӘ”зҡ„ sessByIdпјҲдёҚеҸ— last зҡ„ prune/зӘ—еҸЈ churn еҪұйҹҝпјү
  function findSession(id) { return sessById.get(id) || null }
  function renderSessionDrawer() {
    const s = openSession; if (!s) return

    document.getElementById('dr-meta').innerHTML =

      + `<span>жҷӮй•· <b>${fmtDur(s.duration_s)}</b></span><span><b>${s.total_calls || 0}</b> ж¬Ўе·Ҙе…·иӘҝз”Ё</span>`
      + (s.touched && s.touched.length ? `<span>ж”№еӢ• <b>${s.touched.length}</b> жӣё</span>` : '')
    document.getElementById('dr-tl').innerHTML = ''

    fetchSessionEvents(s.id).then(evs => {
      const stillOpen = openSession && openSession.id === s.id
      if (evs === null) {  // fetch еӨұж•— / е·Іиў« prune вҶ’ дёҚеҝ«еҸ–пјҲдёӢж¬ЎйҮҚй–ӢйҮҚи©ҰпјүпјҢжҳҺзӨәжңүеҲҘж–јгҖҢзңҹзҡ„з„ЎдәӢд»¶гҖҚ
        if (stillOpen) evsEl.innerHTML = `<div class="dr-empty">ијүе…ҘеӨұж•—жҲ–жӯ·зЁӢе·Іжё…йҷӨпјҢзЁҚеҫҢйҮҚи©Ұ</div>`

  // в”Җв”Җ е·Ҙе…·пјҡи·ЁеәҰж јејҸ в”Җв”Җ
  function fmtDur(s) { return s == null ? 'вҖ”' : (s < 90 ? `${s}s` : `${Math.round(s/60)}m`) }
  function fmtSpan(ms) {
    if (ms == null || ms < 0) return ''
    const s = Math.round(ms/1000); if (s < 90) return `${s}s`
    const m = Math.round(s/60); if (m < 90) return `${m}m`
    const h = ms/3.6e6; return h < 36 ? `${h.toFixed(1)}h` : `${(h/24).toFixed(1)}d`
  }
  function fmtCountdown(s) {
    if (s == null) return 'вҖ”'; if (s <= 0) return 'йҡЁжҷӮи§ёзҷј'
    const m = Math.floor(s/60), sec = Math.floor(s%60)
    return m < 1 ? `${sec}s еҫҢ` : (m < 60 ? `${m}m ${sec}s еҫҢ` : `${(m/60).toFixed(1)} жҷӮеҫҢ`)
  }
  function serverEpoch(d) { const t = d.generated_at_utc; return Date.parse(/(Z|[+-]\d\d:?\d\d)$/.test(t) ? t : t + 'Z') }
  function tickClocks() {
    if (!last) return
    const drift = (Date.now() - serverEpoch(last)) / 1000, dm = last.daemon
    const nx = document.getElementById('h-next')
    if (nx) nx.textContent = dm.next_tick_eta_s == null ? 'вҖ”' : fmtCountdown(dm.next_tick_eta_s - drift)
    const lt = document.getElementById('h-lasttick')
    if (lt && dm.last_tick_start_utc) lt.textContent = relTime(dm.last_tick_start_utc) + ' В· ' + fmtDur(dm.last_tick_duration_s)
    const up = document.getElementById('updated')
    if (up) up.textContent = 'жӣҙж–°ж–ј ' + relTime(last.generated_at_utc)
  }

  function renderHealth(d) {  // daemon зӢҖж…ӢжҠҳйҖІз”ўз·ҡжЁҷйЎҢпјҲdm-dot + dm-wordпјү
    const dm = d.daemon
    const healthy = dm.installed && (dm.last_exit_code === 0 || dm.last_exit_code === null)
    let dot, word
    if (!dm.installed) { dot = 'dot-bad'; word = 'daemon жңӘе®үиЈқ' }
    else if (dm.in_tick_now) { dot = 'dot-ok live'; word = 'controller йҒӢиҪүдёӯ' }
    else if (healthy) { dot = 'dot-ok'; word = 'еҫ…е‘Ҫ' }
    else { dot = 'dot-bad'; word = `з•°еёё exit=${dm.last_exit_code}` }
    const de = document.getElementById('dm-dot'); if (de) de.className = 'dev-dot ' + dot
    const we = document.getElementById('dm-word'); if (we) we.textContent = word
  }
  // еј·еҲ¶еҫ…иҫҰпјҲйқһ вҖ” йқһ еҸҜйҒёпјүпјҡеҚҖеҲҶгҖҢеҫ…иЈҪ(жңӘдёҠз«ҷ)гҖҚиҲҮгҖҢзІҫдҝ®(е·ІдёҠз«ҷд»Қжңү catalog/sol)гҖҚ
  function hasMand(b) { return (b.todo || '').split(/\s+/).some(t => t && t !== 'вҖ”' && !t.endsWith('(еҸҜйҒё)')) }
  function updateLineSub() {  // й ӮйғЁеҸӘе ұгҖҢжӯӨеҲ»е№ҫеҖӢе·ҘдәәгҖҚпјӣжң¬ж•ё/еҗ„йҡҺж®өж•ёзңӢдёӢж–№еҗ„ж¬„дҪҚеҚіеҸҜ
    if (!last) return
    const el = document.getElementById('line-sub'); if (!el) return
    el.textContent = `В· е·Ҙдәә ${liveWorkers().length} рҹӣ пёҸ`
  }

  // per-field gatingпјҲroot-cause FпјүпјҡеҖјжңӘи®ҠдёҚеҜ« DOMпјҢйқңзҪ®жҷӮдёҚи§ёзҷј paint
  function setHtml(id, html) { const el = document.getElementById(id); if (el && el.__h !== html) { el.__h = html; el.innerHTML = html } }
  function setText(id, txt) { const el = document.getElementById(id); if (el && el.textContent !== txt) el.textContent = txt }

  function render(d) {
    last = d
    renderHealth(d)
    updateLineSub()
    reconcileBooks(d)
    reconcileMath()  // ж®ҳйӨҳж•ё/reason йҡЁ status еҲ·ж–°пјҲagent liveness еҸҰз”ұ 2s loadWorkers з®Ўпјү

    // MinerU з„ЎжҜҸж—ҘзЎ¬дёҠйҷҗпјҲ>1000 й Ғеғ…йҷҚе„Әе…ҲжҺ’йҡҠпјүвҶ’ дёҚз•«йҖІеәҰжўқпјҢеҸӘеҲ—д»Ҡж—Ҙе·ІйҖҒй Ғж•ёгҖӮ
    setText('budget-date', `(${d.budget.date_utc} UTC В· з„ЎдёҠйҷҗ)`)
    setHtml('budget', Object.entries(d.budget.accounts).map(([name, v]) =>
      `<div class="dev-bar-row"><span class="name">${escapeHtml(name)}</span>
        <span class="num">${v.used} й Ғ</span></div>`).join(''))

    const z = d.zlib || {}, zt = z.total_remaining
    const zage = z.fetched_at_utc ? ' В· ' + relTime(z.fetched_at_utc) : ''
    const zcap = z.total_limit || (z.accounts || []).reduce((s, a) => s + (a.limit || 0), 0) || '?'
    setText('zlib-total', `(зёҪеү© ${zt == null ? '?' : zt}/${zcap}${z.stale ? ' В· STALE' : ''}${zage})`)
    setHtml('zlib', (z.accounts || []).map(a => {
      const lim = a.limit, rem = a.remaining
      const pct = (lim && rem != null) ? Math.min(100, Math.round(rem / lim * 100)) : 0
      const numTxt = rem == null ? 'жҹҘз„Ў' : `${rem}/${lim == null ? '?' : lim}`
      return `<div class="dev-bar-row"><span class="name">${escapeHtml(a.email || ('acct'+a.account))}</span>
        <span class="dev-bar"><span style="width:${pct}%"></span></span><span class="num">${numTxt}</span></div>`
    }).join('') || '<div class="dev-label">жҹҘи©ўдёӯвҖҰ</div>')

    const errs = d.errors || []
    setHtml('err-head', errs.length ? `рҹ”ҙ йҢҜиӘӨ (${errs.length})` : `рҹҹў йҢҜиӘӨ`)
    setHtml('errors', errs.length
      ? errs.slice(-12).map(e => `<div class="dev-err"><span class="src">[${escapeHtml(e.src)}]</span>${escapeHtml(e.line)}</div>`).join('')
      : `<div class="dev-ok-msg">вң“ з„ЎйҢҜиӘӨ</div>`)

    const cs = d.corpus_sessions || []
    indexSessions(cs)
    document.getElementById('p-corpus').hidden = !cs.length
    if (cs.length) setHtml('corpus', `<div class="dev-label" style="margin-bottom:6px">${cs.length} е ҙпјҲж–°вҶ’иҲҠпјү</div>` + cs.map(sessRowHtml).join(''))

    setText('log', (d.recent_log || []).join('\n'))
    setText('foot', `snapshot ${d.generated_at_local}пјҲж’ҝжӘ”жҜҸ ${REFRESH_MS/1000}s В· е·ҘдәәжҜҸ ${WORKERS_MS/1000}s В· жҷӮйҗҳжҜҸз§’пјү`)
    tickClocks()
  }

  async function loadWorkers() {
    try { const data = await fetchJson('workers.json?_=' + Date.now()); lastWorkers = (data && data.workers) || [] }
    catch { lastWorkers = [] }
    reconcileCrawl()  // зҲ¬жӣёз«ҷиө° 2s cadenceпјҲвүӨ2s еҸҚжҳ  worker иө·/жӯўпјҢйқһ 8sпјү
    reconcileMath()   // ж•ёеӯё sweep agent еҗҢиө° 2s cadenceпјҲslug=nullпјҢжң¬з«ҷзӣҙжҺҘжёІжҹ“пјү
    applyWalkers()
    if (last) { updateLineSub(); tickClocks() }  // е·Ҙдәә pollпјҡеҲ· live е·Ҙдәәж•ё + жҷӮйҗҳ
    if (openSlug || openWkey) renderDrawer()
  }
  async function load() {
    const btn = document.getElementById('btn-refresh')
    btn.innerHTML = '<span class="spin">вҶ»</span> refresh'
    try { render(await fetchJson('status.json?_=' + Date.now())) }
    catch (e) { document.getElementById('foot').textContent = 'и®ҖеҸ– status.json еӨұж•—пјҡ' + (e.message || e) }
    finally { btn.innerHTML = 'вҶ» refresh' }
  }

  function start() {
    if (!timer) timer = setInterval(load, REFRESH_MS)
    if (!clockTimer) clockTimer = setInterval(tickClocks, CLOCK_MS)
    if (!workersTimer) workersTimer = setInterval(loadWorkers, WORKERS_MS)
  }
  function stop() { clearInterval(timer); clearInterval(clockTimer); clearInterval(workersTimer); timer = clockTimer = workersTimer = null }
  document.getElementById('btn-refresh').addEventListener('click', () => { load(); loadWorkers() })
  buildScaffold()  // з«ҷеҸ°йӘЁжһ¶дёҖж¬Ўе»әеҘҪпјҲд№ӢеҫҢеҸӘ reconcile lane е…§еҚЎзүҮпјү
  load(); loadWorkers(); start()
  document.addEventListener('visibilitychange', () => { if (document.hidden) stop(); else { load(); loadWorkers(); start() } })
  </script>
</body>
</html>
