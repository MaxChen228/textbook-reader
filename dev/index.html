<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>pipeline dev · textbook-reader</title>
  <script src="../assets/qbank-shared.js"></script>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="../assets/qbank-shared.css">
  <style>
    /* token(含 dark/skin) 全在 design/tokens.css，本頁不再各自定義 */
    body { font-size: 14px; line-height: 1.6; transition: background .25s ease, color .25s ease; }
    .dev-wrap { max-width: 1280px; margin: 0 auto; padding: 18px 16px 96px; }
    @media (max-width: 640px) { .dev-wrap { padding: 12px 10px 72px; } }

    .dev-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 14px;
    }
    .dev-panel > h2 {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--sub);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .dev-label { font-family: var(--mono); font-size: 11px; color: var(--sub); letter-spacing: .04em; }

    /* ── 健康條（精簡） ── */
    .hbar { display: flex; flex-wrap: wrap; gap: 10px 22px; align-items: baseline; }
    .hbar .kv { display: flex; align-items: baseline; gap: 7px; }
    .hbar .k { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--sub); }
    .hbar .v { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 600; }
    .dev-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; vertical-align: middle; }
    .dot-ok { background: var(--status-known); } .dot-bad { background: var(--status-danger); }
    .dot-warn { background: var(--status-unknown); } .dot-idle { background: var(--status-skip); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.62} }
    .live { animation: pulse 2.2s ease-in-out infinite; }

    /* ── 產線 ── */
    .line { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; align-items: stretch;
      scrollbar-width: thin; scrollbar-color: var(--border) var(--border-l); }  /* Firefox：常駐細捲軸 */
    /* WebKit/Chrome：macOS overlay 捲軸靜止會自動隱藏 → 明確 style 即切成常駐可見橫向捲軸 */
    .line::-webkit-scrollbar { height: 11px; }
    .line::-webkit-scrollbar-track { background: var(--border-l); border-radius: 6px; }
    .line::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg); }
    .line::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    .station {
      flex: 1 1 0; min-width: 150px; display: flex; flex-direction: column;
      background: var(--bg); border: 1px solid var(--border-l); border-radius: var(--radius); overflow: hidden;
    }
    .st-head {
      display: flex; align-items: center; gap: 7px; padding: 9px 11px;
      border-bottom: 1px solid var(--border-l); position: sticky; top: 0; background: var(--surface); z-index: 2;
    }
    .st-ico { font-size: 15px; }
    .st-name { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .03em; color: var(--text); flex: 1; }
    .st-cnt { font-family: var(--mono); font-size: 11px; color: var(--sub);
      background: var(--border-l); border-radius: 10px; padding: 1px 8px; min-width: 22px; text-align: center; }
    .st-active .st-name { color: var(--accent); }
    /* 書單欄（漏斗源頭）：待收計數，非書卡 */
    .st-booklist { border-color: var(--border); }
    .st-booklist .st-cnt { background: var(--accent); color: var(--on-accent); font-weight: 700; }
    .bl-body { font-family: var(--mono); font-size: 11px; line-height: 1.55; color: var(--sub); }
    .bl-body .blf-row { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0; }
    .bl-body .blf-row b { color: var(--text); font-size: 13px; }
    .bl-body .blf-own { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border-l); color: var(--text); }
    .bl-body .blf-abs { margin-top: 2px; opacity: .65; }
    .lane { display: flex; flex-direction: column; gap: 9px; padding: 11px 9px; overflow-y: auto;
      max-height: 560px; min-height: 60px; }
    .lane.done { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px,1fr)); gap: 7px; }

    /* 書卡 */
    .book { position: relative; cursor: pointer; border-radius: 7px; transition: transform .55s cubic-bezier(.22,1,.36,1); }
    .book .cv { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: var(--radius-sm); overflow: hidden;
      border: 1px solid var(--border); background: var(--border-l); box-shadow: var(--shadow-seg); }
    .book .cv img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .book .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--on-solid); text-align: center; padding: 4px; }
    .crawl-ph { background: linear-gradient(135deg, var(--info), color-mix(in srgb, var(--info) 55%, #000)); font-size: 30px !important; }
    .math-ph { background: linear-gradient(135deg, var(--sweep), color-mix(in srgb, var(--sweep) 55%, #000)) !important; }  /* 數學 sweep agent */
    /* 待下載書卡（非 agent，靜態待命）：暗藍灰、無 spinner。有 z-lib url → 可點開該書頁 */
    .crawl-card.queued { cursor: default; }
    .crawl-card.queued.linked { cursor: pointer; }
    a.crawl-card.queued { text-decoration: none; color: inherit; }
    a.crawl-card.queued.linked:hover .cv { opacity: 1; }
    a.crawl-card.queued.linked:hover { transform: translateY(-2px); transition: transform .12s; }
    .crawl-card.queued .cv { opacity: .8; }
    .queue-ph { background: linear-gradient(135deg, var(--ink-light), color-mix(in srgb, var(--ink-light) 55%, #000)) !important; font-size: 26px !important; }
    /* live 下載卡（買書員正在抓）：下載中＝藍光暈脈動；落地＝綠框 ✓；失敗＝紅框淡化。角標即時狀態 */
    .crawl-card.dl { cursor: default; }
    .crawl-card.dl .cv { border-color: color-mix(in srgb, var(--info) 55%, transparent); }
    .crawl-card.dl.downloading .cv { animation: dlpulse 1.15s ease-in-out infinite; }
    .crawl-card.dl.done .cv { border-color: color-mix(in srgb, var(--status-known) 75%, transparent); }
    .crawl-card.dl.failed .cv { border-color: color-mix(in srgb, var(--status-danger) 75%, transparent); opacity: .6; }
    @keyframes dlpulse { 0%,100% { box-shadow: 0 0 0 0 transparent; }
                         50% { box-shadow: 0 0 0 5px color-mix(in srgb, var(--info) 36%, transparent); } }
    .dl-badge { position: absolute; top: 3px; right: 3px; font-size: 11px; line-height: 1; font-weight: 700;
      padding: 3px 5px; border-radius: var(--radius-sm); color: var(--on-solid); box-shadow: 0 1px 3px rgba(0,0,0,.35); }
    .dl-badge.downloading { background: var(--info); animation: pulse 1.15s ease-in-out infinite; }
    .dl-badge.done { background: var(--status-known); }
    .dl-badge.failed { background: var(--status-danger); }
    .dl-mb { position: absolute; bottom: 3px; left: 3px; font-size: 10px; font-weight: 700; color: #fff;
      background: rgba(0,0,0,.55); padding: 1px 4px; border-radius: 5px; }
    .dl-mb:empty { display: none; }
    /* 數學 sweep batch 處理中脈動（用於抽屜內聚合進度卡 .ms-card.live）。主題中性紫 */
    @keyframes mrpulse { 0%,100% { box-shadow: 0 0 0 0 transparent; }
                         50% { box-shadow: 0 0 0 5px color-mix(in srgb, var(--sweep) 32%, transparent); } }
    .cn-reason { padding: 2px 4px 6px; }  /* 爬書站水位原因行 */
    /* 數學 sweep 抽屜：殘餘最多書清單（可點進該書）*/
    .math-row { cursor: pointer; }
    .math-row:hover .lbl { color: var(--accent); }
    .ev.math-row .n { width: auto; white-space: nowrap; padding-left: 8px; }  /* 「已微調」/殘餘數不折成兩行 */
    /* 數學 sweep 抽屜：聚合進度卡（8 worker 並發 · 只顯「工作中 + 多快」） */
    .ms-card { border: 1px solid color-mix(in srgb, var(--sweep) 28%, transparent); border-radius: var(--radius); padding: 14px 16px;
      background: color-mix(in srgb, var(--sweep) 6%, transparent); }
    .ms-card.live { border-color: color-mix(in srgb, var(--sweep) 60%, transparent); animation: mrpulse 1.6s ease-in-out infinite; }
    .ms-top { display: flex; align-items: center; gap: 7px; font-size: 13px; }
    .ms-state { font-weight: 700; }
    .ms-rate { margin: 8px 0 2px; display: flex; align-items: baseline; gap: 6px; }
    .ms-rate b { font-size: 30px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
    .ms-rate span { font-size: 12px; opacity: .6; }
    .ms-bar { height: 8px; border-radius: var(--radius-sm); background: var(--border-l); overflow: hidden; margin: 8px 0 5px; }
    .ms-fill { height: 100%; border-radius: var(--radius-sm); background: linear-gradient(90deg, var(--sweep), color-mix(in srgb, var(--sweep) 60%, #fff)); transition: width .5s ease; }
    .ms-prog { font-size: 11px; opacity: .65; font-variant-numeric: tabular-nums; }
    .ms-cnts { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 10px; font-size: 12px; font-weight: 600; }
    .ms-cnts .ms-ac { color: var(--status-known); } .ms-cnts .ms-un { color: var(--status-unknown); }
    .ms-cnts .ms-rt { color: var(--info); } .ms-cnts .ms-hd { color: var(--status-danger); }
    /* 已上站但 catalog/sol 仍待精修的書：done 卡右上角 🔧（上站完成≠全部完美） */
    .refine-badge { position: absolute; top: -5px; right: -5px; z-index: 3; font-size: 11px;
      line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
    /* qc/triage 拒、無源 = 已淘汰：紅角標 + 卡片淡化，視覺區別於「待處理」 */
    .reject-badge { position: absolute; left: 4px; top: 4px; z-index: 3; font-family: var(--mono);
      font-size: 9px; background: color-mix(in srgb, var(--status-danger) 88%, transparent); color: var(--on-solid); padding: 1px 5px; border-radius: var(--radius-sm); }
    .book.rejected .cv { opacity: .5; filter: grayscale(.5); }
    @keyframes stageflash { 0% { box-shadow: 0 0 0 3px var(--accent), 0 0 16px 3px var(--accent); }
                            100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } }
    .book.stage-flash .cv { animation: stageflash 1.15s ease-out 1; }
    .dm-word { font-family: var(--mono); font-size: 12px; color: var(--ink-light); font-weight: 600; margin-left: 2px; }
    .book .ttl { font-family: var(--mono); font-size: 10px; color: var(--ink-light); margin-top: 4px; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .book:hover { transform: translateY(-3px); }
    .book:hover .cv { border-color: var(--accent); }
    .lane.done .book .ttl { display: none; }
    .lane.done .book .cv { border-radius: 4px; }

    /* 題/解小章 */
    .ps-badge { position: absolute; left: 4px; bottom: 4px; font-family: var(--mono); font-size: 9px;
      background: rgba(0,0,0,.62); color: #fff; padding: 0 5px; border-radius: var(--radius-sm); backdrop-filter: blur(2px); }  /* bg 半透黑＝疊封面圖 backing 例外（不隨主題） */
    /* 已上站書的數學殘餘角標（紫，bottom-right）：把「數學 sweep 在修哪些上架書」直接畫在書牆上，
       不必開抽屜。資訊性、不擋服務；sweep 修好後 occ 歸 0、角標自動消失。 */
    .math-badge { position: absolute; right: 4px; bottom: 4px; z-index: 3; font-family: var(--mono); font-size: 9px;
      background: color-mix(in srgb, var(--sweep) 92%, transparent); color: var(--on-solid); padding: 0 5px; border-radius: var(--radius-sm); letter-spacing: -.3px; }
    /* qc 過關來路（只在「已過 QC」里程碑顯示）：⚡triage=pdf_triage 高信心直放、跳過 LLM QC；QC✓=LLM 視覺驗過。
       修「已過 QC」語意坑——過去兩條路都只顯里程碑、看不出有沒有真燒 LLM。 */
    .qc-badge { position: absolute; right: 4px; top: 4px; z-index: 3; font-family: var(--mono); font-size: 9px;
      padding: 1px 5px; border-radius: var(--radius-sm); font-weight: 700; letter-spacing: -.2px; }
    .qc-badge.skip { background: color-mix(in srgb, var(--sub) 20%, transparent); color: var(--sub); }
    .qc-badge.llm { background: color-mix(in srgb, var(--status-known) 88%, transparent); color: var(--on-solid); }

    /* 匠人（worker）疊在書卡 — 綁 slug */
    .walker { position: absolute; top: -7px; right: -7px; z-index: 3; display: flex; align-items: center; gap: 4px;
      background: var(--accent); color: var(--on-accent); border-radius: 12px; padding: 2px 7px 2px 4px;
      font-family: var(--mono); font-size: 9.5px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,.35);
      white-space: nowrap; animation: bob 2.2s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-3px) rotate(2deg)} }
    .walker .face { font-size: 12px; line-height: 1; }
    .book.working .cv { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), 0 2px 10px rgba(0,0,0,.3); }
    .work-ring { position: absolute; inset: -3px; border-radius: 8px; border: 2px solid var(--accent);
      opacity: 0; animation: ring 1.8s ease-out infinite; pointer-events: none; }
    @keyframes ring { 0%{opacity:.7; transform:scale(.97)} 100%{opacity:0; transform:scale(1.06)} }
    /* 外部 OCR worker（MinerU 雲端，無本地算力）：冷色藍 + 等待感 breathe，一眼別於本地匠人金+bob */
    .walker.external { background: var(--info); color: var(--on-solid); animation: breathe 2.4s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:.78} 50%{opacity:1} }
    .book.external-work .cv { border-color: var(--info); box-shadow: 0 0 0 2px var(--info), 0 2px 10px rgba(0,0,0,.3); }
    .book.external-work .work-ring { border-color: var(--info); }

    /* ── 工人抽屜（完整 tool-use 可滾） ── */
    .drawer-mask { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none;
      transition: opacity .25s ease; z-index: 40; }
    .drawer-mask.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; height: 100%; width: min(440px, 92vw);
      background: var(--surface); border-left: 1px solid var(--border); z-index: 41;
      transform: translateX(100%); transition: transform .3s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column; }
    .drawer.open { transform: translateX(0); }
    .dr-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
    .dr-cv { width: 52px; aspect-ratio: 3/4; border-radius: 4px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); background: var(--border-l); }
    .dr-cv img { width: 100%; height: 100%; object-fit: cover; }
    .dr-cv .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--on-solid); font-weight: 700; font-family: var(--font-display); }
    .dr-tt { flex: 1; min-width: 0; }
    .dr-tt b { font-size: 15px; color: var(--text); display: block; line-height: 1.3; }
    .dr-tt .sub { font-family: var(--mono); font-size: 11px; color: var(--sub); margin-top: 3px; }
    .dr-close { background: none; border: 1px solid var(--border); color: var(--sub); border-radius: 6px;
      width: 28px; height: 28px; cursor: pointer; flex-shrink: 0; font-size: 15px; line-height: 1; }
    .dr-meta { padding: 10px 16px; border-bottom: 1px solid var(--border-l); font-family: var(--mono); font-size: 11px; color: var(--ink-light);
      display: flex; flex-wrap: wrap; gap: 6px 16px; }
    .dr-meta b { color: var(--accent); }
    .dr-status { flex-basis: 100%; font-size: 12.5px; font-weight: 600; padding: 5px 9px; border-radius: 6px;
      border: 1px solid var(--border); }
    .dr-st-work { color: var(--accent); border-color: var(--accent); }
    .dr-st-done { color: var(--status-known); }
    .dr-st-wait { color: var(--status-unknown); }
    .dr-st-ready { color: var(--sub); }
    /* 抽屜身體單一捲動容器：dr-evs/dr-tl/dr-hist 一起捲，杜絕舊版只有 dr-evs 內捲、dr-tl/dr-hist
       溢出被裁切且整體無法捲（→ 即時 LLM 串流被擠到看不到也捲不到）。flex column 供 order 重排。 */
    .dr-body { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; }
    .dr-evs { padding: 10px 14px; }
    /* 數學 sweep 抽屜：把 LLM 即時串流（dr-hist）order 拉到頂，「它有在動」第一眼可見、不必往下捲找 */
    .drawer.math-mode #dr-hist { order: -1; border-top: none; }  /* 聚合進度卡拉到抽屜頂（第一眼見「在工作」） */
    .ev { display: flex; gap: 8px; align-items: baseline; font-family: var(--mono); font-size: 11.5px;
      color: var(--ink-light); padding: 4px 0; border-bottom: 1px solid var(--border-l); }
    .ev:last-child { border-bottom: none; }
    .ev .ico { flex-shrink: 0; } .ev .n { flex-shrink: 0; color: var(--sub); width: 26px; text-align: right; }
    .ev .lbl { flex: 1; white-space: pre-wrap; word-break: break-word; }
    .ev.text .lbl { color: var(--text); }
    .dr-tl { padding: 8px 16px 16px; border-top: 1px solid var(--border-l); }
    .dr-tl .h { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--sub); margin-bottom: 6px; letter-spacing: .05em; }
    .tlrow { display: flex; gap: 9px; align-items: baseline; font-family: var(--mono); font-size: 11px; color: var(--ink-light); padding: 2px 0; }
    .tlrow .stg { min-width: 120px; color: var(--text); }
    .tlrow .at { color: var(--sub); } .tlrow .du { color: var(--accent); }
    .dr-empty { color: var(--sub); font-family: var(--mono); font-size: 12px; padding: 16px; text-align: center; }
    .dr-back { font-size: 16px; line-height: 1; }

    /* ── agent 歷程（per-book 抽屜底 + corpus 面板共用 session row） ── */
    .dr-hist { padding: 8px 16px 16px; border-top: 1px solid var(--border-l); }
    .dr-hist .h { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--sub); margin-bottom: 6px; letter-spacing: .05em; }
    .sess { display: flex; gap: 9px; align-items: baseline; font-family: var(--mono); font-size: 11.5px;
      color: var(--ink-light); padding: 6px 8px; margin: 2px 0; border: 1px solid var(--border-l); border-radius: 6px;
      cursor: pointer; flex-wrap: wrap; }
    .sess:hover { border-color: var(--accent); background: var(--bg); }
    .sess .sv { color: var(--text); font-weight: 600; min-width: 92px; }
    .sess .sm { color: var(--sub); }
    .sess .st { color: var(--sub); margin-left: auto; }
    .sess .sd { color: var(--ink-light); }
    .sess .sk-ok { color: var(--status-known); font-weight: 700; }
    .sess .sk-bad { color: var(--status-danger); font-weight: 700; }
    .sess .sk-recon { color: var(--status-unknown); font-weight: 700; }
    .sess .corp { color: var(--accent); }
    #corpus .sess { font-size: 12px; }

    /* ── 額度條 / 錯誤 / log（次要面板，沿用舊樣式） ── */
    .dev-bar-row { display: flex; align-items: center; gap: 12px; margin: 7px 0; }
    .dev-bar-row .name { font-family: var(--mono); font-size: 12px; width: 180px; flex-shrink: 0; color: var(--text); }
    .dev-bar { flex: 1; height: 8px; background: var(--border-l); border-radius: 4px; overflow: hidden; }
    .dev-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
    .dev-bar-row .num { font-family: var(--mono); font-size: 11px; color: var(--sub); width: 96px; text-align: right; flex-shrink: 0; }
    /* 閘門狀態徽章（唯讀；操作走 CLI devctl gates/pause/resume）：暫停＝醒目琥珀（停產一眼可見）、
       部分閘控＝黃、運轉＝低調。/dev 已純觀測，無任何寫回 UI。 */
    #gate-badge { cursor: default; }
    #gate-badge.gate-paused { color: var(--on-accent); background: var(--status-unknown); border-color: var(--status-unknown); font-weight: 700; padding: 2px 8px; border-radius: var(--radius-sm); }
    #gate-badge.gate-partial { color: var(--status-unknown); font-weight: 600; }
    #gate-badge.gate-running { color: var(--sub); }
    /* 書卡閘門角標（架構師把該書停在某閘）：中性琥珀、左上，與紅色拒絕角標視覺區別＝純觀測非淘汰 */
    .gate-badge { position: absolute; left: 4px; top: 4px; z-index: 3; font-family: var(--mono);
      font-size: 9px; background: color-mix(in srgb, var(--status-unknown) 94%, transparent); color: var(--on-accent); padding: 1px 5px; border-radius: var(--radius-sm); }
    .dev-err { border-left: 3px solid var(--status-danger); padding: 6px 10px; margin: 6px 0; font-family: var(--mono);
      font-size: 12px; color: var(--text); background: var(--bg); border-radius: 0 4px 4px 0; word-break: break-word; }
    .dev-err .src { color: var(--sub); margin-right: 8px; }
    .dev-ok-msg { color: var(--status-known); font-family: var(--mono); font-size: 13px; }
    .dev-log { font-family: var(--mono); font-size: 11px; line-height: 1.5; color: var(--ink-light); background: var(--bg);
      border: 1px solid var(--border-l); border-radius: var(--radius-sm); padding: 10px 12px; max-height: 300px; overflow: auto;
      white-space: pre-wrap; word-break: break-word; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 760px) { .cols { grid-template-columns: 1fr; } }
    .dev-foot { font-family: var(--mono); font-size: 11px; color: var(--sub); text-align: center; margin-top: 8px; }
    .spin { display: inline-block; animation: sp 1s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* ── 數學 sweep 徽章（topbar 入口；占用 occ + 狀態色，reactor 移走後保留「現在多少壞式」一瞥）── */
    #btn-math.mt-due { border-color: var(--status-danger); }
    #btn-math.mt-due #mt-count { color: var(--status-danger); font-weight: 700; }
    #btn-math.mt-stuck { border-color: var(--status-unknown); }
    #btn-math.mt-stuck #mt-count { color: var(--status-unknown); font-weight: 700; }
    #btn-math.mt-run { border-color: var(--accent); }
    #btn-math.mt-run #mt-count { color: var(--accent); font-weight: 700; }
    /* mt-clean（全淨真 0）：預設樣式、不搶眼 */

    /* ── proposals 側欄（復用右側 drawer；topbar 入口 + 列表 + 單條詳情） ── */
    #btn-proposals.has-pending { border-color: var(--accent); }
    #btn-proposals.has-pending #pp-count { color: var(--accent); font-weight: 700; }
    .pp-row { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; font-family: var(--mono);
      font-size: 11.5px; color: var(--ink-light); padding: 7px 9px; margin: 3px 0;
      border: 1px solid var(--border-l); border-radius: 6px; cursor: pointer; }
    .pp-row:hover { border-color: var(--accent); background: var(--bg); }
    .pp-row.resolved { opacity: .5; }
    .pp-row .pp-tt { flex-basis: 100%; color: var(--text); font-weight: 600; line-height: 1.35;
      font-family: var(--sans, inherit); }
    .pp-row .pp-src { color: var(--sub); } .pp-row .pp-at { color: var(--sub); margin-left: auto; }
    .pp-dom { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border);
      color: var(--sub); text-transform: uppercase; letter-spacing: .03em; flex-shrink: 0; }
    .pp-dom[data-d="engine"] { color: var(--accent); border-color: var(--accent); }
    .pp-dom[data-d="math"] { color: var(--status-unknown); border-color: var(--status-unknown); }
    .pp-dom[data-d="crawl"] { color: var(--status-known); border-color: var(--status-known); }
    .pp-dom[data-d="catalog"] { color: var(--sweep); border-color: var(--sweep); }
    .pp-type { color: var(--ink-light); }
    .pp-st { font-size: 10px; flex-shrink: 0; }
    .pp-st.proposed { color: var(--status-unknown); font-weight: 700; }
    .pp-filter { display: flex; gap: 6px; flex-basis: 100%; margin-top: 4px; }
    .pp-filter button { font-family: var(--mono); font-size: 11px; padding: 2px 9px; cursor: pointer;
      background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--sub); }
    .pp-filter button.on { color: var(--accent); border-color: var(--accent); }
    .pp-sec { padding: 11px 16px; border-bottom: 1px solid var(--border-l); }
    .pp-sec .h { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--sub);
      margin-bottom: 6px; letter-spacing: .05em; }
    .pp-sec .bd { font-size: 12.5px; color: var(--text); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .pp-pre { font-family: var(--mono); font-size: 11px; line-height: 1.45; color: var(--ink-light);
      background: var(--bg); border: 1px solid var(--border-l); border-radius: 6px; padding: 9px 11px;
      overflow-x: auto; white-space: pre; margin: 0; }
  </style>
</head>
<body>
  <div id="topbar" class="qbk-topbar">
    <div class="system-tabs">
      <a href="../">Library</a>
      <span class="system-tabs-divider"></span>
      <a class="active" href="#">Dev</a>
    </div>
    <div class="topbar-spacer"></div>
    <span class="meta qbk-result-count" id="updated"></span>
    <span class="meta qbk-result-count" id="gate-badge" title="閘門狀態（唯讀；操作走 CLI：devctl gates / pause / resume）">⏸ —</span>
    <button class="qbk-control-btn compact" id="btn-math" type="button" title="數學 sweep · 跨書渲染殘餘">🧮 <span id="mt-count">·</span></button>
    <button class="qbk-control-btn compact" id="btn-proposals" type="button" title="agent 提出的提案（待決議）">📋 <span id="pp-count">·</span></button>
    <button class="qbk-control-btn compact" id="btn-refresh" type="button" title="立即刷新">↻ refresh</button>
    <div class="qbk-segmented" id="seg-theme" style="margin-left:4px">
      <button data-theme-set="auto">Auto</button>
      <button data-theme-set="light">Light</button>
      <button data-theme-set="dark">Dark</button>
    </div>
  </div>

  <div class="dev-wrap">
    <!-- 產線（hero）：daemon 狀態折進標題，去除上方冗餘 health 條 -->
    <div class="dev-panel">
      <h2>製書產線 <span class="dev-dot" id="dm-dot"></span><span class="dm-word" id="dm-word"></span>
        <span class="dev-label" id="line-sub"></span></h2>
      <div class="line" id="line"></div>
    </div>

    <!-- 次要：額度 / 錯誤 -->
    <div class="cols">
      <div class="dev-panel">
        <h2>MinerU 今日送頁 <span class="dev-label" id="budget-date"></span></h2>
        <div id="budget"></div>
        <h2 style="margin-top:14px">zlib 帳號額度 <span class="dev-label" id="zlib-total"></span></h2>
        <div id="zlib"></div>
      </div>
      <div class="dev-panel" id="p-err">
        <h2 id="err-head">錯誤</h2>
        <div id="errors"></div>
      </div>
    </div>

    <!-- 收錄進度（書單 SoT = 目標正典分母；確定性 refill 從此拉貨）-->
    <div class="dev-panel">
      <h2>收錄進度 <span class="dev-label" id="bl-overall"></span></h2>
      <div id="booklists"></div>
    </div>

    <!-- log -->
    <div class="dev-panel">
      <h2>daemon.log 尾段 <span class="dev-label">(UTC)</span></h2>
      <div class="dev-log" id="log"></div>
    </div>

    <div class="dev-foot" id="foot"></div>
  </div>

  <!-- 工人抽屜 -->
  <div class="drawer-mask" id="dr-mask"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="dr-head">
      <button class="dr-close" id="dr-back" title="返回" hidden>←</button>
      <div class="dr-cv" id="dr-cv"></div>
      <div class="dr-tt"><b id="dr-title">—</b><span class="sub" id="dr-sub"></span></div>
      <button class="dr-close" id="dr-close" title="關閉">✕</button>
    </div>
    <div class="dr-meta" id="dr-meta"></div>
    <div class="dr-body" id="dr-body">
      <div class="dr-evs" id="dr-evs"></div>
      <div class="dr-tl" id="dr-tl"></div>
      <div class="dr-hist" id="dr-hist"></div>
    </div>
  </aside>

  <script>
  const { fetchJson, relTime, escapeHtml, escapeAttr } = QBankShared
  const REFRESH_MS = 1000, CLOCK_MS = 1000, WORKERS_MS = 1000, MATHRAW_MS = 1200, CRAWLLIVE_MS = 1000, PROPOSALS_MS = 12000, SYSTEM_MS = 8000
  let timer = null, clockTimer = null, workersTimer = null, mathRawTimer = null, crawlLiveTimer = null, proposalsTimer = null, systemTimer = null
  let last = null, lastWorkers = []
  let crawlLive = null  // live 下載快訊（買書員逐本 下載中→✓/✗；1s 直撿 dev/crawl_live.json，繞 status.json 8s）
  const DL_TAIL_S = 25  // 整批收尾後「剛完成」卡牌＋表頭的寬限秒數，之後自動隱藏退回常態待下載池
  let mathLive = null  // math sweep 聚合進度快照（schema 2；僅 math 抽屜開時輪詢）
  let corpusSessions = []  // corpus 級 agent 作業歷程（math_sweep 等，slug=null）；system.json 餵 → math 抽屜渲
  let openSlug = null   // 抽屜當前綁定的書
  let openMath = false  // 抽屜顯示 corpus 數學殘餘總覽（點數學 sweep 尾站）
  let openSession = null, openSessionFrom = null  // 歷史 session 重播 + 返回來源書
  let drawerDetail = null, drawerDetailSlug = null, drawerDetailAt = 0  // 書本 detail/<slug>.json（timeline+sessions）on-demand 快取 + 8s 節流戳
  let openProposals = false       // 抽屜顯示 proposals 列表（點 topbar 📋）
  let openProposalId = null       // 抽屜顯示單一 proposal 詳情（從列表點進；返回鈕回列表）
  let proposalsFeed = null        // dev/proposals.json（proposed 完整 + 已決議摘要；PROPOSALS_MS 輪詢）
  let ppFilter = 'proposed'       // 列表過濾：proposed（待決議）/ all（含已決議，灰顯）
  const sessEventCache = new Map()  // session id → 完整事件（懶載一次；只快取成功結果）
  const sessById = new Map()        // session id → 摘要（render 時建檔；點擊解析不依賴 live last churn）

  // ── 主題 + 換皮：QBankShared.theme 統一管理（按鈕用 data-theme-set / data-skin-set） ──
  QBankShared.theme.init()

  // ── 產線站台定義（里程碑語意：書卡位置 = 它「已完成」的動作，左→右=做越多）──
  // 欄名用過去式（「已X」），非 todo。worker 徽章疊上去 = 正在推它往下一格的 walker。
  const STATIONS = [
    { ico: '📥', name: '爬書 crawl', crawl: true },
    { ico: '📦', name: '已入庫' },     // owned raw pdf、待 QC（stage 0.2）
    { ico: '👁️', name: '已過 QC' },    // 過 QC 關、待/正 OCR（stage 0.3/0.5）；卡片 ⚡triage 直放 vs QC✓ LLM 驗過
    { ico: '🛰️', name: '已 OCR' },     // content_list 已生、待 audit（stage 1）
    { ico: '🔍', name: '已稽核' },     // extract_rules 已生、待 parse（stage 2）
    { ico: '🧩', name: '已解析' },     // book.json 已生、catalog/sol 待辦（stage 3/4 非 deploy）
    { ico: '📚', name: '已編目' },     // 強制待辦清空、待部署（stage 3/4 todo=deploy）
    { ico: '✅', name: '上站完成' },   // 已部署
    { ico: '🚫', name: '淘汰', reject: true },  // 終端死路（qc/triage 拒、書況 review、無源）；不在前進車道
  ]
  // 數學 sweep 已移出流水線（非書本階段、corpus 級聚合）→ 收進 topbar 🧮 抽屜（見 openMathDrawer）。
  const DONE_ST = 7
  const REJECT_ST = 8
  function stationOf(b) {  // 位置 = 已完成里程碑（非 todo）。前進欄 1..6、上站 7、淘汰 8；站 0 爬書不放書
    if (b.deployed) return DONE_ST                 // 7 上站
    const c = (b.stage || '').trim().split(' ')[0]
    if (c === 'R' || c === 'X') return REJECT_ST   // 8 淘汰（書況/qc拒/triage拒、無源）
    const todo = (b.todo || '').trim()
    if (c === '3' || c === '4') return todo === 'deploy' ? 6 : 5  // 已編目（待部署）/ 已解析（catalog/sol 待辦）
    if (c === '2') return 4                         // 已稽核
    if (c === '1') return 3                         // 已 OCR
    if (c === '0.5' || c === '0.3') return 2        // 已過 QC（OCR 中 / 待 OCR）
    return 1  // 已入庫（0.2 待qc 及其餘 pre-QC fallback）
  }
  // crawl 在 daemon 已全確定性化（買書員 select_next 取 QUALIFIED 下載，零 LLM agent）→ daemon 永無 crawl
  // live worker（填書單改人工 /restock，不在 daemon 跑）。故 crawl lane 只渲下載中/待下載卡，無 agent 卡。
  // 歷史 crawl/crawl_plan session 的顯示由 WFACE emoji map + trace 負責（見下）。
  // 一句話講清楚「這本書此刻到底在幹嘛 / 卡不卡」——產線最常被問的問題
  function statusText(b, w) {
    if (w) return { cls: 'work', txt: `🔧 工人處理中 · ${w.verb || ''}` }
    if (b.deployed) return { cls: 'done', txt: '✅ 已上站完成' }
    const mand = (b.todo || '').trim().split(/\s+/)
      .filter(t => t && t !== '—' && !t.endsWith('(可選)'))
    if (mand.length) {
      const v = mand[0].split('(')[0], sc = (b.stage || '').trim().split(' ')[0]
      // ingest 是雲端 OCR 非同步邊界：無本地工人是正常的（雲端在跑），別誤報「暫無工人，下個 cycle 派」
      if (v === 'ingest') return sc === '0.5'
        ? { cls: 'wait', txt: '🛰️ OCR 雲端處理中（雲端跑，無本地工人屬正常）' }
        : { cls: 'wait', txt: '📨 待提交 OCR 雲端（下個 cycle 派）' }
      return { cls: 'wait', txt: `⏳ 待 ${v}（暫無工人，下個 cycle 派）` }
    }
    return { cls: 'ready', txt: '☑ 已完工，待部署 / 可選翻譯（非卡關）' }
  }
  // 題/解徽章：有解答本才顯示「解/題」比；否則只報題數，避免「0/371」誤讀成卡住
  function probBadge(b) {
    if (!b.prob) return ''
    return `<span class="ps-badge">${b.sol_book ? (b.sol || 0) + '/' + b.prob : b.prob + ' 題'}</span>`
  }
  // slug → 穩定色（封面佔位用）
  function hue(s) { let h = 0; for (const ch of s) h = (h * 31 + ch.charCodeAt(0)) % 360; return h }
  function coverHtml(b, big) {
    if (b.cover) return `<img src="${escapeAttr(b.cover)}" loading="lazy" alt="">`
    const init = (b.title || b.slug).replace(/[^A-Za-z0-9 ]/g, '').split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase()
    const h = hue(b.slug)
    return `<div class="ph" style="background:linear-gradient(135deg,hsl(${h} 38% 42%),hsl(${(h+40)%360} 42% 30%))">${escapeHtml(init || '?')}</div>`
  }

  // ── 工人：slug → worker（live workers.json） ──
  function workerOf(slug) { return lastWorkers.find(w => w.slug === slug) }
  function liveWorkers() {
    // 起 <6h 才當 live：agent 時間上限已取消（可長跑），舊 1h 上限會讓長 agent 1h 後從面板蒸發。6h 純孤兒兜底。
    return lastWorkers.filter(w => { const t = w.started ? Date.parse(w.started) : 0; return !t || (Date.now() - t) < 21600e3 })
  }

  // ── 站台骨架：一次建好、永不重生（root-cause 1 修：停止每 8s 全 innerHTML 重建）──
  // 之後只動 lane 內卡片 + st-cnt + st-active。書 lane 走 8s status cadence、爬書 lane 走 1s worker cadence。
  const stationEls = [], laneEls = [], cntEls = []
  let crawlReasonEl = null
  function buildScaffold() {
    const lineEl = document.getElementById('line')
    lineEl.innerHTML = ''
    // 漏斗源頭：書單 SoT 待收 backlog（un-owned 可收 = 待解析+ready+待裁；不含 owned/無法收錄）。
    // 刻意獨立於 STATIONS/stationOf（純加法、零 reindex）——書卡不進此欄，只顯計數，renderBooklist 專渲。
    const blSt = document.createElement('div')
    blSt.className = 'station st-booklist'
    blSt.innerHTML = '<div class="st-head"><span class="st-ico">📋</span>'
      + '<span class="st-name">書單</span><span class="st-cnt" id="bl-cnt">—</span></div>'
      + '<div class="lane"><div class="bl-body" id="bl-body">—</div></div>'
    lineEl.appendChild(blSt)
    STATIONS.forEach((st, i) => {
      const done = i === DONE_ST
      const station = document.createElement('div')
      station.className = 'station'
      station.innerHTML = `<div class="st-head"><span class="st-ico">${st.ico}</span>`
        + `<span class="st-name">${escapeHtml(st.name)}</span><span class="st-cnt">0</span></div>`
        + (st.crawl ? '<div class="cn-reason dev-label"></div>' : '')
        + `<div class="lane${done ? ' done' : ''}"></div>`
      lineEl.appendChild(station)
      stationEls[i] = station
      laneEls[i] = station.querySelector('.lane')
      cntEls[i] = station.querySelector('.st-cnt')
      if (st.crawl) crawlReasonEl = station.querySelector('.cn-reason')
    })
  }

  // ── 通用 keyed reconcile：DOM 有 desired 無→移除；desired 有 DOM 無→建立；皆有→就地更新。
  // 維持 desired 順序（insertBefore anchor），無 FLIP 量測、無全盤重建。空時放 placeholder。──
  function reconcileLane(laneEl, desired, keyOf, makeEl, updateEl, emptyHtml) {
    const ph0 = laneEl.querySelector('.lane-empty')
    if (ph0 && desired.length) ph0.remove()
    const existing = new Map()
    for (const el of [...laneEl.children]) if (el.__key !== undefined) existing.set(el.__key, el)
    const keySet = new Set(desired.map(keyOf))
    for (const [k, el] of existing) if (!keySet.has(k)) { el.remove(); existing.delete(k) }
    let anchor = laneEl.firstElementChild
    for (const item of desired) {
      const k = keyOf(item)
      let el = existing.get(k)
      if (el) updateEl(el, item)
      else { el = makeEl(item); el.__key = k }
      if (el === anchor) anchor = anchor.nextElementSibling
      else laneEl.insertBefore(el, anchor)
    }
    if (!desired.length && !laneEl.querySelector('.lane-empty'))
      laneEl.insertAdjacentHTML('beforeend', emptyHtml)
  }

  // ── 書卡 builder / updater（root-cause C：img strict === 才換 src，不重觸發 lazy 重載）──
  function setCover(cvEl, b) {
    if (b.cover) {
      let img = cvEl.querySelector('img')
      if (!img) {
        cvEl.querySelector('.ph')?.remove()
        img = document.createElement('img'); img.loading = 'lazy'; img.alt = ''
        cvEl.insertBefore(img, cvEl.firstChild)
      }
      if (img.getAttribute('src') !== b.cover) img.setAttribute('src', b.cover)  // 完全相同（含 ?v=）絕不碰
    } else if (!cvEl.querySelector('.ph')) {
      cvEl.querySelector('img')?.remove()
      const init = (b.title || b.slug).replace(/[^A-Za-z0-9 ]/g, '').split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase()
      const h = hue(b.slug)
      const ph = document.createElement('div'); ph.className = 'ph'
      ph.style.background = `linear-gradient(135deg,hsl(${h} 38% 42%),hsl(${(h+40)%360} 42% 30%))`
      ph.textContent = init || '?'
      cvEl.insertBefore(ph, cvEl.firstChild)
    }
  }
  function setBadge(cvEl, b) {
    let badge = cvEl.querySelector('.ps-badge')
    if (!b.prob) { badge?.remove(); return }
    const txt = b.sol_book ? (b.sol || 0) + '/' + b.prob : b.prob + ' 題'
    if (!badge) { badge = document.createElement('span'); badge.className = 'ps-badge'; cvEl.appendChild(badge) }
    if (badge.textContent !== txt) badge.textContent = txt
  }
  function updateBookEl(el, b, done) {
    const t = b.title || b.slug
    if (el.title !== t) el.title = t
    if (!done) {
      let ttl = el.querySelector('.ttl')
      if (!ttl) { ttl = document.createElement('div'); ttl.className = 'ttl'; el.appendChild(ttl) }
      if (ttl.textContent !== t) ttl.textContent = t
    }
    el.dataset.stage = (b.stage || '').trim()  // applyWalkers 據此判外部 OCR worker（stage 0.3/0.5）
    const cv = el.querySelector('.cv')
    setCover(cv, b); setBadge(cv, b)  // 不碰 .work-ring/.walker（applyWalkers 自管）
    setRefine(cv, b); setReject(cv, b); setMathBadge(cv, b); setGateBadge(cv, b); setQcBadge(cv, b)
    el.classList.toggle('rejected', !b.deployed && /^[RX]/.test((b.stage || '').trim()))
  }
  // 已上站書的數學殘餘角標：讓「數學 sweep 在微調哪些上架書」直接顯示在書牆上（不必開抽屜）。
  // 上架後維護維度——書留在「上站完成」，sweep 就地修內容；修好 occ 歸 0 → 角標自動消失。
  function setMathBadge(cvEl, b) {
    let m = cvEl.querySelector('.math-badge')
    if (b.deployed && b.math_bad > 0) {
      const txt = `🧮${b.math_bad}`
      if (!m) { m = document.createElement('span'); m.className = 'math-badge'; cvEl.appendChild(m) }
      if (m.textContent !== txt) m.textContent = txt
      m.title = `數學式渲染殘餘 ${b.math_bad} occ（已上站、不擋服務；待數學 sweep 微調）`
    } else if (m) m.remove()
  }
  // qc/triage 拒（R）或無源（X）= 已淘汰、不會被處理 → 角標標示，視覺上區別於「待處理」
  function setReject(cvEl, b) {
    const c = (b.stage || '').trim()[0]
    let r = cvEl.querySelector('.reject-badge')
    if ((c === 'R' || c === 'X') && !b.deployed) {
      const lbl = c === 'X' ? '✗ 無源' : '✗ ' + ((b.stage || '').trim().split(/\s+/).slice(1).join('') || '拒')
      if (!r) { r = document.createElement('span'); r.className = 'reject-badge'; cvEl.appendChild(r) }
      if (r.textContent !== lbl) r.textContent = lbl
    } else if (r) { r.remove() }
  }
  // 閘門 hold（架構師經 CLI 把該書停在某閘）→ 中性琥珀角標「⏸ {verb}」，純觀測。與 R/X 拒絕（紅、淘汰）
  // 區別：gated 是「正常停在閘、放行即續」非淘汰、非停滯。放行走 CLI devctl gates。
  function setGateBadge(cvEl, b) {
    let g = cvEl.querySelector('.gate-badge')
    if (b.gated && b.gate_verb) {
      const txt = '⏸ ' + b.gate_verb
      if (!g) { g = document.createElement('span'); g.className = 'gate-badge'; cvEl.appendChild(g) }
      if (g.textContent !== txt) g.textContent = txt
      g.title = `閘門 hold：停在「${b.gate_verb}」閘（架構師閘控；放行走 CLI devctl gates）`
    } else if (g) g.remove()
  }
  // qc 過關來路角標（只在「已過 QC」里程碑 stage 0.3/0.5 顯示，離開即移除，不長期佔版面）：
  // ⚡triage=pdf_triage 高信心直放、跳過 LLM QC、直送 OCR（沒燒 LLM）；QC✓=LLM 視覺驗過。
  // 修「已過 QC」語意坑——過去兩條路都只顯里程碑、看不出有沒有真跑 LLM QC（born-digital 好書幾乎都直放）。
  function setQcBadge(cvEl, b) {
    const code = (b.stage || '').trim().split(/\s+/)[0]
    let q = cvEl.querySelector('.qc-badge')
    if ((code === '0.3' || code === '0.5') && b.qcv) {
      const skip = b.qcv === 'skip'
      const txt = skip ? '⚡triage' : 'QC✓'
      if (!q) { q = document.createElement('span'); q.className = 'qc-badge'; cvEl.appendChild(q) }
      const cls = 'qc-badge ' + (skip ? 'skip' : 'llm')
      if (q.className !== cls) q.className = cls
      if (q.textContent !== txt) q.textContent = txt
      q.title = skip
        ? 'pdf_triage 判 born-digital／高品質、高信心 → 跳過 LLM QC、直送 OCR（沒燒 LLM）'
        : 'LLM 視覺 QC 驗過'
    } else if (q) q.remove()
  }
  // 已上站但仍有強制待辦（catalog_audit/sol_extract）→ 角標 🔧，標示「服務中、品檢精修中」
  function setRefine(cvEl, b) {
    let r = cvEl.querySelector('.refine-badge')
    if (b.deployed && hasMand(b)) {
      if (!r) { r = document.createElement('span'); r.className = 'refine-badge'; r.textContent = '🔧'; cvEl.appendChild(r) }
    } else if (r) r.remove()
  }
  function makeBookEl(b, done) {
    const el = document.createElement('div')
    el.className = 'book'; el.dataset.slug = b.slug
    el.appendChild(Object.assign(document.createElement('div'), { className: 'cv' }))
    updateBookEl(el, b, done)
    return el
  }

  // ── 爬書站（站 0）= 解析池下一輪待下載書（select_next 即時推導，無 buffer）：crawl agent 卡（解析中）
  //    + 待下載書卡（額度0也照列）──
  // live 下載卡：active 時全顯；整批收尾後保留 DL_TAIL_S 秒「剛完成」tail 再隱藏（讓人看到 ✓/✗ 結果）
  function crawlLiveItems() {
    if (!crawlLive || !crawlLive.books) return []
    const ended = crawlLive.ended_at
    if (ended && (Date.now() / 1000 - ended) > DL_TAIL_S) return []
    // done（已落地）不再渲卡：書已成 owned → 流入「已入庫」里程碑欄、✓ 數留表頭。只渲下載中/失敗。
    return crawlLive.books.filter(b => b.state !== 'done').map(b => ({ kind: 'dl', key: 'd:' + b.slug, b }))
  }
  function crawlItems() {
    const dl = crawlLiveItems()
    // 排除集含 done（status.json queue 有 8s 滯後，剛抓到的書可能短暫仍列「待下載」→ 防回流閃爍）
    const allDlSlugs = new Set(((crawlLive && crawlLive.books) || []).map(b => b.slug))
    const q = ((last && last.crawl && last.crawl.queue) || [])
      .filter(b => !allDlSlugs.has(b.slug))  // 正在抓/剛抓到的（含 done 已 owned）不再列入「待下載」
      .map(b => ({ kind: 'item', key: 'q:' + b.slug, b }))
    return dl.concat(q)  // 下載中卡最前、待下載書最後（daemon 無 crawl agent 卡）
  }
  function makeCrawlEl(it) {
    if (it.kind === 'dl') {
      const b = it.b
      const el = document.createElement('div')
      el.className = 'book crawl-card dl ' + b.state; el.dataset.dl = b.slug
      el.title = (b.title || b.slug) + ' · ' + (b.state === 'done' ? '已落地' : b.state === 'failed' ? '下載失敗' : '下載中')
      const cv = b.cover
        ? `<img src="${escapeAttr(b.cover)}" loading="lazy" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph crawl-ph queue-ph',textContent:'${b.is_sol ? '📑' : '📘'}'}))">`
        : `<div class="ph crawl-ph queue-ph">${b.is_sol ? '📑' : '📘'}</div>`
      el.innerHTML = `<div class="cv">${cv}<span class="dl-badge ${b.state}"></span><span class="dl-mb"></span></div><div class="ttl"></div>`
      updateCrawlEl(el, it)
      return el
    }
    // queued：有 z-lib url → 渲成可點 <a>（新頁開該書頁，便於人工核對/手動補抓）；無 url 退回 div
    const url = it.b.url
    const el = document.createElement(url ? 'a' : 'div')
    el.className = 'book crawl-card queued' + (url ? ' linked' : ''); el.dataset.queued = it.b.slug
    el.title = (it.b.title || it.b.slug) + (url ? ' · 點開 z-lib 頁' : '')
    if (url) { el.href = url; el.target = '_blank'; el.rel = 'noopener noreferrer' }
    const cv = it.b.cover
      ? `<img src="${escapeAttr(it.b.cover)}" loading="lazy" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph crawl-ph queue-ph',textContent:'${it.b.is_sol ? '📑' : '📘'}'}))">`
      : `<div class="ph crawl-ph queue-ph">${it.b.is_sol ? '📑' : '📘'}</div>`
    el.innerHTML = `<div class="cv">${cv}</div><div class="ttl"></div>`
    updateCrawlEl(el, it)
    return el
  }
  function updateCrawlEl(el, it) {
    if (it.kind === 'dl') {
      const b = it.b
      const cls = 'book crawl-card dl ' + b.state
      if (el.className !== cls) el.className = cls
      const badge = el.querySelector('.dl-badge')
      if (badge) {
        const bcls = 'dl-badge ' + b.state
        if (badge.className !== bcls) badge.className = bcls
        const sym = b.state === 'done' ? '✓' : b.state === 'failed' ? '✗' : '⬇'
        if (badge.textContent !== sym) badge.textContent = sym
      }
      const mb = el.querySelector('.dl-mb')
      if (mb) { const t = b.mb ? b.mb + ' MB' : ''; if (mb.textContent !== t) mb.textContent = t }
      const ttl = el.querySelector('.ttl')
      if (ttl && ttl.textContent !== (b.title || b.slug)) ttl.textContent = b.title || b.slug
      return
    }
    const ttl = el.querySelector('.ttl')
    const txt = it.b.title || it.b.slug
    if (ttl.textContent !== txt) ttl.textContent = txt
  }
  // 爬書表頭：下載中顯 live 進度（下載中/✓/✗ + 帳號），否則退回 status reason；末尾恆掛當日 zlib 額度心跳
  function crawlHeader() {
    const z = last && last.zlib
    let quota = ''
    if (z && z.accounts && z.accounts.length) {
      const used = z.accounts.reduce((a, x) => a + (x.used || 0), 0)
      quota = ` · 今日已抓 ${used}/${z.total_limit} 本`
    }
    const bs = (crawlLive && crawlLive.books) || []
    if (crawlLive && crawlLive.active) {
      const ndl = bs.filter(b => b.state === 'downloading').length
      const nok = bs.filter(b => b.state === 'done').length
      const nf = bs.filter(b => b.state === 'failed').length
      const acct = (crawlLive.accounts || []).join('+')
      return `⬇ 正在下載 ${ndl} 本` + (nok ? ` · ✓${nok}` : '') + (nf ? ` · ✗${nf}` : '') + (acct ? ` · 帳號 ${acct}` : '') + quota
    }
    const ended = crawlLive && crawlLive.ended_at
    if (ended && (Date.now() / 1000 - ended) < DL_TAIL_S) {
      const nok = bs.filter(b => b.state === 'done').length, nf = bs.filter(b => b.state === 'failed').length
      return `✓ 剛完成下載 ${nok} 本` + (nf ? ` · ✗${nf} 失敗` : '') + quota
    }
    return ((last && last.crawl && last.crawl.reason) || '閒置 · 清單空') + quota
  }

  // 書 lane（站 1..6 里程碑前進欄）就地 reconcile —— 8s status cadence
  function reconcileBooks(d) {
    const buckets = STATIONS.map(() => [])
    d.books.forEach(b => buckets[stationOf(b)].push(b))
    for (let i = 0; i < STATIONS.length; i++) {
      if (STATIONS[i].crawl) continue  // 站 0 爬書 = agent 站，不放書（數學 sweep 已移出流水線）
      const done = i === DONE_ST, bs = buckets[i]
      reconcileLane(laneEls[i], bs, b => b.slug,
        b => makeBookEl(b, done), (el, b) => updateBookEl(el, b, done),
        '<div class="dev-label lane-empty" style="padding:6px 2px">—</div>')
      if (cntEls[i].textContent !== String(bs.length)) cntEls[i].textContent = bs.length
      stationEls[i].classList.toggle('st-active', bs.length > 0)
    }
    applyWalkers()
  }

  // 爬書 lane（站 0）就地 reconcile —— 1s cadence。顯示解析池下一輪待下載書（select_next 推導，額度0也在）+
  // crawl agent 卡（解析中）。count = 解析池可下載總數（非 agent 數）→ 額度耗盡時 badge 仍顯真實可下載書數。
  function reconcileCrawl() {
    const items = crawlItems()
    const reason = crawlHeader()
    if (crawlReasonEl && crawlReasonEl.textContent !== reason) crawlReasonEl.textContent = reason
    reconcileLane(laneEls[0], items, it => it.key, makeCrawlEl, updateCrawlEl,
      '<div class="dev-label lane-empty" style="padding:6px 2px">—</div>')
    const cnt = (last && last.crawl && last.crawl.count) || 0
    if (cntEls[0].textContent !== String(cnt)) cntEls[0].textContent = cnt
    const downloading = !!(crawlLive && crawlLive.active)
    stationEls[0].classList.toggle('st-active', items.length > 0 || downloading)
  }

  // ── 數學 sweep：**非書本階段、corpus 級聚合**（有多少壞式 occ，daemon 直跑 math_sweep batch 解掉）。
  // 已移出流水線、收進 topbar 🧮 抽屜（renderMathDrawer = reactor＋跨書殘餘總覽＋corpus 歷程）。本函式
  // 只更新 topbar 徽章：占用數 occ + 狀態色（待解紅 / fixpoint 卡橙 / 處理中 accent / 全淨綠），title 帶詳情。
  function mathReason() {
    const m = last && last.math
    if (!m) return '—'
    if (!m.node_available) return 'node 缺 · 未驗證'
    if (m.running) return `batch 處理中 · 殘 ${m.corpus_bad_occ} occ`
    const lb = m.last_batch
    const lbTxt = lb ? ` · 上次 batch ${relTime(lb.at)} 解 ${lb.accepted || 0} 條` : ' · 尚未 batch'
    // 收斂目標=真 0（residual_unaccepted）；due=false 的非零殘餘多為 fixpoint（batch 也解不動、已 accept 或硬殘）
    const un = m.residual_unaccepted ?? m.corpus_bad_occ
    const health = m.due ? '🔴待 batch' : (un > 0 ? '🟠fixpoint(卡)' : '🟢全淨')
    const acc = m.accepted_total ? `（已 accept ${m.accepted_total}）` : ''
    return `數學 sweep · 未解 ${un}${acc} occ · ${health}${lbTxt}`
  }
  function reconcileMath() {
    const m = last && last.math
    const occ = m ? (m.residual_unaccepted ?? m.corpus_bad_occ ?? 0) : 0
    const c = document.getElementById('mt-count'); if (c && c.textContent !== String(occ)) c.textContent = occ
    const b = document.getElementById('btn-math'); if (!b) return
    // 狀態色：running(accent) / due 待解(red) / occ>0 fixpoint 卡(amber) / 全淨(無強調)
    const cls = !m ? '' : (m.running ? 'mt-run' : (m.due ? 'mt-due' : (occ > 0 ? 'mt-stuck' : 'mt-clean')))
    if (b.dataset.cls !== cls) {
      b.classList.remove('mt-run', 'mt-due', 'mt-stuck', 'mt-clean')
      if (cls) b.classList.add(cls)
      b.dataset.cls = cls
    }
    b.title = mathReason()
    if (openMath) renderMathDrawer()  // 抽屜開著時隨 status tick 保持 live（meta/top_books/last_sweep）
  }

  // ── 把 live 工人疊到對應 slug 書卡（root-cause D：diff-based，同工人不 remove+重貼 → bob 不重啟）──
  const WFACE = { audit:'🔍', catalog_audit:'📚', qc:'👁️', parse:'🧩', sol_extract:'🔗', crawl:'📥', crawl_plan:'📥', gc:'🧹' }
  // 兩種徽章疊書卡：① 本地 LLM walker（workers.json：金 + bob + verb·call 數）② 外部 OCR worker
  //（MinerU 雲端，無本地進程 → 從 stage 0.3/0.5 合成：藍 + breathe、無 call 數）。真 worker 優先。
  function applyWalkers() {
    const bySlug = new Map(liveWorkers().map(w => [w.slug, w]))
    document.querySelectorAll('#line .book:not(.crawl-card)').forEach(el => {
      const w = bySlug.get(el.dataset.slug)
      const sc = (el.dataset.stage || '').trim().split(' ')[0]
      const ocr = !w && (sc === '0.3' || sc === '0.5')  // OCR 段、無本地 worker = 外部雲端進行中
      let walker = el.querySelector('.walker')
      if (!w && !ocr) {  // 無任何 worker → 移除疊加（僅在 transition 時改 DOM）
        if (walker) { walker.remove(); el.querySelector('.cv .work-ring')?.remove() }
        el.classList.remove('working', 'external-work')
        return
      }
      // 每輪先重置兩 class 再設正確者（防 0.5→1 / 0.5→audit worker 轉場殘留藍環）
      el.classList.toggle('working', !ocr)
      el.classList.toggle('external-work', ocr)
      if (!el.querySelector('.cv .work-ring'))
        el.querySelector('.cv').insertAdjacentHTML('beforeend', '<div class="work-ring"></div>')
      if (!walker) {  // 新工人 → 建一次 walker；之後僅更新文字、節點留存 → 動畫不中斷
        walker = document.createElement('div'); walker.className = 'walker'
        walker.innerHTML = '<span class="face"></span><span class="wt"></span>'
        el.appendChild(walker)
      }
      walker.classList.toggle('external', ocr)
      const face = ocr ? '🛰️' : (WFACE[w.verb] || '🛠️')
      const wt = ocr ? 'OCR 雲端' : `${w.verb || ''} ·${w.total_calls || 0}`
      const fEl = walker.querySelector('.face'), tEl = walker.querySelector('.wt')
      if (fEl.textContent !== face) fEl.textContent = face
      if (tEl.textContent !== wt) tEl.textContent = wt
    })
  }

  // ── 抽屜：完整可滾 tool-use ──
  function _openDrawerEl() {
    document.getElementById('dr-cv').__coverKey = null  // 換抽屜 → 清封面護欄（其他抽屜會 clobber dr-cv，下次 book render 須重建）
    document.getElementById('dr-mask').classList.add('open')
    document.getElementById('drawer').classList.add('open')
    document.getElementById('drawer').setAttribute('aria-hidden', 'false')
  }
  function openDrawer(slug) {
    openSlug = slug; openMath = false; openSession = null; openSessionFrom = null
    if (slug !== drawerDetailSlug) drawerDetail = null  // 換書 → 清舊詳情快取（不顯示上一本 timeline/sessions）
    document.getElementById('dr-back').hidden = true
    _openDrawerEl(); renderDrawer()  // 書本分支 on-demand 撿 detail/<slug>.json（隨 1s poll 保持 live）
  }
  function openMathDrawer() {
    openMath = true; openSlug = null; openSession = null
    document.getElementById('dr-back').hidden = true
    _openDrawerEl(); renderDrawer()
    startMathRaw()  // 開抽屜才輪詢 live 串流 + 歷史（省 idle 時的閒置請求）
  }
  // math sweep 即時串流 + 歷史批次：只在數學抽屜開著時輪詢（live 1.2s 跟得上模型逐字生成）
  async function loadMathRaw() {
    // 只抓聚合 live（panel 已不顯逐批歷史 → 省一次 fetch；歷史保留檔案供 `sweep raw` CLI 取證）
    try { mathLive = await fetchJson('math_live.json') } catch (e) { mathLive = null }
    if (openMath) renderMathStream()
  }
  function startMathRaw() {
    loadMathRaw()
    if (!mathRawTimer) mathRawTimer = setInterval(loadMathRaw, MATHRAW_MS)
  }
  function stopMathRaw() { clearInterval(mathRawTimer); mathRawTimer = null }
  // 歷史 session 重播：開抽屜呈現該場完整逐事件（fromSlug=從某書歷程點進來 → 顯示返回鈕）
  function openSessionDrawer(summary, fromSlug) {
    if (!summary) return
    openSession = summary; openSessionFrom = fromSlug || null
    openSlug = null; openMath = false
    document.getElementById('dr-back').hidden = !fromSlug
    _openDrawerEl(); renderDrawer()
  }
  function closeDrawer() {
    stopMathRaw()
    openSlug = null; openMath = false; openSession = null; openSessionFrom = null
    openProposals = false; openProposalId = null
    document.getElementById('dr-back').hidden = true
    document.getElementById('dr-mask').classList.remove('open')
    document.getElementById('drawer').classList.remove('open')
    document.getElementById('drawer').setAttribute('aria-hidden', 'true')
  }
  // ── proposals（復用右側 drawer）：列表 + 單條詳情。純唯讀 — 裁決走 `proposals resolve` CLI ──
  function openProposalsDrawer() {
    openProposals = true; openProposalId = null
    openSlug = null; openMath = false; openSession = null; openSessionFrom = null
    document.getElementById('dr-back').hidden = true
    _openDrawerEl()
    if (proposalsFeed) renderProposalsDrawer(); else loadProposals()
  }
  function openProposalDrawer(id) {
    openProposalId = id; openProposals = false
    openSlug = null; openMath = false; openSession = null
    document.getElementById('dr-back').hidden = false  // 返回 → proposals 列表
    _openDrawerEl(); renderProposalDrawer()
  }
  function updateProposalsBadge() {
    const n = (proposalsFeed && proposalsFeed.counts && proposalsFeed.counts.proposed) || 0
    const c = document.getElementById('pp-count'); if (c) c.textContent = n
    const b = document.getElementById('btn-proposals'); if (b) b.classList.toggle('has-pending', n > 0)
  }
  async function loadProposals() {
    try { proposalsFeed = await fetchJson('proposals.json') } catch { proposalsFeed = null }
    updateProposalsBadge()
    if (openProposals) renderProposalsDrawer()
    else if (openProposalId) renderProposalDrawer()
  }
  function ppDomBadge(p) { return `<span class="pp-dom" data-d="${escapeAttr(p.domain || '')}">${escapeHtml(p.domain || '?')}</span>` }
  function renderProposalsDrawer() {
    document.getElementById('dr-cv').innerHTML = `<div class="ph crawl-ph">📋</div>`
    document.getElementById('dr-title').textContent = 'Proposals'
    const f = proposalsFeed
    const c = (f && f.counts) || { proposed: 0, parked: 0, accepted: 0, rejected: 0, superseded: 0 }
    const fr = (f && f.frontier && f.frontier.counts) || {}
    document.getElementById('dr-sub').textContent = `提案 · 待分類 ${c.proposed} · 等外部 ${c.parked || 0}`
    const bd = f && f.by_domain ? Object.entries(f.by_domain).map(([k, v]) => `${k} ${v}`).join(' · ') : ''
    document.getElementById('dr-meta').innerHTML =
      `<span class="dr-status dr-st-wait">🟡 待分類 <b>${c.proposed}</b></span>`
      + ` <span class="dr-status dr-st-ready">⏸ 等外部 <b>${c.parked || 0}</b></span>`
      + ` <small style="opacity:.6">accepted ${c.accepted} · rejected ${c.rejected}`
      + `${c.superseded ? ' · superseded ' + c.superseded : ''}${fr.stale ? ' · ⏳stale ' + fr.stale : ''}</small>`
      + (bd ? `<span>${escapeHtml(bd)}</span>` : '')
      + `<div class="pp-filter">`
      + `<button data-f="proposed" class="${ppFilter === 'proposed' ? 'on' : ''}">待分類</button>`
      + `<button data-f="parked" class="${ppFilter === 'parked' ? 'on' : ''}">等外部</button>`
      + `<button data-f="all" class="${ppFilter === 'all' ? 'on' : ''}">全部</button></div>`
    const items = ((f && f.items) || []).filter(p =>
      ppFilter === 'all' || (p.bucket || (p.status === 'proposed' ? 'actionable' : 'terminal'))
        === (ppFilter === 'parked' ? 'parked' : 'actionable'))
    const evs = document.getElementById('dr-evs')
    evs.innerHTML = items.length ? items.map(p => {
      const bk = p.bucket || (p.status === 'proposed' ? 'actionable' : 'terminal')
      const st = bk === 'terminal' ? `<span class="pp-st">${escapeHtml(p.status)}</span>`
               : bk === 'parked' ? `<span class="pp-st" style="color:var(--info)">⏸ 等外部</span>`
                                 : `<span class="pp-st proposed">待分類</span>`
      const stale = p.stale ? `<span class="pp-src" title="需重驗">⏳</span>` : ''
      return `<div class="pp-row ${bk === 'terminal' ? 'resolved' : ''}" data-pid="${encodeURIComponent(p.id)}">`
        + `<span class="pp-tt">${escapeHtml(p.title || p.id)}</span>`
        + ppDomBadge(p) + `<span class="pp-type">${escapeHtml(p.type || '')}</span>`
        + (p.source ? `<span class="pp-src">${escapeHtml(p.source)}</span>` : '')
        + stale + st + `<span class="pp-at">${escapeHtml(p.created ? relTime(p.created) : '')}</span></div>`
    }).join('') : `<div class="dr-empty">${ppFilter === 'all' ? '無提案' : (ppFilter === 'parked' ? '無等外部提案' : '無待分類提案 🎉')}</div>`
    document.getElementById('dr-tl').innerHTML = ''
    document.getElementById('dr-hist').innerHTML = ''
  }
  function renderProposalDrawer() {
    const f = proposalsFeed
    const p = f && ((f.items || []).find(x => x.id === openProposalId))
    document.getElementById('dr-cv').innerHTML = `<div class="ph crawl-ph">📋</div>`
