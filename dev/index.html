    }
    document.getElementById('dr-title').textContent = p.title || p.id
    document.getElementById('dr-sub').textContent = p.id
    const bk = p.bucket || (p.status === 'proposed' ? 'actionable' : 'terminal')
    const stCls = bk === 'actionable' ? 'dr-st-wait' : (bk === 'parked' ? 'dr-st-ready'
                  : (p.status === 'accepted' ? 'dr-st-done' : 'dr-st-ready'))
    const stLabel = bk === 'actionable' ? '🟡 待分類' : bk === 'parked' ? '⏸ 等外部' : escapeHtml(p.status)
    const ub = p.unblock || {}
    const va = p.verified_at || {}
    document.getElementById('dr-meta').innerHTML =
      `<span class="dr-status ${stCls}">${stLabel}</span>`
      + ppDomBadge(p) + `<span>type <b>${escapeHtml(p.type || '')}</b></span>`
      + (p.source ? `<span>source <b>${escapeHtml(p.source)}</b></span>` : '')
      + (p.slug ? `<span>書 <b>${escapeHtml(p.slug)}</b></span>` : '')
      + (ub.kind ? `<span>解鎖 <b>${escapeHtml(ub.kind)}${ub.target ? '→' + escapeHtml(ub.target) : ''}</b></span>` : '')
      + (va.sha ? `<span title="${escapeAttr(va.date || '')}">已驗 <b>@${escapeHtml(va.sha)}</b></span>` : '')
      + (p.stale ? `<span class="dr-status dr-st-wait">⏳ 需重驗</span>` : '')
      + (p.created ? `<span>${escapeHtml(p.created.replace('T', ' ').replace('+00:00', ''))} UTC</span>` : '')
    const sec = (h, body, pre) => body
      ? `<div class="pp-sec"><div class="h">${h}</div>${pre ? `<pre class="pp-pre">${escapeHtml(body)}</pre>` : `<div class="bd">${escapeHtml(body)}</div>`}</div>`
      : ''
    const detect = (p.detect && p.detect.length) ? p.detect.join('   ') : ''
    document.getElementById('dr-evs').innerHTML =
      (bk === 'terminal'
        ? `<div class="pp-sec"><div class="h">⚠ 已決議 — 僅摘要</div><div class="bd">完整內容：proposals show ${escapeHtml(p.id)}</div></div>`
        : '')
      + sec('evidence（發現根據）', p.evidence)
      + sec('proposal（建議 / diff）', p.proposal, true)
      + sec('risk（風險）', p.risk)
      + sec('disposition（執行細節）', p.disposition)
      + sec('detect', detect)
      + (p.resolution ? sec('resolution（決議）', p.resolution) : '')
    document.getElementById('dr-tl').innerHTML = ''
    document.getElementById('dr-hist').innerHTML = ''
  }
  // corpus 數學殘餘總覽抽屜（點數學 sweep 尾站）：top 髒書（可點進該書）+ 上次 sweep 詳情。
  function renderMathDrawer() {
    document.getElementById('drawer').classList.add('math-mode')  // 把 LLM 即時串流 order 拉到抽屜頂
    const m = (last && last.math) || {}
    document.getElementById('dr-cv').innerHTML = `<div class="ph crawl-ph math-ph">🧮</div>`
    document.getElementById('dr-title').textContent = '數學 sweep · 跨書殘餘'
    document.getElementById('dr-sub').textContent =
      `macros ${m.macros_version || '?'}${m.node_available ? '' : ' · node 缺·未驗證'}`
    document.getElementById('dr-meta').innerHTML =
      `<span class="dr-status ${m.due ? 'dr-st-wait' : 'dr-st-done'}">`
      + `${m.running ? '🔵 batch 處理中（純自架 API）'
                 : (m.due ? '🔴 未解殘餘>0 · 待 batch 解（朝真 0）'
                 : (m.reason === 'fixpoint' ? '🟠 fixpoint · batch 也解不動，待 accept 或外部變化'
                    : (m.residual_unaccepted > 0 ? '🟠 卡住 · 未解殘餘'
                                                 : '🟢 全 corpus 數學皆可渲染（真 0）')))}</span>`
      + `<span>corpus <b>${m.corpus_bad_occ ?? '?'}</b> occ</span>`
      + `<span>未解 <b>${m.residual_unaccepted ?? '?'}</b>`
      + `${m.accepted_total ? ` <small style="opacity:.6">已 accept ${m.accepted_total}</small>` : ''}</span>`
      + `<span><b>${m.books_with_residual ?? 0}</b> 書有殘</span>`
      + (m.last_batch ? `<span><small style="opacity:.6">上次 batch 解 ${m.last_batch.accepted || 0} · 剩 ${m.last_batch.still_failing || 0} 硬殘</small></span>` : '')
    const tb = m.top_books || []
    document.getElementById('dr-evs').innerHTML = tb.length
      ? `<div class="dr-empty" style="text-align:left;padding:6px 2px">殘餘最多的書（點開看該書）</div>`
        + tb.map(b => `<div class="ev tool math-row" data-slug="${escapeAttr(b.slug)}"><span class="ico">📕</span>`
          + `<span class="lbl">${escapeHtml(b.slug)}</span>`
          + `<span class="n">${b.bad_occ}${b.in_last_sweep ? ' ✓' : ''}</span></div>`).join('')
      : `<div class="dr-empty">無殘餘 — 全 corpus 數學式皆可渲染 🎉</div>`
    const sw = m.last_sweep
    let swHtml = `<div class="h">上次 sweep（上架後微調 · 書留在「上站完成」不流經本站）</div>`
    if (sw) {
      swHtml += `<div class="tlrow"><span class="stg">${relTime(sw.at)}</span>`
        + `<span class="at">改 ${(sw.touched || []).length} 書</span><span class="du">→殘 ${sw.residual_after} occ</span></div>`
      swHtml += (sw.touched || []).length
        ? (sw.touched).map(s => `<div class="ev tool math-row" data-slug="${escapeAttr(s)}">`
            + `<span class="ico">🔧</span><span class="lbl">${escapeHtml(s)}</span><span class="n">已微調</span></div>`).join('')
        : `<div class="dr-empty" style="text-align:left;padding:4px 2px">本輪無書可改（殘餘皆硬殘）</div>`
    } else swHtml += `<div class="tlrow"><span class="stg">尚未 sweep 過</span></div>`
    // corpus 作業歷程（math_sweep 等 slug=null 場次）：原 #p-corpus 面板已退役，折進本抽屜。
    const cs = corpusSessions || []
    indexSessions(cs)  // 點擊解析靠 sessById（不依賴 last churn）
    if (cs.length) swHtml += `<div class="h" style="margin-top:12px">Corpus 作業歷程 (${cs.length})</div>`
      + cs.map(sessRowHtml).join('')
    document.getElementById('dr-tl').innerHTML = swHtml
    renderMathStream()  // dr-hist 放即時 LLM 串流 + 歷史批次回溯
  }
  // 聚合進度卡（8 worker 並發，schema 2）：只回答「它在工作 + 多快」。渲入 dr-hist（MATHRAW_MS 刷新）。
  function renderMathStream() {
    const el = document.getElementById('dr-hist'); if (!el) return
    const lv = mathLive
    if (!lv || lv.schema !== 2) {
      el.__msCard = null  // 重置外殼引用：下次 running 再乾淨重建
      el.innerHTML = `<div class="dr-empty" style="text-align:left;padding:6px 2px">尚未啟動 batch（待 daemon 派工）</div>`
      return
    }
    const running = lv.state === 'running'
    const pct = lv.total ? Math.round(lv.done / lv.total * 100) : 0
    const eta = lv.eta_s == null ? '—' : fmtDur(lv.eta_s)
    // 外殼 .ms-card 一次性建、留存：mrpulse 動畫綁外殼，每 1.2s 全重建會讓它從 0 重啟成閃爍。
    // 只重建內層 .ms-body 數值（無動畫）；.live 冪等 toggle（running 不變即不重啟動畫）。
    let card = el.__msCard
    if (!card || card.parentNode !== el) {
      el.innerHTML = `<div class="ms-card"><div class="ms-body"></div></div>`
      card = el.querySelector('.ms-card'); el.__msCard = card
    }
    card.classList.toggle('live', running)
    card.querySelector('.ms-body').innerHTML =
      `<div class="ms-top"><span>${running ? '🟢' : '⚪'}</span>`
      + `<span class="ms-state">${running ? `${lv.active}/${lv.workers} worker 並發處理中` : '待命 · 最近一批已完成'}</span></div>`
      + `<div class="ms-rate"><b>${lv.rate_per_min}</b><span>條/分</span></div>`
      + `<div class="ms-bar"><div class="ms-fill" style="width:${pct}%"></div></div>`
      + `<div class="ms-prog">${lv.done}/${lv.total} 條 · ${pct}%${running ? ` · ETA ${eta}` : ''} · 已跑 ${fmtDur(lv.elapsed_s)}</div>`
      + `<div class="ms-cnts"><span class="ms-ac">✓ ${lv.accepted} 落地</span>`
      + `<span class="ms-un">⊘ ${lv.unrecoverable} 源毀</span>`
      + `<span class="ms-rt">↻ ${lv.retry_pending} 重試</span>`
      + (lv.hard_residual ? `<span class="ms-hd">✗ ${lv.hard_residual} 硬殘</span>` : '')
  }
  function renderDrawer() {
    document.getElementById('drawer').classList.remove('math-mode')  // 預設關閉；math 抽屜自行開啟
    if (openProposals) return renderProposalsDrawer()
    if (openProposalId) return renderProposalDrawer()
    if (openMath) return renderMathDrawer()
    if (openSession) return renderSessionDrawer()
    if (!openSlug || !last) return
    const b = last.books.find(x => x.slug === openSlug); if (!b) return
    const w = workerOf(openSlug)
    // 封面是 <img>：每 1s 重建會 re-decode 閃爍。只在換書時重建（靜態，不隨 worker poll 變）。
    const cvEl = document.getElementById('dr-cv'), ck = 'b:' + b.slug
    if (cvEl.__coverKey !== ck) { cvEl.innerHTML = coverHtml(b, true); cvEl.__coverKey = ck }
    document.getElementById('dr-title').textContent = b.title || b.slug
    document.getElementById('dr-sub').textContent = b.slug
    const stName = STATIONS[stationOf(b)].name
    const st = statusText(b, w)
    const probStr = b.prob ? (b.sol_book ? `${b.sol || 0}/${b.prob} 解` : `${b.prob} 題（無解答本）`) : ''
    document.getElementById('dr-meta').innerHTML =
      `<span class="dr-status dr-st-${st.cls}">${escapeHtml(st.txt)}</span>`
      + `<span>階段 <b>${escapeHtml(b.stage || '—')}</b></span><span>站台 <b>${stName}</b></span>`
      + (probStr ? `<span>題/解 <b>${escapeHtml(probStr)}</b></span>` : '')
      + (b.math_bad ? `<span>數學殘 <b>${b.math_bad} occ</b>（已上站、不擋服務）</span>` : '')
      + (w ? `<span>工人 <b>${escapeHtml(w.verb||'')}</b></span><span>${escapeHtml(w.provider||'')} · pid ${w.pid}</span><span><b>${w.total_calls||0}</b> 次工具調用</span>`
           : `<span class="dev-label">目前無工人在此書</span>`)
    const evs = document.getElementById('dr-evs')
    if (w && (w.recent || []).length) {
      const total = w.total_calls || 0, shown = w.recent.length
      const more = total > shown ? `<div class="dr-empty">… 早於此的 ${total - shown} 次未保留（上限 ${shown}）</div>` : ''
      evs.innerHTML = more + w.recent.map((r, idx) => {
        const ico = r.kind === 'tool' ? '🔧' : '💬'
        const n = r.kind === 'tool' ? '' : ''
        return `<div class="ev ${r.kind}"><span class="ico">${ico}</span><span class="n">${escapeHtml(r.t ? relTime(r.t) : '')}</span>`
          + `<span class="lbl">${escapeHtml(r.label || '')}</span></div>`
      }).join('')
    } else {
      evs.innerHTML = `<div class="dr-empty">${w ? '（工人尚無事件…）' : '此書目前無進行中工人'}</div>`
    }
    // 階段時間軸 + Agent 歷程：核 status.json 已逐出（佔 books[] ~82%）→ per-book detail/<slug>.json on-demand。
    renderDrawerDetail()      // 先用快取同步繪（無閃爍）
    loadDrawerDetail(b.slug)  // 背景刷新（節流；404/尚無→空 graceful）→ 新 session 仍會冒出、不凍結
  }
  // 抽屜書本 detail（timeline+sessions）on-demand：核已逐出，只取所看那本（~0.7KB）。404/尚無→空。
  async function loadDrawerDetail(slug) {
    if (slug === drawerDetailSlug && drawerDetail && (Date.now() - drawerDetailAt) < 8000) return  // 節流：8s 內已新鮮、不重撿
    drawerDetailAt = Date.now()
    let d = null
    try { d = await fetchJson('detail/' + encodeURIComponent(slug) + '.json') } catch { d = null }  // 404/尚無 detail → 空 graceful（同 fetchSessionEvents）
    if (openSlug !== slug) return  // 抽屜已切走 → 丟棄
    drawerDetail = d || { slug, timeline: [], sessions: [] }
    drawerDetailSlug = slug
    renderDrawerDetail()
  }
  function renderDrawerDetail() {
    const loading = drawerDetail === null
    const tline = (drawerDetail && drawerDetail.timeline) || []
    document.getElementById('dr-tl').innerHTML = tline.length
      ? `<div class="h">階段時間軸</div>` + tline.map((e, j) => {
          const nx = tline[j + 1], dur = nx ? fmtSpan(Date.parse(nx.at) - Date.parse(e.at)) : ''
          const at = (e.at || '').replace('T', ' ').replace('+00:00', '')
          return `<div class="tlrow"><span class="stg">${escapeHtml(e.stage)}</span><span class="at">${escapeHtml(at)}</span>`
            + `<span class="du">${dur ? '▸ ' + dur : ''}</span></div>`
        }).join('')
      : ''
    renderDrawerHistory(drawerDetail, loading)
  }
  // ── 歷史 agent session（完整逐事件，懶載 JSONL） ──
  // 回事件陣列（200，含真正空檔回 []）；fetch 失敗 / 404（已被 prune）回 null → 呼叫端區分且不快取
  async function fetchSessionEvents(id) {
    try {
      const res = await fetch('agent_history/sessions/' + encodeURIComponent(id) + '.jsonl')
      if (!res.ok) return null
      const txt = await res.text()
      return txt.split('\n').filter(Boolean).map(l => { try { return JSON.parse(l) } catch (e) { return null } }).filter(Boolean)
    } catch (e) { return null }
  }
  function evRowsHtml(events) {
    if (!events || !events.length) return `<div class="dr-empty">（此 session 無事件）</div>`
    return events.map(r => {
      const ico = r.kind === 'tool' ? '🔧' : '💬'
      return `<div class="ev ${r.kind}"><span class="ico">${ico}</span><span class="n">${escapeHtml(r.t ? relTime(r.t) : '')}</span>`
        + `<span class="lbl">${escapeHtml(r.label || '')}</span></div>`
    }).join('')
  }
  function indexSessions(arr) { for (const s of (arr || [])) sessById.set(s.id, s) }
  function sessRowHtml(s) {
    const okCls = s.reconstructed ? 'sk-recon' : (s.ok ? 'sk-ok' : 'sk-bad')
    const okTxt = s.reconstructed ? '◷' : (s.ok ? '✓' : `✗rc${s.rc}`)
    const corp = s.slug == null ? ` <span class="corp">corpus</span>` : ''
    // data-sid 用 encodeURIComponent：id 內含 slug（檔名衍生，未必純 ASCII/無引號）→ 防屬性截斷
    return `<div class="sess" data-sid="${encodeURIComponent(s.id)}">`
      + `<span class="sv">${escapeHtml(s.verb || '')}${corp}</span>`
      + `<span class="sm">${escapeHtml(s.model || '')}(${escapeHtml(s.harness || '')})</span>`
      + `<span class="sd">${fmtDur(s.duration_s)} · ${s.total_calls || 0}call</span>`
      + `<span class="st">${escapeHtml(s.started ? relTime(s.started) : '')}</span>`
      + `<span class="sk ${okCls}">${okTxt}</span></div>`
  }
  function renderDrawerHistory(d, loading) {
    const ss = (d && d.sessions) || []
    indexSessions(ss)
    document.getElementById('dr-hist').innerHTML = ss.length
      ? `<div class="h">Agent 歷程 (${ss.length})</div>` + ss.map(sessRowHtml).join('')
      : `<div class="h">Agent 歷程</div><div class="dr-empty">${loading ? '載入中…' : '尚無歷史 agent session'}</div>`
  }
  // 點擊解析：用 render 當下建檔的 sessById（不受 last 的 prune/窗口 churn 影響）
  function findSession(id) { return sessById.get(id) || null }
  function renderSessionDrawer() {
    const s = openSession; if (!s) return
    document.getElementById('dr-cv').innerHTML = `<div class="ph crawl-ph">${s.slug == null ? '🌐' : '🔧'}</div>`
    document.getElementById('dr-title').textContent = s.verb + (s.slug == null ? ' · corpus' : '')
    const startedTxt = (s.started || '').replace('T', ' ').replace('+00:00', '')
    document.getElementById('dr-sub').textContent = `${s.slug || 'corpus'} · ${startedTxt} UTC`
    const okTxt = s.reconstructed ? '◷ 未收尾（事後從 JSONL 重建）' : (s.ok ? '☑ 成功' : `✗ 失敗 rc=${s.rc}`)
    const okCls = s.reconstructed ? 'wait' : (s.ok ? 'done' : 'wait')
    document.getElementById('dr-meta').innerHTML =
      `<span class="dr-status dr-st-${okCls}">${okTxt}</span>`
      + `<span>模型 <b>${escapeHtml(s.model || '')}</b></span><span>harness <b>${escapeHtml(s.harness || '')}</b></span>`
      + `<span>時長 <b>${fmtDur(s.duration_s)}</b></span><span><b>${s.total_calls || 0}</b> 次工具調用</span>`
      + (s.touched && s.touched.length ? `<span>改動 <b>${s.touched.length}</b> 書</span>` : '')
    document.getElementById('dr-tl').innerHTML = ''
    document.getElementById('dr-hist').innerHTML = ''
    const evsEl = document.getElementById('dr-evs')
    const cached = sessEventCache.get(s.id)
    if (cached) { evsEl.innerHTML = evRowsHtml(cached); return }
    evsEl.innerHTML = `<div class="dr-empty">載入完整歷程…</div>`
    fetchSessionEvents(s.id).then(evs => {
      const stillOpen = openSession && openSession.id === s.id
      if (evs === null) {  // fetch 失敗 / 已被 prune → 不快取（下次重開重試），明示有別於「真的無事件」
        if (stillOpen) evsEl.innerHTML = `<div class="dr-empty">載入失敗或歷程已清除，稍後重試</div>`
        return
      }
      sessEventCache.set(s.id, evs)  // 只快取成功結果（含真正空檔）
      if (stillOpen) evsEl.innerHTML = evRowsHtml(evs)
    })
  }
  document.getElementById('dr-close').addEventListener('click', closeDrawer)
  document.getElementById('dr-mask').addEventListener('click', closeDrawer)
  document.getElementById('dr-back').addEventListener('click', () => {
    if (openProposalId) openProposalsDrawer()
    else if (openSessionFrom) openDrawer(openSessionFrom)
    else closeDrawer()
  })
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer() })
  document.getElementById('line').addEventListener('click', e => {
    const card = e.target.closest('.book')
    if (card) {
      if (card.dataset.slug) openDrawer(card.dataset.slug)
      return
    }
  })
  // corpus 抽屜內 top 髒書 → 點開該書抽屜
  document.getElementById('dr-evs').addEventListener('click', e => {
    const flt = e.target.closest('.pp-filter button')
    if (flt) { ppFilter = flt.dataset.f; renderProposalsDrawer(); return }
    const prow = e.target.closest('.pp-row')
    if (prow) { openProposalDrawer(decodeURIComponent(prow.dataset.pid)); return }
    const row = e.target.closest('.math-row'); if (row) openDrawer(row.dataset.slug)
  })
  // session row 點擊：抽屜歷程（from=當前書）與 corpus 面板（無 from）共用
  document.getElementById('dr-hist').addEventListener('click', e => {
    const row = e.target.closest('.sess'); if (!row) return
    openSessionDrawer(findSession(decodeURIComponent(row.dataset.sid)), openSlug)
  })
  // math 抽屜 dr-tl：corpus 作業歷程 sess（→ 回放，無 fromSlug）＋ 上次 sweep 改動書 math-row（→ 開該書）
  document.getElementById('dr-tl').addEventListener('click', e => {
    const sess = e.target.closest('.sess')
    if (sess) { openSessionDrawer(findSession(decodeURIComponent(sess.dataset.sid)), null); return }
    const row = e.target.closest('.math-row'); if (row) openDrawer(row.dataset.slug)
  })
  // /dev 已純觀測：所有控制全移至 CLI（devctl gates/pause/resume）。
  // 此處不再掛任何寫回監聽器。

  // ── 工具：跨度格式 ──
  function fmtDur(s) { return s == null ? '—' : (s < 90 ? `${s}s` : `${Math.round(s/60)}m`) }
  function fmtSpan(ms) {
    if (ms == null || ms < 0) return ''
    const s = Math.round(ms/1000); if (s < 90) return `${s}s`
    const m = Math.round(s/60); if (m < 90) return `${m}m`
    const h = ms/3.6e6; return h < 36 ? `${h.toFixed(1)}h` : `${(h/24).toFixed(1)}d`
  }
  function fmtCountdown(s) {
    if (s == null) return '—'; if (s <= 0) return '隨時觸發'
    const m = Math.floor(s/60), sec = Math.floor(s%60)
    return m < 1 ? `${sec}s 後` : (m < 60 ? `${m}m ${sec}s 後` : `${(m/60).toFixed(1)} 時後`)
  }
  function serverEpoch(d) { const t = d.generated_at_utc; return Date.parse(/(Z|[+-]\d\d:?\d\d)$/.test(t) ? t : t + 'Z') }
  function tickClocks() {
    if (!last) return
    const drift = (Date.now() - serverEpoch(last)) / 1000, dm = last.daemon
    const nx = document.getElementById('h-next')
    if (nx) nx.textContent = dm.next_tick_eta_s == null ? '—' : fmtCountdown(dm.next_tick_eta_s - drift)
    const lt = document.getElementById('h-lasttick')
    if (lt && dm.last_tick_start_utc) lt.textContent = relTime(dm.last_tick_start_utc) + ' · ' + fmtDur(dm.last_tick_duration_s)
    const up = document.getElementById('updated')
    if (up) up.textContent = '更新於 ' + relTime(last.generated_at_utc)
  }

  function renderHealth(d) {  // daemon 狀態折進產線標題（dm-dot + dm-word）
    const dm = d.daemon
    const code = d.code || {}
    const healthy = dm.installed && (dm.last_exit_code === 0 || dm.last_exit_code === null)
    let dot, word
    // 排空中（reload/walltime 退出時排空在飛 worker）優先於「運轉中」：controller 仍活著但已停派新工，
    // 消除舊盲點（drain 期看板誤顯「運轉中」/CLI 誤顯「閒置」）。
    if (!dm.installed) { dot = 'dot-bad'; word = 'daemon 未安裝' }
    else if (code.phase === 'draining') { dot = 'dot-warn live'; word = 'controller 排空中（' + (code.reason || 'reload') + '）' }
    else if (dm.in_tick_now) { dot = 'dot-ok live'; word = 'controller 運轉中' }
    else if (healthy) { dot = 'dot-ok'; word = '待命' }
    else { dot = 'dot-bad'; word = `異常 exit=${dm.last_exit_code}` }
    const de = document.getElementById('dm-dot'); if (de) de.className = 'dev-dot ' + dot
    const we = document.getElementById('dm-word'); if (we) we.textContent = word
  }
  // 強制待辦（非 — 非 可選）：區分「待製(未上站)」與「精修(已上站仍有 catalog/sol)」
  function hasMand(b) { return (b.todo || '').split(/\s+/).some(t => t && t !== '—' && !t.endsWith('(可選)')) }
  function updateLineSub() {  // 頂部只報「此刻幾個工人」；本數/各階段數看下方各欄位即可
    if (!last) return
    const el = document.getElementById('line-sub'); if (!el) return
    el.textContent = `· 工人 ${liveWorkers().length} 🛠️`
  }

  // per-field gating（root-cause F）：值未變不寫 DOM，靜置時不觸發 paint
  function setHtml(id, html) { const el = document.getElementById(id); if (el && el.__h !== html) { el.__h = html; el.innerHTML = html } }
  function setText(id, txt) { const el = document.getElementById(id); if (el && el.textContent !== txt) el.textContent = txt }

  // 書單欄（漏斗源頭，合格存在五態）：backlog = un-owned 但「存在於 universe」的待處理書 = 待查連結
  // (candidate 無 z-lib 連結) + 待驗證 (pending 有連結但版本/解答/夠格未全驗) + 合格待下載 (qualified 四維
  // 全過、買書員待抓)。資料 = status.json 的 d.booklists.overall（progress 五態 owned/qualified/pending/
  // candidate/rejected，另含向後相容鍵 ready=qualified/unresolved=candidate/absent=rejected）。沒 editions
  // 的書（無連結）不在 universe → 不顯示（落實「沒連結＝不存在」）。
  function renderBooklist(d) {
    const o = (d.booklists && d.booklists.overall) || {}
    if (!o.total) { setText('bl-cnt', '—'); setHtml('bl-body', '<div class="lane-empty dev-label">（無書目）</div>'); return }
    const cand = o.candidate ?? o.unresolved ?? 0, pend = o.pending || 0
    const qual = o.qualified ?? o.ready ?? 0, rej = o.rejected ?? o.absent ?? 0
    const backlog = cand + pend + qual
    const pct = Math.round((o.owned || 0) / o.total * 100)
    setText('bl-cnt', String(backlog))
    setHtml('bl-body',
      `<div class="blf-row"><span>待查連結</span><b>${cand}</b></div>`
      + `<div class="blf-row"><span>待驗證(四維)</span><b>${pend}</b></div>`
      + `<div class="blf-row"><span>合格待下載</span><b>${qual}</b></div>`
      + `<div class="blf-own">已收 ${o.owned || 0}/${o.total} · ${pct}%</div>`
      + (rej ? `<div class="blf-abs">無法收錄 ${rej}</div>` : ''))
  }

  // 閘門狀態徽章（**唯讀**；操作走 CLI devctl gates/pause/resume）。三態：default==hold ∧ 無 rule→暫停(全停)；
  // default==hold ∧ 有 allow 例外 或 default==allow ∧ 有 hold rule→部分閘控；default==allow ∧ 無 rule→運轉。
  function renderGateBadge(d) {
    const el = document.getElementById('gate-badge'); if (!el) return
    const g = d.gates || { default: (d.paused ? 'hold' : 'allow'), rules: [] }  // 向後相容：無 gates 退回 paused
    const rules = g.rules || []
    let cls, txt
    if (rules.length) { cls = 'partial'; txt = '🔶 閘控 ' + rules.length }
    else if (g.default === 'hold') { cls = 'paused'; txt = '⏸ 暫停' }
    else { cls = 'running'; txt = '▶ 運轉' }
    el.className = 'meta qbk-result-count gate-' + cls
    el.textContent = txt
    el.title = '閘門（唯讀；操作走 CLI：devctl gates / pause / resume）\ndefault=' + g.default
      + (rules.length ? '\n' + rules.map((r, i) => `[${i}] ${r.action} ${r.slug} / ${r.stage}`).join('\n')
                      : '\n（無 rules）')
  }

  function render(d) {
    const prevStage = {}
    if (last && last.books) last.books.forEach(b => { prevStage[b.slug] = b.stage })  // 記前次階段：reconcile 後對剛變的卡閃示
    last = d
    renderHealth(d)
    renderGateBadge(d)
    updateLineSub()
    renderBooklist(d)
    reconcileBooks(d)
    // 階段剛變的卡閃示（核 status.json 1s 直驅，取代退役的 stages.json fast-lane；首次載入 prevStage 空→不閃）
    if (d.books) d.books.forEach(b => { if (b.slug in prevStage && prevStage[b.slug] !== b.stage) flashStage(b.slug) })
    reconcileMath()  // 殘餘數/reason 隨 status 刷新（agent liveness 另由 1s loadWorkers 管）

    // MinerU 無每日硬上限（>1000 頁僅降優先排隊）→ 不畫進度條，只列今日已送頁數。
    setText('budget-date', `(${d.budget.date_utc} UTC · 無上限)`)
    setHtml('budget', Object.entries(d.budget.accounts).map(([name, v]) =>
      `<div class="dev-bar-row"><span class="name">${escapeHtml(name)}</span>
        <span class="num">${v.used} 頁</span></div>`).join(''))

    const z = d.zlib || {}, zt = z.total_remaining
    const zage = z.fetched_at_utc ? ' · ' + relTime(z.fetched_at_utc) : ''
    const zcap = z.total_limit || (z.accounts || []).reduce((s, a) => s + (a.limit || 0), 0) || '?'
    setText('zlib-total', `(總剩 ${zt == null ? '?' : zt}/${zcap}${z.stale ? ' · STALE' : ''}${zage})`)
    // 純觀測：只顯示各帳號真實額度 bar（流量控制走閘門 devctl gates crawl，不再有帳號停用）。
    setHtml('zlib', (z.accounts || []).map(a => {
      const lim = a.limit, rem = a.remaining
      const pct = (lim && rem != null) ? Math.min(100, Math.round(rem / lim * 100)) : 0
      const numTxt = rem == null ? '查無' : `${rem}/${lim == null ? '?' : lim}`
      return `<div class="dev-bar-row"><span class="name">${escapeHtml(a.email || ('acct'+a.account))}</span>
        <span class="dev-bar"><span style="width:${pct}%"></span></span><span class="num">${numTxt}</span></div>`
    }).join('') || '<div class="dev-label">查詢中…</div>')

    const bl = d.booklists || {}, blo = bl.overall || {}
    const blPct = blo.total ? Math.round(blo.owned / blo.total * 100) : 0
    setText('bl-overall', blo.total
      ? `(${blo.owned}/${blo.total} · ${blPct}% · 合格 ${blo.qualified ?? blo.ready ?? 0}`
        + ` · 待驗證 ${blo.pending || 0} · 待查連結 ${blo.candidate ?? blo.unresolved ?? 0}`
        + ` · 無法收錄 ${blo.rejected ?? blo.absent ?? 0})`
      : '')
    setHtml('booklists', Object.entries(bl.by_field || {}).map(([f, c]) => {
      const p = c.total ? Math.round(c.owned / c.total * 100) : 0
      return `<div class="dev-bar-row"><span class="name">${escapeHtml(f)}</span>
        <span class="dev-bar"><span style="width:${p}%"></span></span>
        <span class="num">${c.owned}/${c.total}</span></div>`
    }).join('') || '<div class="dev-label">（無書單）</div>')

    setText('foot', `snapshot ${d.generated_at_local}（撿檔每 ${REFRESH_MS/1000}s · 工人每 ${WORKERS_MS/1000}s · 時鐘每秒）`)
    tickClocks()
  }

  async function loadWorkers() {
    try { const data = await fetchJson('workers.json'); lastWorkers = (data && data.workers) || [] }
    catch { lastWorkers = [] }
    reconcileCrawl()  // 爬書站走 1s cadence（≤1s 反映 worker 起/止，非 8s）
    reconcileMath()   // 數學 sweep agent 同走 1s cadence（slug=null，本站直接渲染）
    applyWalkers()
    if (last) { updateLineSub(); tickClocks() }  // 工人 poll：刷 live 工人數 + 時鐘
    if (openSlug) renderDrawer()
  }
  // 階段剛變的卡閃示（核 status.json 1s 直驅 → 退役 stages.json fast-lane；render() reconcile 後呼叫）。
  function flashStage(slug) {
    const el = document.querySelector('.book[data-slug="' + (window.CSS ? CSS.escape(slug) : slug) + '"]')
    if (el) { el.classList.remove('stage-flash'); void el.offsetWidth; el.classList.add('stage-flash') }
  }
  // live 下載快訊：1s 直撿 dev/crawl_live.json（買書員逐本 下載中→✓/✗），不等 8s status.json。
  // 無下載時檔不存在 → fetch 404 → crawlLive=null → 表頭退回常態 reason。
  async function loadCrawlLive() {
    try { crawlLive = await fetchJson('crawl_live.json') }
    catch { crawlLive = null }
    reconcileCrawl()
  }
  // 自動 1s 輪詢用：靜默，不碰按鈕（spin 回饋只屬手動點擊；每秒重建 spin 會閃）。
  async function load() {
    try { render(await fetchJson('status.json')) }
    catch (e) { document.getElementById('foot').textContent = '讀取 status.json 失敗：' + (e.message || e) }
  }

  // 系統健康（errors/recent_log/corpus_sessions）：逐出核 status.json → dev/system.json，~8s 慢輪詢。
  function renderSystem(s) {
    const errs = (s && s.errors) || []
    setHtml('err-head', errs.length ? `🔴 錯誤 (${errs.length})` : `🟢 錯誤`)
    setHtml('errors', errs.length
      ? errs.slice(-12).map(e => `<div class="dev-err"><span class="src">[${escapeHtml(e.src)}]</span>${escapeHtml(e.line)}</div>`).join('')
      : `<div class="dev-ok-msg">✓ 無錯誤</div>`)
    corpusSessions = (s && s.corpus_sessions) || []  // 餵 math 抽屜 corpus 歷程節（原 #p-corpus 面板已退役）
    indexSessions(corpusSessions)
    if (openMath) renderMathDrawer()  // 抽屜開著 → 隨 8s system tick 刷新 corpus 歷程
    setText('log', ((s && s.recent_log) || []).join('\n'))
  }
  async function loadSystem() {
    let s = null
    try { s = await fetchJson('system.json') } catch { s = null }  // 尚無檔→保留上次（不誤清）
    if (s) renderSystem(s)
  }
  function start() {
    if (!timer) timer = setInterval(load, REFRESH_MS)
    if (!clockTimer) clockTimer = setInterval(tickClocks, CLOCK_MS)
    if (!workersTimer) workersTimer = setInterval(loadWorkers, WORKERS_MS)
    if (!crawlLiveTimer) crawlLiveTimer = setInterval(loadCrawlLive, CRAWLLIVE_MS)
    if (!proposalsTimer) proposalsTimer = setInterval(loadProposals, PROPOSALS_MS)
    if (!systemTimer) systemTimer = setInterval(loadSystem, SYSTEM_MS)
  }
  function stop() { clearInterval(timer); clearInterval(clockTimer); clearInterval(workersTimer); clearInterval(crawlLiveTimer); clearInterval(proposalsTimer); clearInterval(systemTimer); timer = clockTimer = workersTimer = crawlLiveTimer = proposalsTimer = systemTimer = null; stopMathRaw() }
  // 手動點擊才顯 spin 回饋（自動輪詢靜默）：全 feed 一起刷、結束收回。
  document.getElementById('btn-refresh').addEventListener('click', async () => {
    const btn = document.getElementById('btn-refresh')
    btn.innerHTML = '<span class="spin">↻</span> refresh'
    try { await Promise.all([load(), loadWorkers(), loadCrawlLive(), loadProposals(), loadSystem()]) }
    finally { btn.innerHTML = '↻ refresh' }
  })
  document.getElementById('btn-proposals').addEventListener('click', openProposalsDrawer)
  document.getElementById('btn-math').addEventListener('click', openMathDrawer)
  buildScaffold()  // 站台骨架一次建好（之後只 reconcile lane 內卡片）
  load(); loadWorkers(); loadProposals(); loadSystem(); start()
  document.addEventListener('visibilitychange', () => { if (document.hidden) stop(); else { load(); loadWorkers(); loadProposals(); loadSystem(); start(); if (openMath) startMathRaw() } })
  </script>
</body>
</html>
