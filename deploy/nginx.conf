# 白名單式服務：mount 的是整個 repo 根，故只開放靜態 reader 資源，
# 其餘（.env / book_pipeline / .git / *.py / raw_pdfs / mineru_data …）一律封鎖，杜絕憑證/原始碼外洩。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    autoindex off;

    types {
        text/html               html;
        text/css                css;
        application/javascript  js;
        application/json        json;
        image/webp              webp;
        image/jpeg              jpg jpeg;
        image/x-icon            ico;
    }
    default_type application/octet-stream;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
    # webp 已壓縮，不再 gzip

    # 首頁（hash 路由 SPA，server 端不需 rewrite）
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /favicon.ico { try_files /favicon.ico =404; access_log off; log_not_found off; }

    # 前端共用 JS/CSS
    location /assets/ { try_files $uri =404; }

    # 圖片：content-addressed hash，長快取
    location /img/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 烤好的 JSON：re-bake 後須即時可見
    location /data/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # dev 監控頁（index.html + devctl 定時重生的 status.json）。
    # ⚠️ 內含 log/書名/錯誤訊息 → 公網存取必須由 Cloudflare Access（信箱閘）擋。
    #    Access 設好前，先要求 cloudflared 在 tunnel 層注入的 Cf-Access-Authenticated-User-Email
    #    （無此 header = 未過 Access）→ 擋掉裸連。設好 Access 後此 header 由 CF 保證存在。
    location ^~ /dev/ {
        if ($http_cf_access_authenticated_user_email = "") { return 403; }
        try_files $uri ${uri}index.html =404;
        add_header Cache-Control "no-cache";
    }

    # 書封白名單：未部署書（OCR/audit/catalog 階段）的封面只有 mineru_data/<slug>/cover.jpg，
    # 尚無 /img webp。**僅**放行恰好匹配 .../mineru_data/<slug>/cover.jpg 者（正則錨定 → 無法
    # 穿越到 .py / content_list.json / extract_rules.yaml / raw_pdfs 等）→ /dev 產線每本即時有封面。
    location ~ ^/book_pipeline/mineru_data/[^/]+/cover\.jpg$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # 其餘路徑一律封鎖
    location / { return 404; }
}
