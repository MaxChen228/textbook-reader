# 白名單式服務：mount 的是整個 repo 根，故只開放靜態 reader 資源，
# 其餘（.env / book_pipeline / .git / *.py / raw_pdfs / mineru_data …）一律封鎖，杜絕憑證/原始碼外洩。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    autoindex off;

    types {
        text/html               html;
        text/css                css;
        application/javascript  js;
        application/json        json;
        image/webp              webp;
        image/jpeg              jpg jpeg;
        image/x-icon            ico;
    }
    default_type application/octet-stream;

    gzip on;
    gzip_types text/css application/javascript application/json;  # text/html 預設即 gzip，列出會觸發 duplicate warn
    gzip_min_length 1024;
    # webp 已壓縮，不再 gzip

    # 首頁（hash 路由 SPA，server 端不需 rewrite）
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    # 靜態題目瀏覽器（hash 路由 SPA，餵 /data 同源 JSON）
    location = /problems.html {
        try_files /problems.html =404;
        add_header Cache-Control "no-cache";
    }
    location = /favicon.ico { try_files /favicon.ico =404; access_log off; log_not_found off; }

    # 前端共用 JS/CSS
    location /assets/ { try_files $uri =404; }

    # 圖片：content-addressed hash，長快取
    location /img/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 烤好的 JSON：re-bake 後須即時可見
    location /data/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # dev 監控頁（index.html + devctl 定時重生的 status.json）。
    # ⚠️ 內含 log/書名/錯誤訊息 → 公網存取必須由 Cloudflare Access（信箱閘）擋。
    #    Access 設好前，先要求 cloudflared 在 tunnel 層注入的 Cf-Access-Authenticated-User-Email
    #    （無此 header = 未過 Access）→ 擋掉裸連。設好 Access 後此 header 由 CF 保證存在。
    # /dev 寫回控制端點（帳號停用 toggle）→ proxy 給 devcontrol sidecar（compose 內網，不對外）。
    # longest-prefix：/dev/api/* 比 /dev/ 長 → 此 block 勝（順序無關）。同以 CF Access header 把關
    # （空 = 未過 Access → 403），並把該 header 轉發給 sidecar 復驗精確 email（縱深防禦）。
    location ^~ /dev/api/ {
        if ($http_cf_access_authenticated_user_email = "") { return 403; }
        # 變數式 proxy_pass + docker 內嵌 DNS resolver → 每 30s 重解 devcontrol IP，根除
        # 「devcontrol 重建換 compose IP 後 nginx 快取舊 IP 致 502」的運維陷阱（靜態 proxy_pass
        # 只 config-load 解析一次、IP 變了得手動 reload）。rewrite 剝 /dev/api/ 前綴：→ sidecar /account。
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $devcontrol_upstream devcontrol:8002;
        rewrite ^/dev/api/(.*)$ /$1 break;
        proxy_pass http://$devcontrol_upstream;
        proxy_set_header Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    location ^~ /dev/ {
        if ($http_cf_access_authenticated_user_email = "") { return 403; }
        try_files $uri ${uri}index.html =404;
        add_header Cache-Control "no-cache";
    }

    # 書封白名單：未部署書（OCR/audit/catalog 階段）的封面只有 mineru_data/<slug>/cover.jpg，
    # 尚無 /img webp。**僅**放行恰好匹配 .../mineru_data/<slug>/cover.jpg 者（正則錨定 → 無法
    # 穿越到 .py / content_list.json / extract_rules.yaml / raw_pdfs 等）→ /dev 產線每本即時有封面。
    location ~ ^/book_pipeline/mineru_data/[a-z0-9_]+/cover\.jpg$ {
        try_files $uri =404;
        # immutable 長快取：devctl 給的 URL 帶 ?v=<mtime>，封面換版即換 URL（內容定址）。
        # 故可比照 /img webp 永久快取 → 瀏覽器載一次即不再每次 render 重抓，杜絕 no-cache
        # 下「每 8s innerHTML 重建 → 逐圖重新 revalidate → 偶發失敗就破圖且不復原」的脆弱性。
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 其餘路徑一律封鎖
    location / { return 404; }
}
