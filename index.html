<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教科書 Reader</title>
  <script src="assets/qbank-shared.js"></script>
  <script>if(!window.MathJax)window.MathJax=QBankShared.mathJaxConfig;</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="assets/qbank-shared.css">
  <style>
    :root {
      --article-fs: 18px;
      --article-lh: 1.78;
    }
    body { font-size: 14px; line-height: 1.7; transition: background .25s ease, color .25s ease; }
    /* ── dark theme tokens（限本頁 scope） ───────────────────────────────── */
    body[data-theme="dark"] {
      --bg: #15140f;
      --surface: #1c1a14;
      --border: #2f2a22;
      --border-l: #25211a;
      --text: #ebe5d5;
      --sub: #8a8275;
      --ink: #f1ead9;
      --ink-light: #bdb39e;
      --accent: #d6cfb8;
    }
    body[data-theme="dark"] mjx-container { color: inherit; }

    :root { --qbk-sidebar-width: 250px; }

    /* view switch ─────────────────────────────────────────────────────── */
    #app[data-view="library"] #reader-sidebar-overlay,
    #app[data-view="library"] .reader-only { display: none; }
    #app[data-view="library"] .reader-sidebar-only { display: none; }
    #app[data-view="library"] #library-view { display: block; }
    #app[data-view="library"] #content { display: none; }

    #app[data-view="reader"] #library-view { display: none; }
    #app[data-view="reader"] .library-only { display: none; }
    #app[data-view="reader"] .library-sidebar-only { display: none; }

    /* ── sidebar (reader-only) ───────────────────────────────────────── */
    .library-sidebar-only,
    .reader-sidebar-only {
      min-height: 0; height: 100%; display: flex; flex-direction: column;
    }
    #sidebar-header {
      min-height: 52px; padding: 12px 20px 11px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sb-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .12em; color: var(--sub); text-decoration: none;
      text-transform: uppercase;
      transition: color .15s ease;
    }
    .sb-back:hover { color: var(--ink); }
    .sb-bookname {
      margin-top: 6px;
      font-family: var(--serif); font-size: 16px; font-weight: 600;
      color: var(--text); line-height: 1.3;
    }
    .sb-bookmeta {
      margin-top: 2px;
      font-family: var(--mono); font-size: 10px; color: var(--sub);
      letter-spacing: .04em;
    }

    #toc { flex: 1; overflow-y: auto; padding: 8px 0 14px; }
    #toc::-webkit-scrollbar { width: 3px; }
    #toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .toc-group-label {
      padding: 14px 20px 6px; font-family: var(--mono); font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .14em; color: var(--sub);
    }
    .toc-item {
      display: flex; align-items: baseline; gap: 10px; padding: 8px 20px;
      cursor: pointer; font-size: 13.5px; line-height: 1.4;
      color: var(--text); border-left: 2px solid transparent;
      transition: background .12s ease, border-color .12s ease;
    }
    .toc-item:hover { background: var(--bg); }
    .toc-item.active { background: var(--bg); border-left-color: var(--ink); font-weight: 600; }
    .toc-num { font-family: var(--mono); font-size: 11px; color: var(--sub); flex-shrink: 0; min-width: 34px; }
    .toc-item.active .toc-num { color: var(--ink); }
    .toc-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toc-meta { font-family: var(--mono); font-size: 9px; color: var(--sub); flex-shrink: 0; }
    .toc-caret {
      flex-shrink: 0; width: 10px; font-family: var(--mono); font-size: 9px;
      color: var(--sub); text-align: center; transition: transform .15s ease;
      display: inline-block; opacity: .6;
    }
    .toc-item.has-children { padding-left: 18px; gap: 8px; }
    .toc-item.expanded .toc-caret { transform: rotate(90deg); opacity: 1; }
    .toc-section-list { display: none; padding: 2px 0 8px; }
    .toc-item.expanded + .toc-section-list { display: block; }
    .toc-sec {
      display: flex; align-items: baseline; gap: 10px; cursor: pointer;
      padding: 5px 20px 5px 52px; font-size: 12.5px; line-height: 1.45;
      color: var(--ink-light); border-left: 2px solid transparent;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
    }
    .toc-sec:hover { color: var(--text); background: var(--bg); }
    .toc-sec.active { color: var(--ink); border-left-color: var(--ink-light); background: var(--bg); }
    .toc-sec[data-level="3"] { padding-left: 72px; font-size: 11.5px; color: var(--sub); }
    .toc-sec[data-level="3"]:hover { color: var(--text); }
    .toc-sec-num { font-family: var(--mono); font-size: 10px; color: var(--sub); flex-shrink: 0; min-width: 28px; }
    .toc-sec.active .toc-sec-num { color: var(--ink); }
    .toc-sec-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── 章/節複製按鈕 ────────────────────────────────────────────────── */
    .toc-copy {
      margin-left: auto;
      opacity: 0;
    }
    .toc-item:hover .toc-copy, .toc-sec:hover .toc-copy { opacity: .65; }
    .toc-copy:hover, .toc-copy.copied { opacity: 1 !important; }

    .reader-tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .reader-tab {
      border: 1px solid transparent; background: transparent; color: var(--sub);
      font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .08em;
      padding: 6px 8px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
    }
    .reader-tab:hover { color: var(--ink); background: var(--bg); }
    .reader-tab.active { color: var(--ink); border-color: var(--border); background: var(--bg); }
    #catalog-panel {
      display: none; flex: 1; min-height: 0; overflow: hidden; flex-direction: column;
      border-top: 0;
    }
    .catalog-tools { padding: 10px 12px 8px; border-bottom: 1px solid var(--border-l); }
    .catalog-search {
      width: 100%; height: 32px; padding: 0 9px;
      font-family: var(--mono); font-size: 11px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); color: var(--text);
    }
    .catalog-types { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 8px; }
    .catalog-type {
      border: 1px solid var(--border-l); background: transparent; color: var(--sub);
      font-family: var(--mono); font-size: 9px; letter-spacing: .04em;
      padding: 5px 4px; border-radius: 4px; cursor: pointer;
    }
    .catalog-type.active { color: var(--ink); border-color: var(--border); background: var(--bg); font-weight: 700; }
    .catalog-list { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 0 14px; }
    .catalog-item {
      display: flex; gap: 9px; padding: 8px 12px; cursor: pointer;
      border-left: 2px solid transparent; color: var(--text);
    }
    .catalog-item:hover { background: var(--bg); }
    .catalog-item.active { border-left-color: var(--ink); background: var(--bg); }
    .catalog-thumb {
      width: 56px; height: 44px; flex: 0 0 56px;
      border: 1px solid var(--border-l); border-radius: 3px;
      object-fit: contain; background: #fff;
    }
    body[data-theme="dark"] .catalog-thumb[data-kind="line"] { filter: invert(1) hue-rotate(180deg); }
    .catalog-body { min-width: 0; flex: 1; }
    .catalog-id { font-family: var(--mono); font-size: 10px; color: var(--ink); font-weight: 700; }
    .catalog-meta { font-family: var(--mono); font-size: 9px; color: var(--sub); margin-top: 1px; }
    .catalog-text {
      margin-top: 2px; font-size: 11.5px; line-height: 1.35; color: var(--ink-light);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .catalog-empty {
      padding: 34px 14px; text-align: center; color: var(--sub);
      font-family: var(--mono); font-size: 11px; line-height: 1.6;
    }
    .catalog-load-more {
      display: block; width: calc(100% - 24px); margin: 8px 12px 0;
    }
    #catalog-detail-modal {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: rgba(8, 7, 5, .48); align-items: center; justify-content: center;
      padding: 18px;
    }
    #catalog-detail-modal.open { display: flex; }
    .catalog-detail-dialog {
      width: min(860px, 96vw); max-height: 88vh; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      box-shadow: 0 20px 70px rgba(0,0,0,.28);
    }
    .catalog-detail-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    .catalog-detail-title {
      font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink);
    }
    .catalog-detail-meta {
      margin-top: 3px; font-family: var(--mono); font-size: 10px; color: var(--sub);
    }
    .catalog-detail-body {
      overflow: auto; padding: 18px; font-family: var(--article-font);
      color: var(--text); background: var(--surface);
    }
    .catalog-detail-body figure,
    .catalog-detail-body .tbl,
    .catalog-detail-body .eq { margin: 0; }
    .catalog-detail-body figure img {
      display: block; max-width: 100%; max-height: 62vh; object-fit: contain;
      margin: 0 auto; background: #fff; border: 1px solid var(--border-l);
    }
    body[data-theme="dark"] .catalog-detail-body figure[data-kind="line"] img {
      filter: invert(1) hue-rotate(180deg);
    }
    .catalog-detail-body .eq { overflow-x: auto; padding: 16px 4px; }
    .catalog-detail-body .catalog-detail-fallback {
      font-family: var(--mono); font-size: 12px; line-height: 1.6; color: var(--sub);
      padding: 18px; border: 1px dashed var(--border); border-radius: 4px;
    }
    .catalog-detail-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 10px 14px; border-top: 1px solid var(--border);
    }

    /* ── main ───────────────────────────────────────────────────────── */
    #main { transition: background .25s ease; }
    #topbar { transition: background .25s ease, border-color .25s ease; }
    #crumb { flex: 1; min-width: 0; font-family: var(--mono); font-size: 11px; color: var(--sub); letter-spacing: .03em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #crumb .cur { color: var(--text); font-weight: 600; }

    /* ── library view ──────────────────────────────────────────────── */
    #library-view { display: none; flex: 1; overflow: hidden; }
    #library-view::-webkit-scrollbar { width: 5px; }
    #library-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

    .library-rail { gap: 0; }
    .library-subjects { margin-bottom: 18px; }
    .library-rail-stats {
      display: grid; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border-l);
      font-family: var(--mono); font-size: 10px; color: var(--sub); letter-spacing: .03em;
    }
    .library-rail-stats strong { color: var(--ink); font-size: 12px; }
    .lib-wrap { height: 100%; overflow-y: auto; padding: 20px 28px 48px; }
    .lib-wrap::-webkit-scrollbar { width: 4px; }
    .lib-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .lib-search {
      max-width: 320px;
      padding-left: 12px;
    }

    .lib-group { margin-bottom: 22px; }
    .lib-group-label {
      font-family: var(--mono); font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .16em; color: var(--sub);
      padding-bottom: 6px; margin-bottom: 10px;
      border-bottom: 1px solid var(--border-l);
    }
    .lib-grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }
    .lib-card {
      padding: 0; background: var(--surface);
      cursor: pointer; text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: background .25s ease;
    }
    body[data-theme="dark"] .lib-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.25); }
    .lib-card-cover {
      width: 100%; aspect-ratio: 3 / 4; overflow: hidden;
      background: var(--bg); border-bottom: 1px solid var(--border-l);
      display: flex; align-items: center; justify-content: center;
    }
    .lib-card-cover img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: filter .25s ease;
    }
    body[data-theme="dark"] .lib-card-cover img { filter: brightness(.92); }
    .lib-card-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .lib-card-title {
      font-family: var(--serif); font-size: 15px; font-weight: 600; line-height: 1.25;
      color: var(--text);
    }
    .lib-card-author {
      font-family: var(--serif); font-size: 11.5px; color: var(--sub); line-height: 1.35;
      font-style: italic;
    }
    .lib-card-meta {
      margin-top: auto; padding-top: 6px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 9px; color: var(--sub); letter-spacing: .04em;
    }
    .lib-card-meta .edition {
      padding: 2px 7px; border: 1px solid var(--border); border-radius: 3px; color: var(--ink-light);
    }
    .lib-card-meta .zh-badge {
      padding: 2px 7px; border: 1px solid var(--ink-light); border-radius: 3px;
      color: var(--ink); font-weight: 600; letter-spacing: .06em;
    }
    .lib-card-meta .sol-badge {
      padding: 2px 7px; border: 1px solid var(--accent, var(--ink-light)); border-radius: 3px;
      color: var(--accent, var(--ink)); font-weight: 600; letter-spacing: .06em;
    }
    /* 收錄表：領域群組統計 + 具名子單標題 */
    .lib-group-stat {
      font-family: var(--mono); font-size: 9px; font-weight: 600;
      color: var(--ink-light); letter-spacing: .08em; margin-left: 6px;
    }
    .lib-sublist { margin-bottom: 16px; }
    .lib-sublist-label {
      font-family: var(--serif); font-size: 12px; font-weight: 600; font-style: italic;
      color: var(--sub); margin-bottom: 8px;
    }
    /* ghost 卡：待收錄/無法收錄，不可點，淡化呈現 */
    .lib-card-ghost {
      cursor: default;
      border: 1px dashed var(--border); background: transparent;
      opacity: .72;
    }
    .lib-card-ghost .lib-card-title { color: var(--sub); font-weight: 500; }
    .lib-card-ghost.shelf-absent { opacity: .5; }
    .shelf-pill {
      padding: 2px 7px; border-radius: 3px; font-weight: 600; letter-spacing: .06em;
    }
    .shelf-pill.shelf-pending { border: 1px solid var(--border); color: var(--sub); }
    .shelf-pill.shelf-absent {
      border: 1px solid var(--border-l); color: var(--sub);
      text-decoration: line-through; text-decoration-thickness: 1px;
    }
    .lib-empty {
      padding: 60px 20px; text-align: center; color: var(--sub);
      font-family: var(--mono); font-size: 12px;
    }

    /* ── content / article ─────────────────────────────────────────── */
    #content {
      flex: 1; min-width: 0;
      overflow-y: auto; overflow-x: hidden;
      overscroll-behavior-x: none;
    }
    #content::-webkit-scrollbar { width: 5px; }
    #content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    .article {
      max-width: var(--article-max-width, 880px); margin: 0 auto; padding: 56px 72px 120px;
      font-family: var(--article-font); font-size: var(--article-fs); line-height: var(--article-lh);
      min-width: 0;
    }
    .article p { margin: 0 0 18px; font-feature-settings: 'kern','liga','lnum'; }
    .article h1, .article h2, .article h3 { font-family: var(--article-font); font-feature-settings: 'kern','liga'; }
    .article h1 { font-size: 30px; font-weight: 700; margin: 0 0 8px; letter-spacing: 0; line-height: 1.2; }
    .article h1 .ch-num { font-family: var(--mono); font-size: 12px; color: var(--sub); letter-spacing: .14em; display: block; margin-bottom: 10px; text-transform: uppercase; }
    .article h2 { font-size: 22px; font-weight: 700; margin: 44px 0 16px; padding-bottom: 6px; border-bottom: 1px solid var(--border-l); }
    .article h3 { font-size: 17px; font-weight: 700; margin: 30px 0 12px; color: var(--text); }
    .article .sec-h .sec-num { font-family: var(--mono); font-weight: 500; color: var(--sub); margin-right: 8px; font-size: .85em; letter-spacing: .03em; }
    .article .sec-h { scroll-margin-top: 24px; }
    .problem-body { font-family: var(--article-font); }

    /* ── 雙語模式：英文原文預設，點 block 展開中譯 ───────────────────── */
    .bi-block {
      margin: 0 0 18px;
    }
    .bi-block > summary {
      list-style: none;
      cursor: pointer;
      border-radius: 6px;
      transition: background .15s ease;
    }
    .bi-block > summary::-webkit-details-marker { display: none; }
    .bi-block > summary:hover {
      background: color-mix(in srgb, var(--ink) 5%, transparent);
    }
    .bi-block > summary p { margin-bottom: 0; }
    .bi-block[open] > summary {
      margin-bottom: 8px;
    }
    .bi-panel {
      font-family: var(--cjk-serif);
      color: var(--ink-light); font-size: .94em; line-height: 1.85;
      margin: 4px 0 20px; padding: 10px 14px 10px 16px;
      border-left: 2px solid var(--border-l);
      background: color-mix(in srgb, var(--surface) 70%, transparent);
      border-radius: 0 6px 6px 0;
    }
    .bi-panel p { margin: 0 0 8px; }
    .bi-panel p:last-child { margin-bottom: 0; }
    .bi-reveal {
      display: inline-flex; align-items: center; gap: 6px;
      margin: -4px 0 18px;
      font-family: var(--mono); font-size: 10px; color: var(--sub);
      letter-spacing: .04em;
    }
    .bi-reveal > summary {
      list-style: none; cursor: pointer; padding: 2px 0;
      border-bottom: 1px solid transparent;
    }
    .bi-reveal > summary::-webkit-details-marker { display: none; }
    .bi-reveal > summary:hover { color: var(--ink); border-bottom-color: var(--border); }
    .bi-reveal[open] { display: block; }
    .bi-reveal[open] > summary { display: inline-block; margin-bottom: 8px; color: var(--ink); }
    .bi-reveal .bi-panel { margin-bottom: 0; }

    .eq {
      margin: 14px 0; text-align: center; position: relative; cursor: pointer; border-radius: 6px;
      transition: background .15s ease;
      max-width: 100%; overflow: visible;
    }
    .eq mjx-container[display="true"] {
      max-width: 100%; margin: 0 !important;
      overflow-x: auto !important; overflow-y: hidden !important;
    }
    .eq mjx-container[display="true"] mjx-math { overflow: visible !important; }
    .eq .label { font-family: var(--mono); font-size: 11px; color: var(--sub); }
    /* ── 數學式複製 affordance ─────────────────────────────────────────── */
    .eq:hover { background: color-mix(in srgb, var(--ink) 6%, transparent); }
    .eq::after {
      content: '⧉ 複製 LaTeX'; position: absolute; top: 2px; right: 8px;
      font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--sub);
      opacity: 0; transition: opacity .15s ease; pointer-events: none;
    }
    .eq:hover::after { opacity: .75; }
    .eq.copied::after { content: '✓ 已複製'; color: var(--ink); opacity: 1; }
    .qb-inline-math { border-radius: 3px; transition: background .12s ease; }
    .qb-inline-math:hover { background: color-mix(in srgb, var(--ink) 8%, transparent); }
    #copy-toast {
      position: fixed; bottom: 28px; left: 50%; z-index: 10000;
      transform: translateX(-50%) translateY(8px);
      padding: 8px 18px; border-radius: 6px;
      background: var(--ink); color: var(--bg);
      font-family: var(--mono); font-size: 12px; letter-spacing: .03em;
      opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    #copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .article figure { margin: 22px 0; text-align: center; }
    .article figure img {
      max-width: min(100%, 480px); max-height: 42vh; height: auto;
      border: 1px solid var(--border-l); border-radius: 3px;
      cursor: zoom-in; background: #fff;
      transition: filter .25s ease, border-color .25s ease, opacity .15s ease;
    }
    .article figure img:hover { opacity: .92; }
    /* 相鄰 figure 自動並排（MinerU 常把 (a)(b) 子圖拆成獨立 block） */
    .fig-row {
      display: flex; flex-wrap: wrap; gap: 16px;
      align-items: flex-start; justify-content: center;
      margin: 22px 0;
    }
    .fig-row figure { margin: 0; flex: 1 1 240px; max-width: 480px; }
    .fig-row figure img { max-width: 100%; max-height: 36vh; }
    /* 暗色：線條圖反相（黑線→白線、白底→黑底），照片溫和 dim */
    body[data-theme="dark"] .article figure[data-kind="line"] img {
      filter: invert(1) hue-rotate(180deg);
      background: #fff;  /* 反相後 #fff → #000，融入暗底 */
      border-color: var(--border);
    }
    body[data-theme="dark"] .article figure[data-kind="photo"] img,
    body[data-theme="dark"] .article figure:not([data-kind]) img {
      filter: brightness(.88) contrast(1.04);
      border-color: var(--border);
    }
    .article figcaption { margin-top: 12px; font-size: 13px; color: var(--sub); font-style: italic; }

    /* ── lightbox（點圖放大看原圖） ───────────────────────────────────── */

    @keyframes lb-fade { from { opacity: 0; } to { opacity: 1; } }
    .tbl { margin: 22px 0; overflow-x: auto; }
    .tbl table { border-collapse: collapse; font-size: 14px; margin: 0 auto; }
    .tbl th, .tbl td { border: 1px solid var(--border); padding: 6px 14px; }

    .example { margin: 22px 0; padding: 14px 20px; background: var(--bg); border-left: 3px solid var(--ink-light); border-radius: 0 4px 4px 0; }
    .example-marker { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--ink); text-transform: uppercase; }

    /* problems */
    .problems-section { margin-top: 60px; padding-top: 28px; border-top: 2px solid var(--ink); }
    .problems-section > h2 { border: 0; font-size: 24px; margin-top: 0; }
    .problem {
      margin: 0 0 22px; padding: 20px 24px; border: 1px solid var(--border);

    .problem-solution .solution-body p:last-child { margin-bottom: 0; }

    body[data-edit-mode="on"] .editable-block {

    #empty, #loading {

  </style>
</head>
