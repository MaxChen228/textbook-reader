# standby 靜態托管：nginx 直讀 repo 工作目錄，daemon 烤新檔即時生效（免 reload）。
# 對外經 Cloudflare kg-standby tunnel：books.wordnexus.lol → 127.0.0.1:8001。
services:
  textbook-reader:
    image: nginx:alpine
    container_name: textbook-reader
    restart: always
    ports:
      - "127.0.0.1:8001:80"        # 只綁 loopback，tunnel 走本機
    volumes:
      - .:/usr/share/nginx/html:ro                          # repo 根（唯讀）
      # 掛「目錄」而非單檔：編輯器以 atomic-rename 改寫 nginx.conf 會換 inode，
      # 單檔 bind mount 在 Docker-Desktop(macOS) 下會就此斷掉（容器內檔案憑空消失、
      # 下次 restart nginx 起不來）。掛目錄則 inode 穩定，改檔後僅需 nginx -s reload。
      - ./deploy:/etc/nginx/conf.d:ro                        # deploy/*.conf → 經 *.conf glob 載入
