# Munkres：chapter title=text_level 1、§-section heading=text_level 2。
# parser detect_heading 預設只認 lvl 1，故指定 2 才能偵測 §-section 並驅動 namespace。
heading_text_level: 2
# section_re 兩支 alternation（共用 2 group: id, title）：
#   (a) §-section「§ N Title」→ id=N（純數字；(?!\.) 排除被 OCR 誤標 lvl2 的「N. 題目」）
#   (b) 章末「∗Supplementary Exercises: Topic」→ id=Supplementary（與 §N 不撞，解 namespace 重號）
section_re: '^[∗*\s]*(?:§\s*)?(\d+(?!\.)|Supplementary)(?:\s+Exercises)?[\s:.]+(\S.*?)\s*†?\s*$'
subsection_re: '^()([A-Z][A-Za-z][^.\n]{0,78})$'
heading_priority: [subsection_re, section_re]

problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: true

problems_end_re: null
solution_start_re: null

equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+[a-z]?)\}'

example_start_re: '^EXAMPLE\s+(\d+)\.'

figure_caption_merge: false
figure_caption_main_re: null

