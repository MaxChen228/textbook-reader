# ── heading regex ──
# section/subsection 同時涵蓋章節 N.M（1.1–10.6）與附錄字母 section（A.1/B.1）、subsection（A.4.1）
section_re: '^((?:\d+|[A-Z])\.\d+)\s+(.+)$'
subsection_re: '^((?:\d+|[A-Z])\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
problem_start_re: '^Exercise\s+(\d+)'
problem_chapter_must_match: false   # 「Exercise N」純流水、每章重編，N≠章號故必 false

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+[a-z]?)\}'

# ── example（內文題） ──
