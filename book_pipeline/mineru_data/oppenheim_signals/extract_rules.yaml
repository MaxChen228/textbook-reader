# ── heading regex ──
# 編號型 N.M：section 全大寫標題（'2.5 SYSTEMS'）、subsection Title Case（'2.6.1 ...'）。
# section_re 後段強制至少 1 個 non-whitespace title 字元（不允許空 title）。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority:
  - subsection_re
  - section_re

# ── 題號 ──
# 題號型 'N.M. '（trailing dot），如 '3.1.'、'11.2.'。1 capture group。
problem_start_re: '^(\d+\.\d+)\.\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
# \tag {2.1a} / \tag {2.10} 型（label 含可選 trailing 字母）。MinerU $$...$$ 包殼。
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題） ──
# 'Example 3.1' 型 text_level=2 標題。
example_start_re: '^Example\s+(\d+\.\d+)'

# ── figure ──
# 試開 figure_caption_merge 反而讓 unresolved refs/empty captions 變多（24→50, 323→355），
# 故保持 false；殘留 H6/H7 是 OCR 漏抓圖檔/caption 的資料品質問題，非 audit yaml 可修。
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（可空） ──
known_missing_problems: []
