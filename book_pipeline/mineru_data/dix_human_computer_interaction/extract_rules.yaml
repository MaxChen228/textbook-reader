appendices: []

# Sections: book's printed form is "N.M Title" but MinerU OCR'd most as suffix
# "TITLE<N.M>" (132 cases) which cannot be expressed as (id, title) groups.
# section_re below matches the canonical prefix form; suffix-form section
# headings fall through to flat paragraphs (recorded in _audit.md).
# Subsections are clean prefix form "N.M.K Title" (324 cases) and split cleanly.
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

problem_start_re: '^(\d+\.\d+)\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

example_start_re: null

figure_caption_merge: false
figure_caption_main_re: null

known_missing_problems: []
