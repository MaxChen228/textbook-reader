# sethna_statistical_mechanics 解答書：無章標（chapterless）版型。
# sol 正文完全沒有 'Chapter N' / 數字章 anchor（sol_scout 各 text_level 帶數字章號=0），
# 但每題標頭是 'N.M Title …' 格式（如 '1.1 Quantum Dice'）。章資訊隱含在題號首段。
# 引擎 c1368d8 起支援 derive_chapter_from_num：由每題 num 首段 split('.') 推章號 → 直接 bucket，
# 不需章 anchor。problem_re group(1) 抓 'N.M' 對齊主書 parsed/chNN.json 的 problem['num']。
# 本書只覆蓋選題（非全題解），配對率不滿不是版次錯配。
chapter_re: '^Chapter\s+(\d+)'   # derive 模式下不用，僅為通過 schema 驗證（須合法 1-group regex）
problem_re: '^(\d+\.\d+[a-z]?)\b'
derive_chapter_from_num: true
multi_per_block: false
