# N.M section headings; OCR inserts spaces around the dot and inside numbers.
section_re: '^(\d+\s*\.\s*\d+)\s+(\S.*)$'
subsection_re: '^(\d+\s*\.\s*\d+\s*\.\s*\d+)\s+(\S.*)$'
heading_priority: [subsection_re, section_re]

# Problems are "N.M â€¦" but OCR drops/spaces the dot and splits 2-digit chapter
# numbers ('1 0 9' = 10.9). Number = 1-2 spaced digits, optional spaced dot, 1-2
# spaced digits; lookahead requires the problem text to start with a capital /
# citation '[' / paren / '$' so code line numbers ('1 /*â€¦') don't false-match.
# chapter_must_match=false: parser's int(num.split('.')[0]) would crash on the
# internal spaces of OCR-mangled 2-digit chapter numbers.
problem_start_re: '^(\d(?:\s*\d)?\s*\.?\s*\d(?:\s*\d)?)\s+(?=[A-Z\[(\$])'
problem_chapter_must_match: false

equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

example_start_re: '^Exam\s*ple\s+(\d+\s*\.\s*\d+)\b'

