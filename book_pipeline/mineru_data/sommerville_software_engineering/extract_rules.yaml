slug: sommerville_software_engineering
title: Software Engineering
author: Ian Sommerville
edition: 10th
subject: Software Engineering
publisher: Pearson
language: en

# ── block 過濾 ──
filter_types:
  - header
  - page_number
  - footer
  - page_footnote
  - ref_text          # count=25 > 5 → 進
ignore_image_content: true
ignore_chart_content: true

# heading_text_level: section/subsection 落在 lvl2（scout: lvl2=271 vs lvl1=4）
heading_text_level: 2

# ── 內容範圍（global 0-based PDF page_idx） ──
