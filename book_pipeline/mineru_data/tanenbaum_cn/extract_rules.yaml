# ── heading regex ──
# 編號型：section N.M（ALL CAPS title），subsection N.M.M（Title Case）。
# N.M alternation 強制 title 非空（lookahead），避免頁眉純編號 block 被當合法 heading。
section_re: '^(\d+\.\d+)(?=\s+\S)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Problems 區題號為純流水 "1. " "2. "（每章從 1 重置）→ chapter_must_match false
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+-[0-9]+[a-z]?)\}'

# ── example（內文題） ──
example_start_re: null

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
