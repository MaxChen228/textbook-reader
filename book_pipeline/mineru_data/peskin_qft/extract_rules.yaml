# ── heading regex ──
# Peskin section heading = "N.M Title"（如 "2.1 The Necessity..."）。
# subsection = 無編號 Title Case（"Lagrangian Field Theory"），無 N.M.N 三層編號，
# 故 subsection_re 用 N.M.N 佔位（語意正確；book 內無此型）。
# 註：本書 section/subsection block 在 MinerU 標為 text_level==2，
# parser detect_heading 僅認 text_level==1，故 body 內 heading 不觸發（退化為段落）；
# 不影響 block 陣列有效性與 problems 切分（problem_start_re 不依賴 level）。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 題號型 "N.M"（2.1, 3.1, 11.1 …），首段=章號 → must_match=true
problem_start_re: '^(\d+\.\d+)\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
# Ch22「Frontier」綜述章無 Problems heading（pbi=null, P4 真無題），但其 section
# 沿用全章號編碼 "22.1 …"（text_level==2 的 section heading，非習題）。validator 掃
# pbi=null 章全範圍時會把這些 section 誤判為 problem_start 命中。Ch22 章首 text_level==1
# 標題位於這些 section 之前，靠 problems_end_re 在 validator/parser 掃描時提早 break，
# 排除假陽性。此 regex 只匹配 Frontier 章名，對其他章 problems 區切分零副作用。
problems_end_re: '^Quantum Field Theory at the Frontier$'
solution_start_re: null

# ── equation ──
# MinerU v4：equation block 以 $$\n...\n$$ 包覆 → strip_dollar=true
# 編號以 \tag{N.M} 出現（如 \tag{4.90}）；多數公式無 inline tag
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題）──
example_start_re: null

