# ── heading regex ──
# section heading: 'N.M TITLE' (lvl2, e.g. '2.1 INTRODUCTION'); title 強制非空
# subsection heading: 'N.M.K Title' (lvl2, e.g. '2.2.1 Discrete-Time Signals')
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ── 'N.M. ...' (trailing period), e.g. '2.1. The DFT...'
problem_start_re: '^(\d+\.\d+)\.\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ── \tag{N.M} / \tag{N.Ma}
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example ── 'Example N.M.K Title' (lvl2)
example_start_re: '^Example\s+(\d+\.\d+(?:\.\d+)?)'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
