# ── heading regex (each exactly 2 capture groups: id, title) ──
# Sections are "N.M  UPPERCASE TITLE" (lvl2). No N.M.K subsections exist in this
# book; subsection_re kept valid-but-never-matching.
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority:
  - subsection_re
  - section_re

# ── problem numbering ──
# Pure running integer per chapter, no chapter prefix -> must_match false.
# Negative lookahead excludes leaked left-page running headers that MinerU emits
# as lvl2 text blocks inside the problems region: "<printed-page#> <CHAPTER NAME
# IN CAPS>" e.g. "152 NUMBER THEORY" / "318 SPECIAL NUMBERS". Their page number
# (152/318) would otherwise open a bogus high-numbered problem and poison the
# walker's monotonic max_num_seen guard, swallowing every real exercise after it
# (ch4 lost 73-74, ch6 lost 80-95). Real exercises are prose (contain lowercase);
# the header tail is all-caps to EOL, so (?![A-Z\s]+$) rejects only the headers.
problem_start_re: '^(\d+)\s+(?![A-Z\s]+$)'
problem_chapter_must_match: false
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equations ──
equation_strip_dollar: true
equation_label_re: '\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── examples (in-text) ──
# "Example N: Title." headings (lvl2) appear in ch7.
example_start_re: '^Example\s+(\d+)\s*[:.]'

# ── figures ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR missing problems (human-verified only) ──
known_missing_problems: []
