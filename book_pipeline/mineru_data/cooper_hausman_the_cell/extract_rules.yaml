# ── 附錄 ──
appendices: []                 # 'Appendix'(trivial 表) + Answers to Questions(答案 key) + Glossary 皆 back matter，由 appendices_start_page 排除

# ── heading regex ──
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false        # 題號純流水（1. 2. …），namespace 由 walker 補 section_id 前綴

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\tag\s*\{([0-9]+[a-z]?)\}'

# ── example（內文題） ──
example_start_re: null          # 無 Example 段；callout 為 KEY EXPERIMENT / MOLECULAR MEDICINE（非 example）

# ── figure ──
