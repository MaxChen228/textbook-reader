bibliography_start_page: null
index_start_page: 780

# ── inline-problem 模式 ──
# 每節 N.M 結尾接 lvl2 'Questions' heading + 逐節重置流水題號（1. 2. … N.）。
# 'Questions' 是 heading-lvl 但非 detected section（不匹配 section_re）→ problems_start_re 開區 + 保留 current_section_id（Enderton 變體）。
inline_problems: true
problem_num_namespace_by_section: true   # 各節題號從 1 重置 → walker 串 section_id：§1.1 題 1 → num='1.1.1'
problems_start_re: '(?i)^Questions$'      # 題目只在 'Questions' heading 後收（gate 掉 LEARNING OBJECTIVES / 正文編號散文）

