slug: cooper_hausman_the_cell
title: "The Cell: A Molecular Approach"
author: "Geoffrey M. Cooper; Kenneth W. Hausman"
edition: "9th"
subject: Biology
publisher: Oxford University Press
language: en

# ── block 過濾 ──
filter_types: [header, page_number, footer, aside_text, page_footnote, ref_text]
ignore_image_content: true
ignore_chart_content: true
heading_text_level: [2, 1]     # N.M section 多在 lvl2（152）；但 §16.4/17.3/18.2 straggler 落 lvl1 → 補偵測（代價：6493 'KEY EXPERIMENT 14.1 Examining…' 變假 section，影響有限）

# ── 內容範圍（global 0-based PDF page_idx） ──
body_start_page: 28
