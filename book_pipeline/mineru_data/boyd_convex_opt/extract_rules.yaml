# ── 附錄 ──
# chapter_title_block_idx = 附錄標題 block（跳過 "Appendix X" 那行）。
appendices:
  - id: A
    title: Mathematical background
    page_start: 647
    chapter_title_block_idx: 10761
  - id: B
    title: Problems involving two quadratic functions
    page_start: 667
    chapter_title_block_idx: 11145
  - id: C
    title: Numerical linear algebra background
    page_start: 675
    chapter_title_block_idx: 11256

# ── heading regex ──
# body section/subsection 為 N.M / N.M.K 編號型。注意本書 MinerU 把它們標成
# text_level=2（非 1），parser detect_heading 只認 lvl==1 → 實際 body 不會切出
# section/subsection block（降級為段落）。regex 仍依觀察填正確（見 _audit.md ⚠H）。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Exercises 題號 "2.9 Voronoi...", "2.1 Let ..."（含早段塞在 list_items 的 2.1–2.8）。
problem_start_re: '^(\d+\.\d+)\s+'
problem_chapter_must_match: true        # 題號首段 = 章號（N.M → split('.')[0]==N）
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example ──
example_start_re: null          # 本書無 "Example N.M" heading 段落（範例內嵌正文）

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
