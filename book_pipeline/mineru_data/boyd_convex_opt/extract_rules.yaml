# extract_rules.yaml — boyd_convex_opt
# Stephen Boyd & Lieven Vandenberghe, Convex Optimization (Cambridge UP, 2004).
# 由 audit-book deterministic 流程產出（§3 八步）。

# ── 書本 metadata ──
slug: boyd_convex_opt
title: Convex Optimization
author: Stephen Boyd; Lieven Vandenberghe
edition: null                # 書內只標 "First published 2004"，非序數版本字串 → null
subject: Optimization
publisher: Cambridge University Press
language: en

# ── block 過濾 ──
filter_types: [header, page_number, footer, page_footnote]
ignore_image_content: true
ignore_chart_content: true

# ── 內容範圍（global 0-based PDF page_idx） ──
body_start_page: 15
appendices_start_page: 647
bibliography_start_page: 699
index_start_page: 715

# ── inline-problem 模式 ──
inline_problems: false        # 全本章末 "Exercises" 段 → 二分模式

# ── 章節 ──
# chapter_title_block_idx = "Chapter N"（text_level=1）；secondary = 章名 block（cti+1），
# 兩者一起跳過 → body_start 落在第一個 section。問題段 anchor = 章末 "Exercises"（text_level=2）。
chapters:
  - num: 1
    title: Introduction
    page_start: 15
    page_end: 34
    chapter_title_block_idx: 167
    chapter_title_block_idx_secondary: 168
    problems_block_idx: 353       # ch1 無 Exercises；切在 Bibliography 後、Part-I divider 前 → 0 題
    next_chapter_block_idx: 356
