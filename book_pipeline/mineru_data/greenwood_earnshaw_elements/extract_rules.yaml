# ── heading regex（N.M section / N.M.K subsection，皆 lvl2）──
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號（無習題；式樣 0 命中）──
problem_start_re: '^Problem\s+(\d+\.\d+)\s'
problem_chapter_must_match: false

# ── equation（\tag{N} 整數標籤，含 3a/4b 變體；junk 如 \tag{mp 40°} 不被錨定式捕獲）──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+[a-z]?)\}'

# ── example（無內文 Example 段）──
example_start_re: null

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
