# ⚠ PENDING — 不要 merge。這本解答書內容看起來是對的，但現行 sol_extract 無法僅靠
# YAML regex 安全對齊，原因如下：
#
# 1. 主書 kleinberg_algorithm_design 的 problem['num'] 是章內 reset 的裸整數
#    （ch01/ch02/ch03... 都是 "1","2","3"...）。
# 2. 解答書 unified/content_list.json 幾乎全是沒有題號的解答正文：
#    - `type=text && text_level==1` 的條目數量是 0
#    - 只有 6 個 `text_level==2`，且內容是段內小標（如 "Schedule G:"、
#      "Independent Set <=_P Resource Reservation"），不是章 anchor
#    - 抽樣頁面可見正文直接以答案句子起頭，例如 page 1
#      "This is false. Consider ...", page 2 "This is true. Indeed ...",
#      page 3 "There is not always a stable pair of schedules ..."
#      ，頁面上沒有可供 regex 抓取的章號/題號。
# 3. 官方 dry-run：
#      `uv run --with pyyaml python -m book_pipeline.sol_extract
#         kleinberg_algorithm_design kleinberg_algorithm_design_sol --dry-run`
#    結果是「抽出 0 章、0 題解答」。
#
# 語義抽樣顯示這不是錯版，而是「正確內容但缺 deterministic key」：
# - ch01 p1/p2/p3：分別對應 "two men and two women"、
#   "rank the other first"、"Network A/D ... ratings 20 and 40"
# - ch10 p1/p2/p3：對應 "Hitting Set"、"3-SAT"、"Hamiltonian Path"
# - ch13 p1/p2/p3：對應 "cannister / 3-Coloring"、"100,000 voters"、
#   "described protocol ... conflict free"
#
# 4. 2026-06-23 對升級引擎（commit c1368d8，新增 derive_chapter_from_num /
#    chapter_in_header / chapter_roman / num_template）重驗：
#    - 全文 870 個 text block，僅 3 個以 "N." 起頭（idx 547-570，連號 1/2/3、無章 reset），
#      0 個 "Chapter/Problem/Exercise/Solution" 標題 block；6 個 lvl2 全是段內小標垃圾。
#    - 以 problem_re='^(\d+)\.?\s' + derive_chapter_from_num=true 跑：只抽出 3 題，
#      且被誤判成 ch1/ch2/ch3（derive 把那 3 個連號題的首數字當章號）。
#    主書 234 題 / 13 章，sol 端可錨點 ≈ 0 → 任何 regex/旗標組合都救不了。
#
# 結論：source-quality（源頭缺 deterministic 題號錨點），非引擎能力可補。內容對版、
# 不是錯書；但解答正文純散文、無顯式章號/題號，YAML regex 與新旗標皆無從對位。
# 已開 sol proposal P-2026-06-19-kleinberg-algorithm-design-sol（待架構師換更結構化
# 的解答本 / 或引入序列式對位能力）。維持 _pending，不 merge。
