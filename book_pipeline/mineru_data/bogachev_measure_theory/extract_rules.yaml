# heading regex（各恰好 2 capture group: id, title）
# section: 'N.M. Title'（如 '1.2. Algebras and σ-algebras'）；強制非空 title
# subsection: 'N.M(roman). Title'（如 '1.12(i). Set operations'，Supplements 內字母小節）
section_re: '^(\d+\.\d+)\.\s+(.+)$'
subsection_re: '^(\d+\.\d+\([ivxlcdmIVXLCDM]+\))\.\s+(.+)$'
heading_priority: [subsection_re, section_re]

# 題號：習題在章末 Exercises 區，編號 'N.M.K'。分隔符變體（raw 實掃）：'.'/'°'(難題)/'.°'/'°.'/':'(OCR 誤植)
problem_start_re: '^(\d+\.\d+\.\d+)[.°:]*\s'
problem_chapter_must_match: true
problem_num_namespace_by_section: false

# equation：\tag{N.M.K}（如 \tag{1.2.1}）
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([\d.]+[a-z]?)\}'

# 內文 Example 非 worked-problem 風（純例題物件、與定理同編號體系）→ 不抽出
example_start_re: null

# figure
figure_caption_merge: false
figure_caption_main_re: null

known_missing_problems: []
