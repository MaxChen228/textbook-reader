# section heading 在 lvl2，但 5 個 NA-section（3A/6E/10A/10D/11A）被 MinerU 標成 lvl1
# （與章標同層）→ 必須 [1, 2] 兩級都收，否則這 5 節漏偵、其後習題掛錯 namespace。
# 章標 "Chapter N Title"（lvl1）不匹配 section_re（^\d+[A-Z]）故不會被誤判成 section。
heading_text_level: [1, 2]

# ── 內容範圍（global 0-based PDF page_idx） ──
body_start_page: 15
appendices_start_page: 414      # 無 Appendix；ch12 page_end(413)+1 = back matter(Photo Credits) 起點
bibliography_start_page: 416
index_start_page: null          # 全本無獨立 Index heading

# ── inline-problem 模式 ──
# Axler 習題無「每章單一 Problems heading」，而是每節末一個 "EXERCISES NA" 區、
# 習題編號每節從 1 重置 → inline + namespace_by_section + problems_start_re gate。
inline_problems: true
problem_num_namespace_by_section: true

