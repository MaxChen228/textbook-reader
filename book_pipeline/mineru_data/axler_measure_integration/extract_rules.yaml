# ── 附錄 ──
appendices: []

# ── heading regex ──
# section = "NA Title"（如 "1A Review: Riemann Integral"）；id=NA 供 namespace。
section_re: '^(\d+[A-Z])\s+(.+)$'
# Axler 無編號 subsection（無 "1A.1" 形態）→ 用 NA.K never-match，使 "1.1 Definition"
# 等編號結果塊落 body（不被誤判成 subsection）。
subsection_re: '^(\d+[A-Z]\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 習題編號為純流水整數（"1 Suppose...", "2 Suppose..."）；namespace 串 section_id → "1A.1"。
# 用 [1-9]\d* 拒絕 leading-zero / 裸 "0"（Axler 習題從不編 0；防 OCR 雜訊 "0 ..." 假命中）。
problem_start_re: '^([1-9]\d*)\s'
problem_chapter_must_match: false
# 習題只在 "EXERCISES NA" 區內收（大小寫不一用 (?i)）。字母可選：ch12 是章級
# "EXERCISES 12"（無 section 字母）；ch1-11 為 "EXERCISES 1A" 等。
problems_start_re: '(?i)^EXERCISES\s+\d+[A-Z]?\s*$'

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題） ──
# Axler 範例標 "N.M Example ..."（如 "1.4 Example lower and upper Riemann sums"）。
example_start_re: '^(\d+\.\d+)\s+Example\b'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
