# ── heading regex ──
# section: en-dash 編號 ALLCAPS, e.g. '1–1 HISTORICAL PERSPECTIVE'（U+2013）
# subsection: 無編號 Title Case, e.g. 'Block Codes'（排除 Example/EXAMPLE 與 ALLCAPS section）
section_re: '^(\d+–\d+)\s+(.+)$'
subsection_re: '^()((?!Example\s|EXAMPLE\s)[A-Z][a-z][A-Za-zÀ-ÿ’''’ \-,.&/:()†]*)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# problems: en-dash N–M, 可選 ★ 前綴, e.g. '1–1 Assume…' / '★ 1–3 Using…'
# en-dash 分隔 → split('.')[0]=='1–1' int() ValueError → must_match=false
problem_start_re: '^(?:★\s*)?(\d+–\d+)\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: false

# ── equation ──
# \tag 用 ASCII hyphen, 有時帶空白: '4-47' / '2 - 195' / '5-5a'
equation_strip_dollar: true
equation_label_re: '\\tag\{(\d+\s*-\s*\d+[a-z]?)\}'

# ── example（內文題） ──
# 'Example N–M TITLE' / 'EXAMPLE N–M TITLE'（en-dash）
example_start_re: '^(?:Example|EXAMPLE)\s+(\d+–\d+)'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
