appendices: []

# ── heading regex ──
# Numbered sections: "1-1 BLACKBODY RADIATION", "2-3 THE PROBABILITY INTERPRETATION..."
# Plain subsections: "The Rutherford Planetary Model", "The Bohr Postulates"
section_re: '^(\d+-\d+)\s+(.+)$'
subsection_re: '^()((?:[A-Z\*][A-Za-z\*].{3,}|[A-Z]{3,}(?:\s+[A-Z]{2,})+))$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Problems are numbered simply: "1. ...", "2. ..." (restart at 1 per chapter)
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
# Tags like \tag {1-1}, \tag {1-2}, \tag {12-16}
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+-[0-9]+[a-z]?)\}'

# ── example ──
# EXAMPLE 1-1, EXAMPLE 2-3 etc.
example_start_re: '^(EXAMPLE\s+\d+-\d+)'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
