# ── heading regex ──
# section heading = 編號型 N.M（lvl2）。MinerU 把多數 section 號與標題拆兩 block（'1.2' + 'System of Units'），
# 故 N.M Title 同 block 命中率低；regex 仍強制 title 非空以免誤抓頁眉/footer 數字（thomas_calculus 教訓）。
# 本書無 N.M.K 三層 subsection（掃描 count=0），subsection_re 設更深一層 N.M.K（不會誤匹配）。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Problems 區題號 = 'N.M ...'（如 '1.9 The current...'），首段=章號 → must_match true
problem_start_re: '^(\d+\.\d+)\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false

# ── equation ──
# 本書 equation block 無 \tag{...}（掃描 0 命中）；保留標準 N.M label regex 作 default（不誤匹配無害）
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題）──
# 'EXAMPLE N.M'（169 個 lvl2 block）
example_start_re: '^EXAMPLE\s+(\d+\.\d+)'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
