# ── 附錄 ──
# 本書無 Appendix；back-matter 為 Answers / References / Index（非附錄）。
appendices: []

# ── heading regex ──
# 章節為 'N.M Title'（N.M 後強制非空 title）；subsection 為 'N.M.K Title' 或具名 Title-Case 短句。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 習題編號 'N.M.K'（如 2.5.1）；首段 N == 章號 → must_match true。
problem_start_re: '^(\d+\.\d+\.\d+)\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
# MinerU \tag{...} 內僅保留節內流水（int 或 int+letter，如 1 / 8a），非印本的 N.M.K。
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+[a-z]?)\}'

# ── example（內文題） ──
# 'Example N.M.K:' 標題。
example_start_re: '^Example\s+(\d+\.\d+\.\d+)\s*:'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（可空） ──
known_missing_problems: []
