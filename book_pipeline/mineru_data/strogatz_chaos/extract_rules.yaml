# ── 書本 metadata ──
slug: strogatz_chaos
title: Nonlinear Dynamics and Chaos
author: Steven H. Strogatz
edition: 3rd
subject: Differential Equations
publisher: CRC Press
language: en

# ── block 過濾 ──
filter_types: [page_number, header, footer, aside_text, ref_text]
ignore_image_content: true
ignore_chart_content: true
heading_text_level: 2

# ── 內容範圍（global 0-based PDF page_idx） ──
body_start_page: 15
appendices_start_page: 553
bibliography_start_page: 565
index_start_page: 585

# ── inline-problem 模式 ──
# 全本 inline（所有 ch.problems_block_idx=null）。原因：MinerU 把本書所有 section /
# Example / 'EXERCISES FOR CHAPTER N' heading 都輸出成 text_level=2，parser detect_heading
# 只認 lvl=1 → 二分模式靠不到 Problems heading 切點，且二分的「題號末段遞增守則」會把
# Strogatz 每節重置的 N.M.K 題號（2.1.5→2.2.1→2.3.1…）誤判回退而大量丟題。
# inline walker 對 N.M.K 三段題號 int(raw_num) 拋 ValueError → 跳過遞增守則 → 完整收題。
# 題號自帶節 namespace（N.M.K），故 problem_num_namespace_by_section 維持 false。
inline_problems: true

# ── 章節 ──
# chapter_title_block_idx = 該章 'N.0' intro 區段的前一塊（章標題塊或填充塊），
#   parser body_start = title_idx+1 = N.0 區段，正文從 N.0 起算。
