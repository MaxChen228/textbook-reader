# ── heading regex ──
# body 內 section 為 "N·M Title"（middle-dot U+00B7，部分用 '.'，可帶前綴 \* 與內部空白），
# 例：'1·1 Elementary...'、'\*1·10 Calculation...'、'\*1 · 11 Probability...'、'7.9 Maxwell...'。
# 強制 title 非空（\s+(.+)$）→ 不會吞純編號頁眉。subsection 為三段 'N·M·K'（本書 body 無，
# 但 appendix/equation 用三段；保留模式以防）。
section_re: '^\\?\*?\s*(\d+\s*[·.]\s*\d+)\s+(.+)$'
subsection_re: '^\\?\*?\s*(\d+\s*[·.]\s*\d+\s*[·.]\s*\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 題目行首為 'N.M ...'（period，lvl=None），例 '1.1 What is...'、'4.1 (a) One kilogram...'。
problem_start_re: '^(\d+\.\d+)\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
# 全 equation 以 '$$\n' 開頭 '\n$$' 結尾 → strip true。
# \tag 內為 middle-dot 多段（'1·2·1'）或包 '$...$'（'$1\cdot2\cdot5$'）或純整數；
# 用通吃 1-group capture 抓 tag 內容。
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([^}]+)\}'

# ── example ──
# 內文無獨立 "Example N" 段落（僅一處 "Examples of thermometers" 為小標，非題型）→ null
example_start_re: null

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
