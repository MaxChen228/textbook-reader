title: Introduction to the Theory of Computation
author: Michael Sipser
edition: 3rd International
subject: Theory of Computation
publisher: Cengage Learning
language: en

# ── block 過濾 ──
filter_types: [header, footer, page_number]
ignore_image_content: true
ignore_chart_content: true
# heading_text_level: 2 blocks are section/subsection markers.
# Most of content_list.json 'text' blocks with text_level=2 are:
# figure labels (FIGURE N.M), theorems (THEOREM N.M), examples (EXAMPLE N.M),
# section numbers (N.M standalone), section titles (UPPERCASE), etc.
# We use section_re and subsection_re that effectively never fire,
# because Sipser uses split two-block format for sections:
#   block A: '1.1'      (level 2, standalone number)
#   block B: 'FINITE AUTOMATA' (level 2, uppercase title)
# The parser's detect_heading operates on single blocks, so N.M+title can't be
# captured as a single section. Choosing non-firing regexes avoids false positives
# (e.g., problem text '7.40 Let ...' was accidentally level-2 via OCR).
heading_text_level: 2

# ── 內容範圍 ──
# PDF page_idx 0-based. Ch0 Introduction = page_idx 23 (printed page 1).
# Front matter: copyright, dedication, ToC, prefaces = page_idx 0-22.
body_start_page: 23
appendices_start_page: 465  # no formal appendices; set == bibliography
bibliography_start_page: 465  # 'Selected Bibliography' at block [6445] page_idx 465
index_start_page: 470         # 'Index' header at block [6505] page_idx 470

# ── inline-problem ──
inline_problems: false  # each chapter has EXERCISES + PROBLEMS section at end

