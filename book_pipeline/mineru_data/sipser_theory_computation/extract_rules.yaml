# ── heading regex ──
# Sipser sections use split two-block format (N.M on one line, title on next).
# detect_heading cannot bridge two separate blocks, so section_re is designed
# to match only 'N.M UPPERCASE-TITLE' in a SINGLE block (never occurs in this PDF).
# Prevents false positives from problem texts like '7.40 Let ...' (OCR level-2 artifact).
section_re: '^(\d+\.\d+)\s+([A-Z]{4,}[A-Z\s,\-'']+)$'
# Sipser has no three-level section numbering (N.M.K never appears).
subsection_re: '^(\d+\.\d+\.\d+)\s+(\S.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Problems labeled 'N.M text'. Optional prefix [A?] for asterisked/challenge problems.
# e.g., '1.3 The formal...', 'A1.1 The following...', '?1.35 Let...', 'A?0.15 Ramsey...'
# Capture group 1 = 'N.M' (chapter.problem number).
# problem_chapter_must_match: True -> checks int(num.split('.')[0]) == ch_num.
# SELECTED SOLUTIONS re-list a subset of problems with same N.M prefix, but with
# lower numbers than max already seen -> blocked by monotone-increase guard.
problem_start_re: '^[A?]*(\d+\.\d+)\s'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
# Sipser equations are wrapped in $$...$$ by MinerU; no \tag{} numbering used.
equation_strip_dollar: true
equation_label_re: '\\tag\{([^}]+)\}'

# ── example ──
# Examples use 'EXAMPLE N.M' heading at text_level=2.
# Capture group 1 = 'N.M' (e.g., '0.5', '1.7', '10.48').
example_start_re: '^EXAMPLE\s+([\d.]+)$'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
