appendices: []

# ── heading regex ──
# 主體 section = N.M Title、subsection = N.M.K Title（皆 lvl-2）。
# "Exercises N.M" 練習子集 heading 併入 subsection_re（最深 namespace 層），其 id 唯一 →
# split_problems 在每個 "Exercises N.M" 處記 current_section_id + 重置題號基準，
# namespace_by_section 串成 'Exercises N.M.題號' 避免跨子集撞號。
section_re: '^(\d+\.\d+)(?=[\s ]+\S)\s+(.+)$'
subsection_re: '^((?:\d+\.\d+\.\d+)|(?:Exercises?\s+\d+\.\d+))\s*(.*)$'
heading_priority:
  - subsection_re
  - section_re

# ── 題號 ──
# Exercises 子集內題號 = 純流水 "1. 2. ..."，每子集 reset → namespace_by_section。
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: true

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題） ──
example_start_re: '^Example\s+(\d+\.\d+)\b'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（可空） ──
known_missing_problems: []
