# ── problem 模式 ──
# 二分模式 + per-section namespace。每章末有單一 "N.x Exercises" section（problems_block_idx），
# 其下分多個 "Exercises N.M" 子集，各子集題號從 1. 重新編號（純流水）。pbi 把章末 Exercises 區
# 與 body 散文切開（body 的證明 case-analysis "1. 2. 3." 不再被誤當題目），namespace_by_section
# 把各子集 id 串到題號前（'Exercises1.1.1'）避免跨子集撞號。
inline_problems: false

