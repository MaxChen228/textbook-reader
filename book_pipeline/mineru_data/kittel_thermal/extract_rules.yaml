# ── heading regex ──
# 純文字 ALL CAPS 型：section 全大寫（如 "BINARY MODEL SYSTEMS"），
# subsection 為 Title Case 短句（如 "Most Probable Configuration"）。
section_re: '^()([A-Z][A-Z][A-Z\- ’‘'',.&/:]*[A-Z.)])$'
subsection_re: '^()([A-Z][a-z]*(?:[:\s\-’‘'',][A-Za-z][A-Za-z]*)+)$'
heading_priority:
  - subsection_re
  - section_re

# ── 題號 ──
# 此書題號為 "1. Lorem ipsum..." 純流水正整數
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+[a-z]?)\}'

# ── example（內文題） ──
# 本書內文 Example 以 inline 形式出現於 text（如 "Example: ..."），無獨立段落 heading
example_start_re: null

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
