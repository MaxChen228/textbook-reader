# ⚠ PENDING — 不要 merge。這份解答書的主要障礙是現行 sol_extract harness 不會切章，不是 regex 可校準完的問題：
#
# 1. unified/content_list.json 沒有任何 text_level==1 的正文章 anchor；extract_sol_chapters 只掃這種 block。
#    官方 dry-run（chapter_re='^Chapter\s+(\d+)\s*$' / problem_re='^(\d+\.\d+)\.'）結果：抽出 0 章、0 題。
#
# 2. 正文在前言後直接從 `21.1.` 開始（idx 107）；跨章只出現在 header/page_number，而非引擎可用章標。
#    例：idx 479 header='Electric Charge and Electric Field' 後面直接是 `22.3.`；
#        idx 4759 header='Nuclear Physics' 後面直接是 `44.3.`。
#
# 3. 語義抽樣顯示這不是版次錯書：主書與解答書的 21.1、22.3、44.3 主題一致。
#    缺的是「由題號 N.M 自動推章」或「允許 header/page_number 作章 anchor」能力。
#
# 待 sol_extract 升級後可直接重跑 merge；在此之前保持 _pending，避免留下假成功的 0-match merge。
chapter_re: '^Chapter\s+(\d+)\s*$'
