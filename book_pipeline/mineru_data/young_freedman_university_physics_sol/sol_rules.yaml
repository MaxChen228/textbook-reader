# young_freedman 解答書 = 電磁學~現代物理冊（涵蓋主書 ch21-44，24 章）。
# 章標 'Chapter NN' 是 per-page running header（type=='header'），位置落在頁面內容「之後」
# → 章錨法系統性偏移一章：每章前 ~1 頁題目漏進前一章 bucket、ch21 首頁題目無章可歸被丟。
# 改用 derive_chapter_from_num：題號 N.M 的 N 即章號（_num_prefix_int），不需章錨、零偏移。
# 主書 num 為 'N.M'（21.5→ch21）完全對齊。題號 N.M.，group(1) 抓 'N.M'。
derive_chapter_from_num: true
problem_re: '^(\d+\.\d+)\.'
multi_per_block: false
