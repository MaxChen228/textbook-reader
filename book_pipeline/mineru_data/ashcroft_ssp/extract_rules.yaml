# ── heading regex ──
# 本書 section heading = ALL-CAPS（text_level=2）。注意：parser.detect_heading 僅對 lvl==1 觸發，
# 故 lvl=2 的 section 多會落為段落 p（無資料遺失）；此 regex 仍依 §3 Step 7 ALL-CAPS 型給足 2 capture group。
# section_re 強制 title 非空（id group 空、title group 至少 1 字元）。
section_re: '^()([A-Z][A-Z][A-Z\-’''`,.&/:() ]*[A-Z.)0-9])$'
subsection_re: '^()([A-Z][a-z]+(?:[:\s\-’''`,][A-Za-z][A-Za-z]*)+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 題目格式 "1. Title" / "2. Title"（純流水、每章從 1 起），text_level=2。
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false   # 純流水題號（非 N.M），split('.')[0] 即題號自身
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example ──
example_start_re: null              # 本書無 "Example N" 內文題段落

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（人工確認前一律空）──
known_missing_problems: []
