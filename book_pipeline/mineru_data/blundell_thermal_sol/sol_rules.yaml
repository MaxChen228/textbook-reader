# blundell_thermal_sol — 章標頭與題號合一的解答書（無獨立 "Chapter N" block）。
#
# 結構真相（2026-06-22 重驗，drop sol_scout + 讀 content_list 生肉）：
#   - 解答書**沒有任何獨立章標頭 block**。題號 `N.M` 自成一個 text block（lv=None），
#     其中 N 兼任章資訊；題目解答 body 跟在後面的 block。章與章之間無分隔（`1.6`→`2.1` 相鄰）。
#   - 僅 2 個粗粒度分隔 "Solutions to Part I–VI" / "Part VII–IX"，無法對應 37 章。
#
# 引擎適配（2026-06-23，引擎升級 c1368d8 後改用 derive_chapter_from_num）：
#   sol_extract 新增 `derive_chapter_from_num: true`——無章標解答書由每題 num 首段
#   （split on '.'/'-'）推章號、bucket 各題。取代舊「每章首題 N.1 當章錨」hack。
#   舊 hack（chapter_re `^(\d+)\.1(?![0-9])`）把每章首題 N.1 當章錨被 range(start+1,end)
#   跳過、**系統性丟失 37 個主書首題**；derive 模式不再吞首題，全部 N.M（含 N.1）正常切。
#
# 語義抽樣（2026-06-23 derive 模式重驗，ch1/3/5/10/17 含每章首題 N.1）：
#   全部同題對齊、非版次錯位。首題 N.1 已救回（舊 hack 丟失者）。
#
# derive 模式下 chapter_re 不被使用（引擎 schema 仍要求 1 capture group）→ 填合法佔位。
chapter_re: '^Chapter\s+(\d+)\s*$'    # 佔位（derive_chapter_from_num=true 時不使用）
problem_re: '^(\d+\.\d+[a-z]?)'       # group(1) 對齊主書 problem['num'] = "N.M"（含 N.1）
multi_per_block: false
derive_chapter_from_num: true         # 無章標：由 num 首段推章、bucket 各題（救回 37 首題）
