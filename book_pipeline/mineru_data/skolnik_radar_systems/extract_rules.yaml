# ── heading regex ──
# section_re tempered：真 section 標題全 ALL-CAPS（'2.1 INTRODUCTION'），習題是
# sentence-case（'1.8 Three variants...'）。MinerU 偶把 N.M 習題塊誤標 lvl2 → 與
# section 撞號被吃掉（ch1 1.6/1.8、ch2 2.25）。負向預查 (?![A-Z][a-z]) 拒 Title/
# sentence-case 標題、保留 96 個全大寫真 section（0 誤殺），習題塊落回 problem 偵測。
section_re: '^(\d+\.\d+)\s+(?![A-Z][a-z])(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority:
  - subsection_re
  - section_re

# ── 題號 ──
problem_start_re: '^(\d+\.\d+)\s+'
problem_chapter_must_match: true

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{\[?([0-9]+\.[0-9]+[a-z]?)\]?\}'   # tag 內多帶方括號 [N.M]

# ── example（內文無編號 Example 段落） ──
example_start_re: null

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

