# ── heading regex ──
# section "1.1"/"14.2" + appendix "B.1"/"C.2"/"D.1"（letter-section）；subsection "8.1.1"
section_re: '^((?:\d+|[A-Z])\.\d+)\s+(.+)$'
subsection_re: '^((?:\d+|[A-Z])\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號（全書無題 → sentinel re 永不命中，僅滿足 schema） ──
problem_start_re: '^(__NO_PROBLEMS__)$'
problem_chapter_must_match: false

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文無 Example 段落） ──
