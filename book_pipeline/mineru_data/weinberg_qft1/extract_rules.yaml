# 主體 section 為 N.M；章內 appendix headings（如 "Appendix A ..." / "Appendix Traces"）
# 也視為 heading，保留在 chapter body 內，而不是切成 global appendices。
section_re: '^((?:\d+\.\d+)|(?:Appendix(?:\s+[A-Z])?))\s+(.+)$'
# 少量無編號小標存在於 text_level=2（如 "(A) Algebra", "Scalar Field, Derivative Coupling", "A"）。
subsection_re: '^()((?!(?:Problems|References|Bibliography|Author Index|Subject Index)$)(?!(?:Appendix(?:\s|$)))(?:[A-Z]|\([A-Z]\)\s+.+|[A-Z][^\n]{1,100}))$'
heading_priority: [subsection_re, section_re]

# 章末習題是純流水 1., 2., 3. ...；不帶章號前綴。
problem_start_re: '^(\d+)\.\s+'
