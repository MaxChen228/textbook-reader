# ── heading regex ──
# §N.M Title / §N.M.K Title。section_re 強制 title 非空 → 自動排除頁眉跑馬燈
# "N.M. SOLVED PROBLEMS"（數字後緊跟句點、非空白，不 match）。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Exercises 區題號形如 "Exercise N.M"；problem_chapter_must_match=true（N.M、N int-able）。
problem_start_re: '^Exercise\s+(\d+\.\d+)'
problem_chapter_must_match: true

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題） ──
example_start_re: '^Example\s+(\d+\.\d+)'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（可空） ──
known_missing_problems: []
