# ── heading regex ──
# section = 'N.M Title'（N=0..8），subsection = 'N.M.K Title.'
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 題目 pure running 'N. '，每節 Problems heading 後從 1 重置 → namespace_by_section。
# namespace 停用遞增守則 → 節內正文編號散文（如 §3.2.1 列舉 Jordan block 性質的 1./2./3.）
# 會被誤切成題、與真題撞 namespace 號（H2 dup）。problems_start_re 把題目限縮在
# 「Problems heading 後 → 下一 section/subsection heading」的問題區內收。
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: true
problems_start_re: '^Problems$'

# ── equation ──
# \tag{N.M.K} / {N.M.K.J} / 帶字母後綴 {1.2.7a}
equation_strip_dollar: true
equation_label_re: '\\tag\{(\d+(?:\.\d+)*[a-z]?)\}'

# ── example（內文題） ──
example_start_re: null

# ── figure ──
