# ── heading regex ──
# section   "N.A. TITLE"     → id="N.A"   （N=章號, 大寫單字母）
# subsection "N.A.i. Title"  → id="N.A.i" （小寫羅馬數字）
section_re: '^(\d+\.[A-Z])\.\s+(.+)$'
subsection_re: '^(\d+\.[A-Z]\.[ivxl]+)\.\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 本書無題：problem_start_re 設恆不匹配（(?!) 空負向先行斷言永遠失敗），1 capture group
problem_start_re: '^(?!)(\d+)'
problem_chapter_must_match: false

# ── equation ──
# \tag 樣本：'1-1' '4.1' '143' '10-64'（混 hyphen / dot / 純數字）
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9.\-a-z]+)\}'

# ── example（內文題） ──
example_start_re: null          # 全本 0 個 Example heading

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

