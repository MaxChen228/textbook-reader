# 唯一阻塞點（2026-06-22 重審，已隨引擎 commit 50fdc37 chapter_level:null 更新）：
#
#   解答書題號是「section 內裸題序」，每個 section 邊界 reset；section 號只存在於獨立
#   lvl2 標題 block（`1.1 Definitions and Terminology` → `8. 9. 10.`，section 1.2 又從
#   `7.` 重啟、1.3 從 `6.` 重啟）。但主書 problem.num 是 section-aware key
