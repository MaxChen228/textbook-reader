#     - 即使配上號碼也配到不同 section 的題 → 系統性錯位
#
# 以下用 chapter_re='^Chapter\s+(\d+)' + problem_re='^(\d+)\.' in-process 量到的真相：
#   - 章 anchor OK：抽出 ch1–ch15（含解答本第二冊 ch10–15；主書只有 ch01–09）。
#     ↳ 舊註解「只認 lvl1、抽出 3 章」已過時，50fdc37 後 chapter_level:null 解鎖任意層級。
#   - 配對率 0/1858（0%）。
#   - 語義抽樣（3 章 × 各前 3 題，無一對齊，坐實系統性錯位、非 OCR 噪音/版次錯配）：
#       ch1 seq=1: 主書「判定 (1-x)y''-4xy'+5y=cos x 階數/線性」 vs sol「d/dx(c₁e^10x)=10y 驗證解」
#       ch2 seq=2: 主書「方向場 dy/dx=e^(-0.01xy²) 含初值 a–d」 vs sol「分離變數積分」
#       ch4 seq=1: 主書「驗證 y=c₁eˣ+c₂e⁻ˣ 為解、定義區間」 vs sol「Theorem 4.1.1 True/False 概念題」
#
# 版本相符（main 與 sol 同為 Zill ODE）→ 非 edition-mismatch、非 source-quality。
# 根因純屬引擎能力缺口（記憶 [[namespace-mode-disables-prose-guard]] 提及的 section-aware
# key namespace），架構師補齊 sol_extract 後（section heading + 裸題序組裝主書 key、
# 必要時同冊多書切分）再移除 _pending 重 merge。
