# 以下 regex 僅為「能讓 in-process 量出 0% 真相」的探針，merge 仍被 _pending 抑制。
chapter_re: '^Chapter\s+(\d+)\s*$'
problem_re: '^(\d+)\.'
multi_per_block: false
