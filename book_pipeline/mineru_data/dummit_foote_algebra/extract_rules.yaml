# OCR 把章號開頭為「1」的 section 編號拆字（'1 .1'、'1 0.1'、'1 8.1'）→ [\d ]* 容忍編號內空白；
# parser.detect_heading 再 re.sub 去空白還原成乾淨 id（'1 0.1'→'10.1'）。title 仍強制 \s+(.+) 非空。
section_re: '^(\d[\d ]*\.\d+)\s+(.+)$'
subsection_re: '^(\d[\d ]*\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: true
problems_end_re: null
solution_start_re: null

equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

example_start_re: null

figure_caption_merge: false
figure_caption_main_re: null

known_missing_problems: []
