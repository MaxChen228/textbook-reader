# MinerU 把本書 N.M section heading 標成 text_level=2（94/95 個；章名/EXERCISES 亦多為 lvl2），
# 但少數 straggler（如 §10.3）OCR 標成 lvl1。parser.detect_heading 預設只認 lvl1，故 inline walker
# 追不到 section → namespace_by_section 失效、題號 collapse 跨節重複。設 [1, 2] 兩級都收，
# section_re 為數字開頭（^\d）故不會誤吃 lvl1 的 EXERCISES/章名（皆字母開頭）。
heading_text_level: [1, 2]

