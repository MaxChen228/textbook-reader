# ── heading regex ──
# 章內 section 形如 "1.1. Title"（N.M. 帶結尾點），subsection 形如 "1.3.1. Title"（N.M.K.）。
section_re: '^(\d+\.\d+)\.\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\.\s+(.+)$'
heading_priority:
  - subsection_re
  - section_re

# ── 題號 ──
# 題目皆為 "Exercise N.M.K." 散落 section 中。capture 整個 N.M.K（含 section 段），章號 = split('.')[0]。
problem_start_re: '^Exercise\s+(\d+\.\d+\.\d+)'
problem_chapter_must_match: true
problem_num_namespace_by_section: false

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+(?:\.[0-9]+)?[a-z]?)\}'

# ── example（內文題） ──
example_start_re: null

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（可空） ──
known_missing_problems: []
