appendices: []

# ── heading regex ──
# section: "N. TITLE"（ALL CAPS 章節標題），id=N，供 namespace_by_section 串接
# subsection: "A. Title" 字母子節 + "PROBLEMS, SECTION N" 題組標題；id group 留空
#   （空 id → walker 不覆寫 current_section_id，故題號 namespace 仍掛在數字 section 上）
section_re: '^(\d+)\.\s+(.+)$'
subsection_re: '^()((?:[A-Z]\.\s+.+)|(?:PROBLEMS,\s+SECTION\s+\d+))$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# 題目以純流水 "N. ..." 起頭，每節 reset → problem_chapter_must_match=false
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題） ──
example_start_re: '^Example\s+(\d+)\.'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題（人工確認後才填） ──
known_missing_problems: []
