ignore_chart_content: true

# ── 內容範圍（global 0-based PDF page_idx） ──
body_start_page: 23
appendices_start_page: 582
bibliography_start_page: 582
index_start_page: 587

# ── inline-problem 模式 ──
# 章 1-5,7,9,10,12 有獨立 "Problems" heading → 走二分（pbi 非 null）。
# 章 6,8,11,13,14 無 Problems heading 且無章末習題（只在內文出現 "Exercise N.M."）→ pbi=null。
# 這些章內的 "N.M Title" 皆為 section heading（text_level==1），inline walker 的 detect_heading
# 會先把它們判為 heading 歸入 body，不會誤切成 problem。故設 true 安全且正確。
inline_problems: true

