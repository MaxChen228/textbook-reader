# ── heading regex ──（N.M 編號型）
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(\d+\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Problems region 內題號格式 "N.M. ..." → capture N.M、首段==章 num
problem_start_re: '^(\d+\.\d+)\.\s+'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
# Problems heading 後緊接 "Questions"（章末複習題）→ 提早結束，丟棄 Questions 後內容
problems_end_re: '^Questions\s*$'
# 解答附於 Example 段落（worked examples），非 Problems 區 → null
solution_start_re: null

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\{([0-9]+\.[0-9]+[a-z]?)\}'

# ── example ──
example_start_re: '^Example\s+(\d+\.\d+)\b'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
