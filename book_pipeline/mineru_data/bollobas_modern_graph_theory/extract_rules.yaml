# ── 附錄 ──
appendices: []                    # no appendices

# ── heading regex ──
# sections: Roman.Arabic + title, e.g. "I.1 Definitions", "III.4 Tutte's 1-Factor Theorem".
# no subsections exist; subsection_re targets the (absent) Roman.N.N form so it never fires.
section_re: '^((?:I|II|III|IV|V|VI|VII|VIII|IX|X)\.\d+)\s+(.+)$'
subsection_re: '^((?:I|II|III|IV|V|VI|VII|VIII|IX|X)\.\d+\.\d+)\s+(.+)$'
heading_priority: [subsection_re, section_re]

# ── 題號 ──
# Exercises are pure sequential per chapter: "1. ...", "2. ...", "11. ...".
problem_start_re: '^(\d+)\.\s+'
problem_chapter_must_match: false
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ──
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([0-9]+[a-z]?)\}'

# ── example（內文題） ──
example_start_re: null            # no "Example N.M" environment

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

# ── OCR 漏題 ──
known_missing_problems: []
