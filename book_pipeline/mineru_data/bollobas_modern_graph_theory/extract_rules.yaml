# Modern Graph Theory — Béla Bollobás (GTM 184, Springer 1998)
# Roman-numeral chapters (I–X), Roman.Arabic sections (I.1, II.3 …),
# per-chapter "Exercises" section holds pure-sequential problems (1. 2. 3. …).

# ── 書本 metadata ──
slug: bollobas_modern_graph_theory
title: Modern Graph Theory
author: Béla Bollobás
edition: 1st
subject: Combinatorics            # graph theory ⊂ combinatorics; no dedicated subject in schema
publisher: Springer
language: en

# ── block 過濾 ──
filter_types: [header, page_number, footer]
ignore_image_content: true
ignore_chart_content: true
heading_text_level: 2             # body section headings (I.1, II.3 …) live at text_level=2

# ── 內容範圍（global 0-based PDF page_idx） ──
body_start_page: 15               # chapter I "Fundamentals" (idx 178)
appendices_start_page: 390        # no appendix → back-matter (Symbol Index) page
bibliography_start_page: null     # no standalone Bibliography/References (refs live in per-chapter Notes)
index_start_page: 390             # Symbol Index (idx 5272, pg 390)

# ── inline-problem 模式 ──
inline_problems: false            # every chapter has a dedicated "Exercises" section

# ── 章節 ──
# chapter anchor = standalone Roman-numeral block; title = next block (secondary).
# next_chapter_block_idx of last chapter = Symbol Index heading idx (excludes index from ch X body).
