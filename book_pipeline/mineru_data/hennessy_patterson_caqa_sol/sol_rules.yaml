# Hennessy & Patterson CAQA 6e — solutions manual
#
# ── 章錨：text/2 + header 雙來源（chapter_in_header: true，2026-06-23）────────────
# 解答書「Chapter N Solutions」章標分布（content_list）：
#   - ch1/3/4/5/6 首標為 text_level==2 block；ch2/ch7 首標只存在於 header 類
#     （running-header 重印多次；引擎對重複章錨累積進同一 bucket）。
#   - 故 chapter_in_header: true 才認得 ch2/ch7，否則它們的題目被併進前一章
#     （ch2→ch1、ch7→ch6）。開啟後對 ch1/3/4/5/6 配對數零回退、純增 ch2/ch7。
#
# ── chapter_re 白名單 [1256]：只 merge 語義對齊的章（2026-06-23 深度語義抽樣後）─
# 語義抽樣（每章前 3 題 並排主書題幹 vs 配到解答）結論：
#   ✓ ch1 / ch2 / ch5 / ch6  對齊（cache 參數、coherence Cx.y、WSC-TCO 皆吻合）
#   ✗ ch3 / ch4 / ch7  系統性錯位 —— 這三章在 6e 是「Case Studies and Exercises」
#     多 part case study；主書 audit 把 case study 的 a/b/c... 過度切成獨立頂層題號
#     （3.1→3.1,3.2,3.3,...），解答本沿用教科書原始 exercise 編號 → 題號字串相撞
#     但語義偏移（非固定 offset：M3.1↔S3.1 對、M3.2「issue%」↔S3.2「答 25 cycles」
#     錯、M3.18 BTB↔S3.18 BTB 又對；M4.2 要 PTX↔S4.2 給 RISC-V 指令數；
#     M7.2 GEMM-dot↔S7.2 batch size）。regex/offset 救不了（非線性）。
#   → 白名單 [1256] 排除 ch3/4/7，避免把錯解答塞給讀者（爛 merge 比沒答案更糟）；
#     排除章的解答 block 落入相鄰 bucket 為未配對 key（3.x/4.x 不與 2.x 撞、7.x 不與
#     6.x 撞）→ 無誤配。merge 後 ch1/2/5/6 = 120 題全對。
#   根因＝主書 ch3/4/7 audit 過度切分 case study；已開 sol proposal（harness-gap）。
#     主書若重 audit 把 case-study parts 收回單一題號 + sol 配 part 對齊，可解鎖三章。
chapter_re: '^Chapter\s+([1256])\s+Solutions$'
problem_re: '^(\d+\.\d+[a-z]?)\b'
multi_per_block: false
chapter_in_header: true
