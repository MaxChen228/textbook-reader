# ⚠ PENDING — 不要 merge。這本解答書目前不是版次錯位，而是現行 sol_extract
# 的章 anchor 假設與 unified block 結構不相容。
#
# 2026-06-19 實測證據：
# 1. 預設 dry-run 穩定得到「抽出 0 章、0 題」：
#    `uv run --with pyyaml python -m book_pipeline.sol_extract
#      casella_berger_statistical_inference
#      casella_berger_statistical_inference_sol --dry-run`
#
# 2. unified/content_list.json 的章資訊被拆成兩個 block：
#    - `type=header`、text=`Chapter N`   ← 有章號，但 sol_extract 不看 header
#    - `type=text`、text_level=1、text=`Probability Theory` 等章名
#      ← sol_extract 會看，但 chapter_re 的 group(1) 必須可 `int(...)`，純章名無法提供數字
#
# 3. 旁路分析若暫時允許 `header: Chapter N` 當章 anchor，並用題號 `^N.M` 切題，
#    可穩定抽出 12 章、約 461 題解答，對主書配到 422/625 題；抽樣 ch1/ch2/ch7
#    前 3 題語義對齊，說明這本大致是對版來源，主要 blocker 是 harness 而非 edition mismatch。
#
# 結論：單靠 sol_rules 無法完成品質 merge；需 sol_extract 支援至少其一：
# - 章 anchor 可讀 `type=header` 的 `Chapter N`；或
# - 章 anchor 可自訂非數字 title→chapter 映射（現行 group(1) 直接 int 不可行）。
#
# 先把未來可用的 regex 記下；引擎補能力後可直接重跑。
chapter_re: '^Chapter\s+(\d+)\s*$'
problem_re: '^(\d+\.\d+)\b'
multi_per_block: false
_pending: true
