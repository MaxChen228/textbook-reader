# casella_berger_statistical_inference_sol — sol_rules
#
# 章標全在 type=='header' block（'Chapter 1'..'Chapter 12'，與主書 12 章對齊）。
# 舊引擎只掃 type=='text'→0 章（即 2026-06-19 的 _pending blocker，當時引擎不看 header）。
# commit c1368d8 新增 chapter_in_header opt-in 後，章錨可掃 header → blocker 解除。
#
# 主書 num = 'N.M'（ch1: 1.1..；ch12: 12.1..）；sol 題號 prefix 同為 'N.M'，逐字對齊。
chapter_re: '^Chapter\s+(\d+)\s*$'   # group(1)=章號（int）；header 中 'Chapter N'
problem_re: '^(\d+\.\d+)\b'          # group(1)='N.M' = 主書 problem['num']
chapter_in_header: true              # ★ 本書關鍵：章標落 type=='header' block
multi_per_block: false
