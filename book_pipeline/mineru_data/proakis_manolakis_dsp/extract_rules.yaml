# ── 書本 metadata（cite book_pipeline/metadata_schema.yaml 為 SoT）──
slug: proakis_manolakis_dsp
title: "Digital Signal Processing: Principles, Algorithms, and Applications"
author: "John G. Proakis; Dimitris G. Manolakis"
edition: "4th"
subject: "Signal Processing"
publisher: "Pearson Prentice Hall"
language: "en"

# ── block 過濾 ──
filter_types: [header, page_number, footer, aside_text, page_footnote]
ignore_image_content: true
ignore_chart_content: true
# MinerU 把 section/subsection/Example heading 全標成 lvl2（scout: secish 424 命中全在 lvl2）；
# lvl1 僅 chapter/appendix title。必須設 2，否則 detect_heading 認不到 heading、body 全 flat。
heading_text_level: 2

# ── 內容範圍（global 0-based PDF page_idx）──
