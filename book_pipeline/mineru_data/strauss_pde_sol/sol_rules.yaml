# ⚠ PENDING — 不要 merge。這本解答書目前不是 `sol_rules.yaml` 可單獨表達的 case，屬
# `sol_extract` harness gap，不是 source mismatch。
#
# 1. 解答書真正的章 anchor（`Chapter N`）全部落在 `text_level=2`，但現行 `sol_extract`
#    只接受 `text_level==1` 的章 anchor。以預設規則 dry-run 穩定得到 `0 章 / 0 題`。
#
# 2. `Chapter N` 還被當成 running header 重複灌進正文；同一章會在多個頁面反覆出現
#    `Chapter 1`、`Chapter 2`...。就算引擎放寬成接受 lvl2，現行實作仍會把同章後段
#    覆蓋前段，無法安全累積整章題解。
#
# 3. 題號與語義其實是對的：ad hoc 以 `^\\d+\\.\\d+\\.\\d+\\.` 抽題，可得 275 個解答 key，
#    其中 274 個能逐字對上主書 `strauss_pde` 的 `problem['num']`（651 題中的 42.1%，
#    符合 solutions manual 僅覆蓋約半數題的特性）。抽樣 `1.1.2`、`5.1.2`、`10.1.2`
#    題幹與解答主題皆一致，因此 source 可用，卡點在 harness。
#
# 若未來升級引擎，這份配置可作為起點；需要至少其一：
# - 支援自訂 chapter anchor `text_level`，且同章多段要累積不能覆蓋；或
# - 直接由題號 key `N.M.K` 導出 chapter，無須依賴章 anchor 切段。
chapter_re: '^Chapter\s+(\d+)\s*$'
problem_re: '^(\d+\.\d+\.\d+)\.'
multi_per_block: false
_pending: true
