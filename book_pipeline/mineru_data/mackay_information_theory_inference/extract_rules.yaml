# ── heading regex ──
# section：'N.M Title'（lvl2，297 個）。subsection：非編號 Title Case 標題（lvl2，356 個，
# 如 'Repetition codes'/'The physical solution'）。subsection_re 用 (?!\d) 排除編號 section，
# heading_priority 先試 subsection 不會誤吞 section（實測 overlap=0）。
section_re: '^(\d+\.\d+)\s+(.+)$'
subsection_re: '^(?!\d)()([A-Z][^\n]{1,75})$'
heading_priority: [subsection_re, section_re]

# ── 題號 ── 'Exercise N.M.[難度] ...'，部分前綴帶 margin glyph '. '（OCR 把 ▷ 轉成 '. '）。
# MinerU 常把帶上標難度標記的題號渲染成 LaTeX 空格化數學：'Exercise $2 . 2 . ^{[1]}$'、
# 多位數拆 digit 'Exercise $2 . 1 4 .'（=2.14）。故 capture 容忍 $、digit 間與點周圍空格、
# 多 digit token（parser 會 strip 空格正規化成 '2.14'）。恰 1 capture group（N.M 章節題號）。
# 題號首段=章號 → must_match true；無 namespace reset（每章 N.M 單調遞增）。
problem_start_re: '^[^A-Za-z]{0,4}Exercise\s+\$?\s*(\d+(?:\s+\d+)*\s*\.\s*\d+(?:\s+\d+)*)'
problem_chapter_must_match: true
problem_num_namespace_by_section: false
problems_end_re: null
solution_start_re: null

# ── equation ── tag 為 'N.M' 形式（1298 個）+ 附錄 'A.1' 等；strip dollar（MinerU v4 $$...$$）。
equation_strip_dollar: true
equation_label_re: '\\tag\s*\{([A-Z]?[0-9]+\.[0-9]+[a-z]?)\}'

# ── example（內文題）── 'Example N.M.' 散落內文（如 'Example 1.1. A bent coin...'），
# 同 Exercise 容忍 LaTeX 空格化數字。恰 1 capture group。
example_start_re: '^[^A-Za-z]{0,4}Example\s+\$?\s*(\d+(?:\s+\d+)*\s*\.\s*\d+(?:\s+\d+)*)'

# ── figure ──
figure_caption_merge: false
figure_caption_main_re: null

